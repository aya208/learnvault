/* ── 固定收支 / 訂閱管理 ──
   每筆設定：{id, name, type, amount, category, day(每月幾號), tags, active, startMonth, lastGenMonth}
   每次進入финance頁或啟動App時會自動補產生尚未產生的月份收支紀錄，產生後的紀錄會標記 recurId 方便辨識與追蹤。 */
function finAddMonthsKey(mk, n){
  const [y,m] = mk.split('-').map(Number);
  const d = new Date(y, m-1+n, 1);
  return finMonthKeyOf(d);
}
function finRecurDateForMonth(mk, day){
  const [y,m] = mk.split('-').map(Number);
  const lastDay = new Date(y, m, 0).getDate();
  return `${y}-${pad2(m)}-${pad2(Math.min(day, lastDay))}`;
}
function finRecurGenerateMonth(meta, mk){
  if(financeTx.some(t=>t.recurId===meta.id && finMonthKey(t.date)===mk)) return;
  financeTx.push({
    id:'fx_'+uid(), type:meta.type, amount:meta.amount, category:meta.category,
    date: finRecurDateForMonth(mk, meta.day), note:meta.name, tags:(meta.tags||[]).slice(),
    favorite:false, pinned:false, createdAt:Date.now(), recurId:meta.id
  });
}
function finRecurCatchUpAll(){
  if(!financeRecur.length) return;
  const nowMk = finMonthKeyOf(new Date());
  let changed=false;
  financeRecur.forEach(meta=>{
    if(!meta.active) return;
    let mk = meta.lastGenMonth ? finAddMonthsKey(meta.lastGenMonth,1) : (meta.startMonth||nowMk);
    let guard=0;
    while(mk<=nowMk && guard<36){
      finRecurGenerateMonth(meta, mk);
      meta.lastGenMonth = mk;
      mk = finAddMonthsKey(mk,1);
      guard++; changed=true;
    }
  });
  if(changed){ saveFinanceRecur(); saveFinanceTx(); }
}
function finRecurNextDate(meta){
  const nowMk = finMonthKeyOf(new Date());
  const mk = meta.lastGenMonth && meta.lastGenMonth>=nowMk ? finAddMonthsKey(meta.lastGenMonth,1) : nowMk;
  return finRecurDateForMonth(mk, meta.day);
}
function finRecurCreate(data){
  const meta = { id:'finrec_'+uid(), name:data.name, type:data.type, amount:data.amount, category:data.category,
    day:data.day, tags:data.tags||[], active:true, startMonth: finMonthKeyOf(new Date()), lastGenMonth:null };
  financeRecur.push(meta);
  finRecurGenerateMonth(meta, meta.startMonth);
  meta.lastGenMonth = meta.startMonth;
  saveFinanceRecur(); saveFinanceTx();
  return meta;
}
function finRecurUpdate(id, data){
  const meta = financeRecur.find(m=>m.id===id); if(!meta) return;
  meta.name=data.name; meta.type=data.type; meta.amount=data.amount; meta.category=data.category;
  meta.day=data.day; meta.tags=data.tags||[];
  saveFinanceRecur();
}
function finRecurToggleActive(id){
  const meta = financeRecur.find(m=>m.id===id); if(!meta) return;
  meta.active = !meta.active;
  if(meta.active){ meta.lastGenMonth = finAddMonthsKey(finMonthKeyOf(new Date()),-1); finRecurCatchUpAll(); }
  saveFinanceRecur();
  renderFinanceRecurModal();
  renderFinancePage();
}
function finRecurDelete(id){
  if(!confirm('確定要刪除這筆固定收支設定？（之前已產生的收支紀錄不會被刪除，只是之後不會再自動新增）')) return;
  financeRecur = financeRecur.filter(m=>m.id!==id);

}

function finCatDef(type, name){
  const list = type==='income' ? FIN_INCOME_CATS : FIN_EXPENSE_CATS;
  return list.find(c=>c.name===name) || {name:name||'其他', icon:'ti-dots', color:'#9B59B6'};
}
function fmtMoney(n, withSign){
  const v = Math.round(Number(n)||0);
  const s = Math.abs(v).toLocaleString('zh-TW');
  if(withSign) return (v<0?'-':'+') + '$' + s;
  return '$' + s;
}
function finMonthKey(dateStr){ return (dateStr||'').slice(0,7); }
function finMonthKeyOf(d){ return `${d.getFullYear()}-${pad2(d.getMonth()+1)}`; }
function finAddMonths(d, n){ const x=new Date(d); x.setDate(1); x.setMonth(x.getMonth()+n); return x; }
function finMonthLabel(mk){ const [y,m]=mk.split('-'); return `${y}/${m}`; }

function finTxInMonth(mk){ return financeTx.filter(t=>finMonthKey(t.date)===mk); }
function finSummaryOf(mk){
  const list = finTxInMonth(mk);
  const income = list.filter(t=>t.type==='income').reduce((s,t)=>s+Number(t.amount||0),0);
  const expense = list.filter(t=>t.type==='expense').reduce((s,t)=>s+Number(t.amount||0),0);
  const balance = income - expense;
  const savingsRate = income>0 ? Math.max(-999,Math.min(999,(balance/income*100))) : 0;
  return {income, expense, balance, savingsRate};
}
function finPctDelta(curr, prev){
  if(!prev) return curr>0 ? {dir:'up', text:'新增'} : {dir:'flat', text:'—'};
  const pct = ((curr-prev)/Math.abs(prev))*100;
  if(Math.abs(pct)<0.5) return {dir:'flat', text:'持平'};
  return {dir: pct>0?'up':'down', text:(pct>0?'+':'')+pct.toFixed(1)+'%'};
}
function finDonutChart(entries, total, size){
  size = size || 132;
  const r = size/2 - 12, cx = size/2, cy = size/2, circ = 2*Math.PI*r;
  if(!entries.length || total<=0){
    return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--border)" stroke-width="16"/>
    </svg>`;
  }
  let offset = 0;
  const segs = entries.map(e=>{
    const pct = e.amt/total;
    const len = pct*circ;
    const seg = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${e.color}" stroke-width="16"
      stroke-dasharray="${len.toFixed(2)} ${(circ-len).toFixed(2)}" stroke-dashoffset="${(-offset).toFixed(2)}"
      transform="rotate(-90 ${cx} ${cy})" stroke-linecap="butt">
      <title>${esc(e.name)} ${fmtMoney(e.amt)} (${(pct*100).toFixed(1)}%)</title>
    </circle>`;
    offset += len;
    return seg;
  }).join('');
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    ${segs}
    <text x="${cx}" y="${cy-4}" text-anchor="middle" font-size="12" fill="var(--text3)">本月支出</text>
    <text x="${cx}" y="${cy+14}" text-anchor="middle" font-size="14" font-weight="700" fill="var(--text)">${fmtMoney(total)}</text>
  </svg>`;
}
function finSparkline(values, color, w, h){
  w=w||90; h=h||28;
  if(!values.length) return `<svg width="${w}" height="${h}"></svg>`;
  const max=Math.max(...values,0.0001), min=Math.min(...values,0);
  const range=(max-min)||1;
  const step=w/Math.max(1,values.length-1);
  const pts=values.map((v,i)=>`${(i*step).toFixed(1)},${(h-((v-min)/range)*h).toFixed(1)}`).join(' ');
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="overflow:visible">
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
}

// ── 儀表板 ──
function finDashboardHTML(){
  const now=new Date();
  const thisMK=finMonthKeyOf(now);
  const lastMK=finMonthKeyOf(finAddMonths(now,-1));
  const cur=finSummaryOf(thisMK), prev=finSummaryOf(lastMK);

  // 近 6 個月趨勢（用於卡片小折線圖與趨勢圖表）
  const months=[]; for(let i=5;i>=0;i--) months.push(finMonthKeyOf(finAddMonths(now,-i)));
  const monthSummaries = months.map(mk=>({mk, ...finSummaryOf(mk)}));

  const cards=[
    {key:'income', label:'本月收入', icon:'ti-arrow-down-left', color:'#1D9E75', bg:'#E7F7F1', val:cur.income, prev:prev.income, series:monthSummaries.map(m=>m.income)},
    {key:'expense', label:'本月支出', icon:'ti-arrow-up-right', color:'#E24B4A', bg:'#FDECEC', val:cur.expense, prev:prev.expense, series:monthSummaries.map(m=>m.expense)},
    {key:'balance', label:'本月結餘', icon:'ti-wallet', color:'#5B4FE0', bg:'#EFEDFF', val:cur.balance, prev:prev.balance, series:monthSummaries.map(m=>m.balance)},
    {key:'rate', label:'本月儲蓄率', icon:'ti-piggy-bank', color:'#C9A24B', bg:'#FBF3E3', val:cur.savingsRate, prev:prev.savingsRate, series:monthSummaries.map(m=>m.savingsRate), isPct:true}
  ];

  const cardsHTML = cards.map(c=>{
    const delta=finPctDelta(c.val, c.prev);
    const displayVal = c.isPct ? `${c.val.toFixed(1)}%` : fmtMoney(c.val, c.key==='balance');
    return `
    <div class="fin-sum-card" onclick="${c.key==='expense'?"finFilterAndGoList('expense')":c.key==='income'?"finFilterAndGoList('income')":"setFinanceViewMode('list')"}">
      <div class="fin-sum-card-head">
        <div class="fin-sum-icon" style="background:${c.bg};color:${c.color}"><i class="ti ${c.icon}"></i></div>
        <div class="fin-sum-label">${c.label}</div>
      </div>
      <div class="fin-sum-amount">${displayVal}</div>
      <div class="fin-sum-foot">
        <span class="fin-sum-delta ${delta.dir}"><i class="ti ti-${delta.dir==='up'?'trending-up':delta.dir==='down'?'trending-down':'minus'}" style="font-size:11px"></i>${delta.text} 較上月</span>
        <span class="fin-sum-spark">${finSparkline(c.series, c.color)}</span>
      </div>
    </div>`;
  }).join('');

  // 最新收支卡片列表（前 8 筆，含置頂優先）
  const recent = financeTx.slice().sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0) || (b.date+b.createdAt).localeCompare(a.date+a.createdAt)).slice(0,8);
  const recentHTML = recent.length ? `<div class="fin-tx-list">${recent.map(t=>finTxCardHTML(t)).join('')}</div>`
    : `<div class="fin-empty"><i class="ti ti-receipt-2" style="font-size:32px;display:block;margin-bottom:10px;opacity:.3"></i>還沒有任何收支紀錄<br><span style="font-size:11px">點右上角「新增收支」開始記帳！</span></div>`;

  // 分類占比（本月支出）
  const expList = finTxInMonth(thisMK).filter(t=>t.type==='expense');
  const catTotals = {};
  expList.forEach(t=>{ catTotals[t.category]=(catTotals[t.category]||0)+Number(t.amount||0); });
  const totalExp = Object.values(catTotals).reduce((a,b)=>a+b,0);
  const catRows = Object.entries(catTotals).sort((a,b)=>b[1]-a[1]).map(([cat,amt])=>{
    const def=finCatDef('expense',cat);
    const pct = totalExp>0 ? (amt/totalExp*100) : 0;
    return `<div class="fin-cat-bar-row">
      <div class="fin-cat-bar-label"><i class="ti ${def.icon}" style="font-size:11px;color:${def.color}"></i>${esc(cat)}</div>
      <div class="fin-cat-bar-track"><div class="fin-cat-bar-fill" style="width:${pct}%;background:${def.color}"></div></div>
      <div class="fin-cat-bar-pct">${fmtMoney(amt)} · ${pct.toFixed(0)}%</div>
    </div>`;
  }).join('') || `<div style="font-size:12px;color:var(--text3);padding:8px 0">本月還沒有支出紀錄</div>`;

  // 6 個月趨勢長條圖
  const maxTrend=Math.max(1,...monthSummaries.map(m=>Math.max(m.income,m.expense)));
  const trendHTML = monthSummaries.map(m=>`
    <div class="fin-trend-col">
      <div class="fin-trend-bars">
        <div class="fin-trend-bar" style="height:${Math.max(2,m.income/maxTrend*100)}px;background:#1D9E75" title="收入 ${fmtMoney(m.income)}"></div>
        <div class="fin-trend-bar" style="height:${Math.max(2,m.expense/maxTrend*100)}px;background:#E24B4A" title="支出 ${fmtMoney(m.expense)}"></div>
      </div>
      <div class="fin-trend-month">${m.mk.slice(5)}月</div>
    </div>`).join('');

  // 洞察：本月最大支出項目 / 最近七天平均支出 / 現金流變化 / 儲蓄率變化
  const biggestExp = expList.slice().sort((a,b)=>b.amount-a.amount)[0];
  const sevenDaysAgo=new Date(now); sevenDaysAgo.setDate(sevenDaysAgo.getDate()-6);
  const sevenDaysAgoStr=fmtDate(sevenDaysAgo);
  const last7 = financeTx.filter(t=>t.type==='expense' && t.date>=sevenDaysAgoStr && t.date<=fmtDate(now));
  const avg7 = last7.length ? (last7.reduce((s,t)=>s+Number(t.amount||0),0)/7) : 0;

function finDeleteTx(id){

function finListHTML(){
  const months=[...new Set(financeTx.map(t=>finMonthKey(t.date)))].sort().reverse();
  const monthOpts=months.map(mk=>`<option value="${mk}" ${financeListFilter.month===mk?'selected':''}>${finMonthLabel(mk)}</option>`).join('');
  const allCats=[...FIN_INCOME_CATS, ...FIN_EXPENSE_CATS.filter(c=>!FIN_INCOME_CATS.find(i=>i.name===c.name))];
  const catOpts=[...new Set(allCats.map(c=>c.name))].map(n=>`<option value="${esc(n)}" ${financeListFilter.category===n?'selected':''}>${esc(n)}</option>`).join('');

  let list=financeTx.slice();
  if(financeListFilter.type!=='all') list=list.filter(t=>t.type===financeListFilter.type);
  if(financeListFilter.category!=='all') list=list.filter(t=>t.category===financeListFilter.category);
  if(financeListFilter.month!=='all') list=list.filter(t=>finMonthKey(t.date)===financeListFilter.month);
  if(financeListFilter.q) list=list.filter(t=>(t.note||'').toLowerCase().includes(financeListFilter.q.toLowerCase())||(t.category||'').includes(financeListFilter.q));
  list.sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0) || (b.date+b.createdAt).localeCompare(a.date+a.createdAt));

  const totalIncome=list.filter(t=>t.type==='income').reduce((s,t)=>s+Number(t.amount||0),0);
  const totalExpense=list.filter(t=>t.type==='expense').reduce((s,t)=>s+Number(t.amount||0),0);

  return `
    <div class="fin-list-filters">
      <select onchange="financeListFilter.type=this.value;renderFinancePage()">
        <option value="all" ${financeListFilter.type==='all'?'selected':''}>全部類型</option>
        <option value="income" ${financeListFilter.type==='income'?'selected':''}>只看收入</option>
        <option value="expense" ${financeListFilter.type==='expense'?'selected':''}>只看支出</option>
      </select>
      <select onchange="financeListFilter.category=this.value;renderFinancePage()">
        <option value="all">全部分類</option>${catOpts}
      </select>
      <select onchange="financeListFilter.month=this.value;renderFinancePage()">
        <option value="all">全部月份</option>${monthOpts}
      </select>
      <input type="text" placeholder="搜尋備註或分類..." value="${esc(financeListFilter.q)}" oninput="financeListFilter.q=this.value;renderFinancePage()"/>
    </div>
    <div style="display:flex;gap:16px;margin-bottom:14px;font-size:12px;color:var(--text2)">
      <span>共 <strong>${list.length}</strong> 筆</span>
      <span style="color:#1D9E75">收入 ${fmtMoney(totalIncome)}</span>
      <span style="color:#E24B4A">支出 ${fmtMoney(totalExpense)}</span>
      <span>結餘 ${fmtMoney(totalIncome-totalExpense,true)}</span>
    </div>
    ${list.length ? `<div class="fin-tx-list">${list.map(t=>finTxCardHTML(t)).join('')}</div>` : `<div class="fin-empty"><i class="ti ti-filter-off" style="font-size:32px;display:block;margin-bottom:10px;opacity:.3"></i>沒有符合條件的紀錄</div>`}`;
}

// ── 月曆模式 ──
function finCalendarHTML(){
  const y=financeCalMonth.getFullYear(), m=financeCalMonth.getMonth();
  const first=new Date(y,m,1), startDow=first.getDay();
  const daysInMonth=new Date(y,m+1,0).getDate();
  const todayStr=fmtDate(new Date());

  const dayTotals={};
  financeTx.forEach(t=>{
    if(t.date && t.date.slice(0,7)===`${y}-${pad2(m+1)}`){
      dayTotals[t.date]=(dayTotals[t.date]||0)+(t.type==='income'?Number(t.amount):-Number(t.amount));
    }
  });

  let cells='';
  for(let i=0;i<startDow;i++) cells+='<div class="fin-cal-cell empty"></div>';
  for(let d=1;d<=daysInMonth;d++){
    const dateStr=`${y}-${pad2(m+1)}-${pad2(d)}`;
    const net=dayTotals[dateStr]||0;
    cells+=`<div class="fin-cal-cell${dateStr===todayStr?' today':''}${dateStr===financeCalSelectedDay?' selected':''}" onclick="finCalSelectDay('${dateStr}')">
      <div class="fin-cal-daynum">${d}</div>
      ${net!==0?`<div class="fin-cal-net ${net>=0?'pos':'neg'}">${net>=0?'+':''}${Math.round(net).toLocaleString('zh-TW')}</div>`:''}
    </div>`;
  }

  const daySelHTML = financeCalSelectedDay ? (()=>{
    const list=financeTx.filter(t=>t.date===financeCalSelectedDay).sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||''));
    return `<div class="fin-cal-daylist">
      <div class="fin-section-title" style="margin-bottom:10px"><i class="ti ti-calendar-event" style="font-size:13px"></i>${esc(financeCalSelectedDay)} 的收支</div>
      ${list.length?`<div class="fin-tx-list">${list.map(t=>finTxCardHTML(t)).join('')}</div>`:`<div style="font-size:12px;color:var(--text3)">這天還沒有紀錄</div>`}
    </div>`;
  })() : '';

  return `
    <div class="fin-card">
      <div class="fin-cal-head">
        <button class="icon-btn" onclick="finCalNav(-1)"><i class="ti ti-chevron-left"></i></button>
        <div class="fin-cal-head-title">${y} / ${pad2(m+1)}</div>
        <button class="icon-btn" onclick="finCalNav(1)"><i class="ti ti-chevron-right"></i></button>
      </div>
      <div class="fin-cal-grid">
        ${['日','一','二','三','四','五','六'].map(d=>`<div class="fin-cal-dow">${d}</div>`).join('')}
        ${cells}
      </div>
    </div>
    ${daySelHTML}`;
}
function finCalNav(dir){ financeCalMonth=finAddMonths(financeCalMonth,dir); financeCalSelectedDay=null; renderFinancePage(); }
function finCalSelectDay(dateStr){ financeCalSelectedDay = financeCalSelectedDay===dateStr ? null : dateStr; renderFinancePage(); }

function finCalcHistoryHTML(){
  if(!finCalcHistory.length) return '<div style="color:var(--text3)">尚無計算紀錄</div>';

function finCalcRenderDisplay(){
  const dEl=document.getElementById('fin-calc-display'); if(!dEl) return;
  const eEl=document.getElementById('fin-calc-expr');
  dEl.textContent = finCalcExpr ? finCalcExpr.split(/(?=[+\-×÷])/).pop() : '0';
  if(eEl) eEl.textContent = finCalcExpr;
}
function finCalcInput(k){
  if(k==='C'){ finCalcExpr=''; }
  else if(k==='⌫'){ finCalcExpr=finCalcExpr.slice(0,-1); }
  else if(k==='='){
    try{
      let expr=finCalcExpr.replace(/×/g,'*').replace(/÷/g,'/').replace(/%/g,'/100');
      if(!expr) return;
      // eslint-disable-next-line no-eval
      const result=Function('"use strict";return ('+expr+')')();
      const resultStr = (Math.round(result*10000)/10000).toString();
      finCalcHistory.push({expr:finCalcExpr, result:resultStr});
      finCalcExpr=resultStr;
    }catch(e){ finCalcExpr='錯誤'; }
  } else {
    if(finCalcExpr==='錯誤') finCalcExpr='';
    finCalcExpr+=k;
  }
  finCalcRenderDisplay();
  const hEl=document.getElementById('fin-calc-history'); if(hEl) hEl.innerHTML=finCalcHistoryHTML();
}
function finCalcUseHistory(val){ finCalcExpr=val; finCalcRenderDisplay(); }

function finCalcGoal(){
  const target=parseFloat(document.getElementById('fin-goal-target').value)||0;
  const monthly=parseFloat(document.getElementById('fin-goal-monthly').value)||0;
  const dateStr=document.getElementById('fin-goal-date').value;

  const remaining=Math.max(0,target-current);
  const monthsNeeded=Math.ceil(remaining/monthly);
  const progress=Math.min(100, (current/target*100));

  document.getElementById('fin-goal-result').innerHTML=`

function finCalcCompound(){
  const P=parseFloat(document.getElementById('fin-cmp-principal').value)||0;
  const PMT=parseFloat(document.getElementById('fin-cmp-monthly').value)||0;
  const rate=parseFloat(document.getElementById('fin-cmp-rate').value)||0;
  const years=parseFloat(document.getElementById('fin-cmp-years').value)||0;
  if(!years){ toast('請輸入投資年數'); return; }
  const r=rate/100/12, n=years*12;
  let fv;
  if(r===0){ fv=P+PMT*n; } else { fv=P*Math.pow(1+r,n) + PMT*((Math.pow(1+r,n)-1)/r); }
  const totalInvested=P+PMT*n;
  const totalInterest=fv-totalInvested;
  document.getElementById('fin-cmp-result').innerHTML=`
    <div class="fin-tool-result">
      <div class="fin-tool-result-item"><div class="fin-tool-result-label">預估最終資產</div><div class="fin-tool-result-val">${fmtMoney(fv)}</div></div>
      <div class="fin-tool-result-item"><div class="fin-tool-result-label">總投入本金</div><div class="fin-tool-result-val">${fmtMoney(totalInvested)}</div></div>
      <div class="fin-tool-result-item"><div class="fin-tool-result-label">預估獲利</div><div class="fin-tool-result-val" style="color:#1D9E75">${fmtMoney(totalInterest)}</div></div>
    </div>`;
}

function finCalcLoan(){

  const rate=parseFloat(document.getElementById('fin-loan-rate').value)||0;
  const years=parseFloat(document.getElementById('fin-loan-years').value)||0;

  const r=rate/100/12, n=years*12;

  if(r===0){ monthly=P/n; } else { monthly=P*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1); }

// 6) 收支預測
function finToolForecastHTML(){
  return `<button class="btn-primary" onclick="finCalcForecast()">依歷史紀錄自動預估</button>
    <div id="fin-forecast-result"></div>
    <div class="fin-tool-note">此為根據過去交易紀錄的粗略估算，並非保證，僅供財務規劃參考。</div>`;
}
function finCalcForecast(){
  const now=new Date();
  const thisMK=finMonthKeyOf(now);
  const cur=finSummaryOf(thisMK);
  const daysInMonth=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
  const daysElapsed=now.getDate();
  const daysRemaining=daysInMonth-daysElapsed;
  const dailyNet=daysElapsed>0 ? cur.balance/daysElapsed : 0;
  const endOfMonth=cur.balance + dailyNet*daysRemaining;

  const last3=[1,2,3].map(i=>finSummaryOf(finMonthKeyOf(finAddMonths(now,-i))));
  const avgExpense3=last3.reduce((s,m)=>s+m.expense,0)/3;
  const avgNet3=last3.reduce((s,m)=>s+m.balance,0)/3;

  const totalBalanceAllTime=financeTx.reduce((s,t)=>s+(t.type==='income'?Number(t.amount):-Number(t.amount)),0);
  const monthsLeftInYear=11-now.getMonth();
  const yearEndEstimate=totalBalanceAllTime + avgNet3*monthsLeftInYear;

  document.getElementById('fin-forecast-result').innerHTML=`
    <div class="fin-tool-result">
      <div class="fin-tool-result-item"><div class="fin-tool-result-label">本月底預估結餘</div><div class="fin-tool-result-val" style="color:${endOfMonth>=0?'#1D9E75':'#E24B4A'}">${fmtMoney(endOfMonth,true)}</div></div>
      <div class="fin-tool-result-item"><div class="fin-tool-result-label">下月可能支出</div><div class="fin-tool-result-val">${fmtMoney(avgExpense3)}</div></div>
      <div class="fin-tool-result-item"><div class="fin-tool-result-label">年底預估總存款</div><div class="fin-tool-result-val">${fmtMoney(yearEndEstimate,true)}</div></div>
    </div>`;
}

          <div class="shop-sum-foot">本週新增 ${newThisWeek.filter(i=>i.status==='purchased').length} 件</div>
        </div>
      </div>

      <div class="shop-tabs" id="shop-tabs"></div>

      <div class="shop-toolbar">
        <div class="shop-search-wrap"><i class="ti ti-search"></i><input placeholder="搜尋商品 / 商店 / 標籤..." value="${esc(shoppingSearchQ)}" oninput="shopSetSearch(this.value)"/></div>
        <div class="shop-price-range">
          <input type="number" placeholder="最低價" value="${shoppingFilters.min!=null?shoppingFilters.min:''}" oninput="shopSetPriceFilter('min',this.value)"/>
          <span style="color:var(--text3);font-size:11px">–</span>
          <input type="number" placeholder="最高價" value="${shoppingFilters.max!=null?shoppingFilters.max:''}" oninput="shopSetPriceFilter('max',this.value)"/>
        </div>
        <div class="shop-filter-chip${shoppingFilters.fav?' active':''}" onclick="shopToggleQuickFilter('fav')"><i class="ti ti-heart"></i>僅收藏</div>
        <div class="shop-filter-chip${shoppingFilters.unpurchased?' active':''}" onclick="shopToggleQuickFilter('unpurchased')"><i class="ti ti-shopping-cart"></i>僅未購買</div>
        <div class="shop-viewswitch">
          <button class="shop-view-btn${shoppingViewMode==='card'?' active':''}" onclick="setShoppingViewMode('card')" title="卡片模式"><i class="ti ti-layout-grid"></i></button>
          <button class="shop-view-btn${shoppingViewMode==='list'?' active':''}" onclick="setShoppingViewMode('list')" title="清單模式"><i class="ti ti-list"></i></button>
          <button class="shop-view-btn${shoppingViewMode==='kanban'?' active':''}" onclick="setShoppingViewMode('kanban')" title="看板模式"><i class="ti ti-layout-kanban"></i></button>
        </div>
      </div>

      <div id="shop-content"></div>
    </div>`;
  renderShopTabs();
  renderShopContent();
}

function renderShopTabs(){
  const el=document.getElementById('shop-tabs'); if(!el) return;
  const wishlistCount = shoppingItems.filter(i=>i.wishlist).length;
  const fixedTabs=[{key:'all',label:'全部',count:shoppingItems.length},{key:'wishlist',label:'願望清單',count:wishlistCount}];
  let html = fixedTabs.map(t=>`<div class="shop-tab${shoppingActiveTab===t.key?' active':''}" onclick="shopSetTab('${esc(t.key)}')">${esc(t.label)} (${t.count})</div>`).join('');
  html += shoppingCats.map((c,idx)=>{
    const count=shoppingItems.filter(i=>i.category===c.name).length;
    return `<div class="shop-tab${shoppingActiveTab===c.name?' active':''}"
        draggable="true" ondragstart="shopCatDragStart(event,${idx})" ondragover="event.preventDefault()" ondrop="shopCatDrop(event,${idx})"
        onclick="shopSetTab('${esc(c.name)}')" ondblclick="event.stopPropagation();shopRenameCat('${esc(c.name)}')" title="雙擊改名，拖曳排序">
        ${esc(c.name)} (${count})<i class="ti ti-x" onclick="event.stopPropagation();shopDeleteCat('${esc(c.name)}')" title="刪除分類"></i>
      </div>`;
  }).join('');
  html += `<button class="shop-tab-addbtn" title="新增分類" onclick="shopAddCatPrompt()"><i class="ti ti-plus"></i></button>`;
  el.innerHTML = html;
}
function shopSetTab(key){ shoppingActiveTab=key; shopTimeSectionExpand=null; renderShopTabs(); renderShopContent(); }
function shopAddCatPrompt(){
  const name=prompt('新分類名稱：'); if(!name || !name.trim()) return;
  const val=name.trim();
  if(shoppingCats.find(c=>c.name===val)){ toast('分類已存在'); return; }
  shoppingCats.push({name:val, color:SHOP_CAT_COLORS[shoppingCats.length%SHOP_CAT_COLORS.length]});
  saveShoppingCats(); renderShopTabs(); renderFixedNav();
}
function shopRenameCat(name){
  const val=prompt('分類名稱：', name); if(!val || !val.trim() || val.trim()===name) return;
  const newName=val.trim();
  if(shoppingCats.find(c=>c.name===newName)){ toast('分類名稱重複'); return; }
  const cat=shoppingCats.find(c=>c.name===name); if(cat) cat.name=newName;
  shoppingItems.forEach(i=>{ if(i.category===name) i.category=newName; });
  if(shoppingActiveTab===name) shoppingActiveTab=newName;
  saveShoppingCats(); saveShoppingItems(); renderShoppingPage();
}
function shopDeleteCat(name){
  if(!confirm(`確定要刪除分類「${name}」？該分類內的商品會變成未分類。`)) return;
  shoppingCats = shoppingCats.filter(c=>c.name!==name);
  shoppingItems.forEach(i=>{ if(i.category===name) i.category=''; });
  if(shoppingActiveTab===name) shoppingActiveTab='all';
  saveShoppingCats(); saveShoppingItems(); renderShoppingPage();
}
let _shopCatDragIdx=null;
function shopCatDragStart(e, idx){ _shopCatDragIdx=idx; e.dataTransfer.effectAllowed='move'; }
function shopCatDrop(e, idx){
  e.preventDefault();
  if(_shopCatDragIdx===null || _shopCatDragIdx===idx){ _shopCatDragIdx=null; return; }
  const moved=shoppingCats.splice(_shopCatDragIdx,1)[0];
  shoppingCats.splice(idx,0,moved);
  _shopCatDragIdx=null;
  saveShoppingCats(); renderShopTabs();
}

function shopSetSearch(v){ shoppingSearchQ=v; shopTimeSectionExpand=null; renderShopContent(); }
function shopSetPriceFilter(which, val){ shoppingFilters[which] = val!==''? Number(val) : null; renderShopContent(); }
function shopToggleQuickFilter(key){
  shoppingFilters[key] = !shoppingFilters[key];
  renderShoppingPage();
}
function setShoppingViewMode(mode){
  shoppingViewMode=mode;
  try{ localStorage.setItem('lv_shopping_viewmode', mode); }catch(e){}
  renderShoppingPage();
}

function renderShopContent(){
  const el=document.getElementById('shop-content'); if(!el) return;
  const list = shopSortList(shopFilteredList());
  if(!list.length){
    el.innerHTML = `<div class="shop-empty"><i class="ti ti-shopping-cart-off" style="font-size:32px;display:block;margin-bottom:10px"></i>目前沒有符合條件的商品<br>點擊右上角「新增商品」開始收藏你的第一件商品吧！</div>`;
    return;
  }
  if(shoppingViewMode==='list'){ el.innerHTML = shopRenderListView(list); return; }
  if(shoppingViewMode==='kanban'){ el.innerHTML = shopRenderKanbanView(list); return; }

  const noExtraFilter = !shoppingSearchQ && !shoppingFilters.fav && !shoppingFilters.unpurchased && !shoppingFilters.purchasedOnly && shoppingFilters.min==null && shoppingFilters.max==null;
  if(shoppingActiveTab==='all' && noExtraFilter){
    if(shopTimeSectionExpand){
      const now=Date.now(), wk=86400000*7;
      let filtered, title=shopTimeSectionExpand.title;
      if(shopTimeSectionExpand.key==='thisweek') filtered=list.filter(i=>now-(i.addedAt||0)<wk);
      else if(shopTimeSectionExpand.key==='lastweek') filtered=list.filter(i=>now-(i.addedAt||0)>=wk && now-(i.addedAt||0)<wk*2);
      else filtered=list.filter(i=>now-(i.addedAt||0)>=wk*2);
      el.innerHTML = `<div class="shop-section-head"><div class="shop-section-title">${title}</div><div class="shop-section-link" onclick="shopCollapseTimeSection()">← 返回分區顯示</div></div><div class="shop-grid">${filtered.map(shopCardHTML).join('')}</div>`;
      return;
    }
    el.innerHTML = shopRenderTimeSections(list);
    return;
  }
  el.innerHTML = `<div class="shop-grid">${list.map(shopCardHTML).join('')}</div>`;
}
function shopCollapseTimeSection(){ shopTimeSectionExpand=null; renderShopContent(); }
function shopViewAllSection(key,title){ shopTimeSectionExpand={key,title}; renderShopContent(); }

function shopRenderTimeSections(list){
  const now=Date.now(), wk=86400000*7;
  const thisWeek=list.filter(i=>now-(i.addedAt||0)<wk);
  const lastWeek=list.filter(i=>now-(i.addedAt||0)>=wk && now-(i.addedAt||0)<wk*2);
  const older=list.filter(i=>now-(i.addedAt||0)>=wk*2);
  const sec=(title,items,key)=>{
    if(!items.length) return '';
    const shown=items.slice(0,10);
    return `<div class="shop-section">
      <div class="shop-section-head"><div class="shop-section-title">${title}</div>${items.length>10?`<div class="shop-section-link" onclick="shopViewAllSection('${key}','${title}')">查看全部 (${items.length})</div>`:''}</div>
      <div class="shop-row-scroll">${shown.map(shopCardHTML).join('')}</div>
    </div>`;
  };
  const out = sec('🔥 本週新增', thisWeek, 'thisweek') + sec('🕒 上週新增', lastWeek, 'lastweek') + sec('📦 更早新增', older, 'older');
  return out || `<div class="shop-empty">目前沒有商品</div>`;
}

function shopCardHTML(it){
  const status=shopStatusDef(it.status);
  const catColor = it.category ? shopCatColor(it.category) : null;
  const domain = shopDomain(it.url);
  const img = it.image
    ? `<img src="${esc(it.image)}" onerror="this.parentElement.innerHTML='<div class=\\'shop-card-noimg\\'><i class=\\'ti ti-photo\\'></i></div>'"/>`
    : `<div class="shop-card-noimg">${domain?`<img src="https://www.google.com/s2/favicons?domain=${esc(domain)}&sz=64" style="width:32px;height:32px" onerror="this.style.display='none'"/>`:'<i class="ti ti-shopping-bag"></i>'}</div>`;
  const hasHistory = it.priceHistory && it.priceHistory.length;
  const lastRecorded = hasHistory ? Number(it.priceHistory[it.priceHistory.length-1].price) : null;
  const priceDrop = hasHistory && it.price!=null && lastRecorded > Number(it.price);
  const lowest = hasHistory ? Math.min(...it.priceHistory.map(h=>Number(h.price)), it.price!=null?Number(it.price):Infinity) : null;
  return `<div class="shop-card" data-id="${it.id}">
    <div class="shop-card-imgwrap" onclick="openShoppingViewModal('${it.id}')">
      ${img}
      <div class="shop-card-badges">
        ${it.wishlist?`<span class="shop-card-badge"><i class="ti ti-heart-filled" style="font-size:9px"></i>願望</span>`:''}
        ${priceDrop?`<span class="shop-card-badge drop"><i class="ti ti-trending-down" style="font-size:9px"></i>降價</span>`:''}
      </div>
      <div class="shop-card-top-actions" onclick="event.stopPropagation()">
        <button class="shop-card-icon-btn fav${it.favorite?' active':''}" onclick="shopToggleFav('${it.id}')" title="收藏"><i class="ti ${it.favorite?'ti-heart-filled':'ti-heart'}"></i></button>
        <button class="shop-card-icon-btn pin${it.pinned?' active':''}" onclick="shopTogglePin('${it.id}')" title="置頂"><i class="ti ti-pin"></i></button>
        <button class="shop-card-icon-btn" onclick="shopToggleMenu(event,'${it.id}')" title="更多"><i class="ti ti-dots"></i></button>
      </div>
    </div>
    <div class="shop-card-body">
      <div class="shop-card-name" onclick="openShoppingViewModal('${it.id}')" title="${esc(it.name||'')}">${esc(it.name||'未命名商品')}</div>
      <div class="shop-card-store">${it.store?`<i class="ti ti-building-store" style="font-size:10px"></i>${esc(it.store)}`:domain?`<i class="ti ti-world" style="font-size:10px"></i>${esc(domain)}`:''}${it.brand?` · ${esc(it.brand)}`:''}</div>
      ${it.price!=null?`<div class="shop-card-price-row"><span class="shop-card-price">${fmtMoney(it.price)}</span>${lowest!==null && lowest<Number(it.price)?`<span class="shop-card-price-old">歷史低 ${fmtMoney(lowest)}</span>`:''}</div>`:''}
      <div class="shop-card-meta-row">
        ${it.category?`<span class="shop-cat-chip" style="background:${catColor}22;color:${catColor}">${esc(it.category)}</span>`:'<span></span>'}
        <span class="shop-card-date">${shopFmtDateShort(it.addedAt)}</span>
      </div>
      ${it.note?`<div class="shop-card-note">${esc(it.note)}</div>`:''}
      <div class="shop-card-status" style="background:${status.color}1c;color:${status.color}">${status.label}</div>
    </div>
  </div>`;
}

function shopToggleFav(id){ const it=shoppingItems.find(i=>i.id===id); if(!it) return; it.favorite=!it.favorite; saveShoppingItems(); renderShoppingPage(); }
function shopTogglePin(id){ const it=shoppingItems.find(i=>i.id===id); if(!it) return; it.pinned=!it.pinned; saveShoppingItems(); renderShopContent(); }

function shopCloseMenus(){ document.querySelectorAll('.shop-menu').forEach(m=>m.remove()); }
function shopToggleMenu(e, id){
  e.stopPropagation();
  const already = e.currentTarget.closest('.shop-card, .shop-kanban-card')?.querySelector('.shop-menu');
  shopCloseMenus();
  if(already) return;
  const card = e.currentTarget.closest('.shop-card') || e.currentTarget.closest('.shop-kanban-card');
  if(!card) return;
  const it=shoppingItems.find(i=>i.id===id); if(!it) return;
  const menu=document.createElement('div');
  menu.className='shop-menu';
  menu.onclick=ev=>ev.stopPropagation();
  menu.innerHTML=`
    <button onclick="openShoppingEditModal('${id}');shopCloseMenus()"><i class="ti ti-edit"></i>編輯</button>
    <button onclick="shopCopyLink('${id}')"><i class="ti ti-copy"></i>複製連結</button>
    <button onclick="window.open('${esc(it.url||'')}','_blank');shopCloseMenus()"><i class="ti ti-external-link"></i>開啟原商品頁</button>
    <button onclick="openShopMoveCatModal('${id}')"><i class="ti ti-folder-symlink"></i>移動分類</button>
    <button onclick="shopMarkPurchased('${id}')"><i class="ti ti-check"></i>標記已購買</button>
    <button class="danger" onclick="shopDeleteItem('${id}')"><i class="ti ti-trash"></i>刪除</button>
  `;
  card.appendChild(menu);
  setTimeout(()=>document.addEventListener('click', shopCloseMenus, {once:true}), 0);
}
function shopCopyLink(id){ const it=shoppingItems.find(i=>i.id===id); if(!it) return; navigator.clipboard?.writeText(it.url||'').then(()=>toast('✅ 已複製連結')); shopCloseMenus(); }
function shopMarkPurchased(id){ const it=shoppingItems.find(i=>i.id===id); if(!it) return; it.status='purchased'; it.purchasedAt=Date.now(); saveShoppingItems(); shopCloseMenus(); renderShoppingPage(); toast('✅ 已標記為已購買'); }
function shopDeleteItem(id){
  if(!confirm('確定要刪除這件商品？（可到回收桶復原）')) return;
  const it = shoppingItems.find(i=>i.id===id);
  if(it) moveToTrash('shopping', '購物', '🛒', it.name||'購物項目', it);
  shoppingItems=shoppingItems.filter(i=>i.id!==id); saveShoppingItems(); shopCloseMenus(); renderShoppingPage(); renderFixedNav(); renderSidebarExtras();

async function shopAutoFetch(evt){
  const urlInp=document.getElementById('shop-f-url');
  const url=urlInp?urlInp.value.trim():'';
  if(!url){ toast('請先貼上商品連結'); return; }
  const btn=(evt&&evt.target)?evt.target.closest('button'):null;
  const orig = btn?btn.innerHTML:'';
  if(btn){ btn.innerHTML='擷取中…'; btn.disabled=true; }
  let img='', title='', publisher='';
  try{
    const res=await fetch(`https://api.microlink.io/?url=${encodeURIComponent(url)}&meta=true`);
    const data=await res.json();
    if(data.status==='success'){
      img = data.data?.image?.url || '';
      title = data.data?.title || '';
      publisher = data.data?.publisher || '';
    }
  }catch(e){}
  if(!img){
    try{ const domain=new URL(url).hostname; img=`https://www.google.com/s2/favicons?domain=${domain}&sz=128`; }catch(e){}
  }
  if(!title){ title = shopDomain(url); }
  const nameInp=document.getElementById('shop-f-name'), storeInp=document.getElementById('shop-f-store');
  if(nameInp && !nameInp.value) nameInp.value=title;
  if(storeInp && !storeInp.value) storeInp.value=publisher;
  if(img){
    const wrap=document.getElementById('shop-modal-imgpreview'), imgEl=document.getElementById('shop-modal-img');
    if(wrap && imgEl){ imgEl.src=img; wrap.style.display=''; }
    window._shopAutoImg = img;
  }
  if(btn){ btn.innerHTML=orig; btn.disabled=false; }
  toast(img||title?'✅ 已自動擷取商品資訊':'⚠️ 無法取得資訊，請手動填寫');
}

function shopSaveItem(){
  const url=document.getElementById('shop-f-url').value.trim();
  if(!url){ toast('請輸入商品連結'); return; }
  const name=document.getElementById('shop-f-name').value.trim() || shopDomain(url) || '未命名商品';
  const store=document.getElementById('shop-f-store').value.trim();
  const brand=document.getElementById('shop-f-brand').value.trim();
  const priceVal=document.getElementById('shop-f-price').value;
  const price = priceVal!==''? Number(priceVal) : null;
  const category=document.getElementById('shop-f-cat').value;
  const tags=document.getElementById('shop-f-tags').value.split(',').map(t=>t.trim()).filter(Boolean);
  const note=document.getElementById('shop-f-note').value.trim();
  const favorite=document.getElementById('shop-f-fav').checked;
  const wishlist=document.getElementById('shop-f-wishlist').checked;
  const imgEl=document.getElementById('shop-modal-img');
  const img = (imgEl && imgEl.getAttribute('src')) ? imgEl.getAttribute('src') : '';

  if(shoppingEditId){
    const it=shoppingItems.find(i=>i.id===shoppingEditId); if(!it){ closeModal(); return; }
    if(price!=null && it.price!=null && Number(price)!==Number(it.price)){
      it.priceHistory = it.priceHistory || [];
      it.priceHistory.push({date:Date.now(), price:it.price});
    }
    it.url=url; it.name=name; it.store=store; it.brand=brand;
    if(price!=null) it.price=price;
    it.category=category; it.tags=tags; it.note=note;
    it.favorite=favorite; it.wishlist=wishlist; it.updatedAt=Date.now();
    if(img) it.image=img;
    const statusSel=document.getElementById('shop-f-status');
    if(statusSel) it.status=statusSel.value;
    toast('✅ 已儲存變更');
  } else {
    const id='shop_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,5);
    shoppingItems.push({
      id, url, name, store, brand, price, category, tags, note,
      favorite, wishlist, pinned:false, status:'todo',
      image: img || window._shopAutoImg || '',
      addedAt: Date.now(), purchasedAt:null, priceHistory:[]
    });
    toast('✅ 已新增商品');
  }
  window._shopAutoImg='';
  saveShoppingItems(); closeModal(); renderShoppingPage(); renderFixedNav();
}

function shopRenderListView(list){
  return `<div class="shop-list">${list.map(it=>{
    const status=shopStatusDef(it.status);
    const domain=shopDomain(it.url);
    const thumb = it.image || (domain?`https://www.google.com/s2/favicons?domain=${domain}&sz=64`:'');
    return `<div class="shop-list-row">
      ${thumb?`<img class="shop-list-thumb" src="${esc(thumb)}" onerror="this.style.visibility='hidden'"/>`:`<div class="shop-list-thumb"></div>`}
      <div class="shop-list-name" title="${esc(it.name||'')}" onclick="openShoppingViewModal('${it.id}')" style="cursor:pointer">${esc(it.name||'未命名商品')}</div>
      <div class="shop-list-store">${esc(it.store||domain||'')}</div>
      <div class="shop-list-price">${it.price!=null?fmtMoney(it.price):'—'}</div>
      <div class="shop-list-cat">${it.category?`<span class="shop-cat-chip" style="background:${shopCatColor(it.category)}22;color:${shopCatColor(it.category)}">${esc(it.category)}</span>`:''}</div>
      <div class="shop-list-date">${shopFmtDateShort(it.addedAt)}</div>
      <div class="shop-list-status" style="color:${status.color}">${status.label}</div>
      <div class="shop-list-actions">
        <button class="icon-btn" onclick="shopToggleFav('${it.id}')" title="收藏"><i class="ti ${it.favorite?'ti-heart-filled':'ti-heart'}" style="${it.favorite?'color:#E24B4A':''}"></i></button>
        <button class="icon-btn" onclick="openShoppingEditModal('${it.id}')" title="編輯"><i class="ti ti-edit"></i></button>
        <button class="icon-btn" onclick="shopDeleteItem('${it.id}')" title="刪除"><i class="ti ti-trash"></i></button>
      </div>
    </div>`;
  }).join('')}</div>`;
}

function shopRenderKanbanView(list){
  return `<div class="shop-kanban">${SHOP_STATUS_DEFS.map(s=>{
    const items=list.filter(i=>i.status===s.key);
    return `<div class="shop-kanban-col" data-status="${s.key}" ondragover="event.preventDefault();this.classList.add('drag-over')" ondragleave="this.classList.remove('drag-over')" ondrop="shopKanbanDrop(event,'${s.key}')">
      <div class="shop-kanban-head"><span>${s.label}</span><span>${items.length}</span></div>
      ${items.map(it=>`<div class="shop-kanban-card" draggable="true" data-id="${it.id}" ondragstart="shopKanbanDragStart(event,'${it.id}')" ondragend="this.classList.remove('dragging')" onclick="openShoppingViewModal('${it.id}')">
        ${it.image?`<img src="${esc(it.image)}" onerror="this.style.display='none'"/>`:''}
        <div style="min-width:0;flex:1">
          <div class="shop-kanban-card-name">${esc(it.name||'未命名商品')}</div>
          ${it.price!=null?`<div class="shop-kanban-card-price">${fmtMoney(it.price)}</div>`:''}
        </div>
      </div>`).join('')}
    </div>`;
  }).join('')}</div>`;
}
let _shopKanbanDragId=null;
function shopKanbanDragStart(e, id){ _shopKanbanDragId=id; e.dataTransfer.effectAllowed='move'; e.target.classList.add('dragging'); }
function shopKanbanDrop(e, statusKey){
  e.preventDefault();
  document.querySelectorAll('.shop-kanban-col').forEach(c=>c.classList.remove('drag-over'));
  if(!_shopKanbanDragId) return;
  const it=shoppingItems.find(i=>i.id===_shopKanbanDragId);
  if(it){ it.status=statusKey; if(statusKey==='purchased') it.purchasedAt=Date.now(); saveShoppingItems(); renderShopContent(); renderFixedNav(); }
  _shopKanbanDragId=null;
}

function checkQlBookmarkletParams(){
  const params=new URLSearchParams(window.location.search);
  const qlUrl=params.get('ql_url');
  if(!qlUrl) return;
  const qlTitle=params.get('ql_title')?decodeURIComponent(params.get('ql_title')):'';
  let url=decodeURIComponent(qlUrl);
  if(!/^https?:\/\//i.test(url)) url='https://'+url;
  if(!quicklinks.find(q=>q.url===url)){
    const id='ql_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,5);
    quicklinks.push({id, url, label:qlTitle, group:'一般'});
    saveQuicklinks(); renderFixedNav();
    toast('✅ 已加入常用連結：'+(qlTitle||url));
  }
  history.replaceState({},'',location.pathname);
  if(window.opener){ setTimeout(()=>window.close(),1200); }
}

function lcLoad(mod){
  const cfg=LC_CONFIG[mod], st=lcState[mod];
  try{ st.items = JSON.parse(localStorage.getItem(cfg.itemsKey)||'[]'); }catch(e){ st.items=[]; }
  try{ st.cats = JSON.parse(localStorage.getItem(cfg.catsKey)||'[]'); }catch(e){ st.cats=[]; }
  if(!st.cats.length) st.cats = cfg.defaultCats.map(c=>({...c}));
  try{ st.viewMode = localStorage.getItem(cfg.viewKey) || 'card'; }catch(e){}
  try{ const b=JSON.parse(localStorage.getItem(cfg.budgetKey)||'null'); st.budget = b || {amount:0}; }catch(e){ st.budget={amount:0}; }
}
function lcSaveItems(mod){ localStorage.setItem(LC_CONFIG[mod].itemsKey, JSON.stringify(lcState[mod].items)); }
function lcSaveCats(mod){ localStorage.setItem(LC_CONFIG[mod].catsKey, JSON.stringify(lcState[mod].cats)); }
function lcSaveView(mod){ try{ localStorage.setItem(LC_CONFIG[mod].viewKey, lcState[mod].viewMode); }catch(e){} }
function lcSaveBudget(mod){ localStorage.setItem(LC_CONFIG[mod].budgetKey, JSON.stringify(lcState[mod].budget)); }

function lcSelect(mod){
  state.view = 'lc_'+mod; state.showDue=false; state.activeCat=null;
  state.selected.clear(); render();
}

function lcStatusDef(mod, key){ const d=LC_CONFIG[mod].statusDefs; return d.find(s=>s.key===key) || d[0]; }
function lcCatColor(mod, name){ const c=lcState[mod].cats.find(c=>c.name===name); return c?c.color:'#9B59B6'; }
function lcDomain(url){ try{ return new URL(url).hostname.replace(/^www\./,''); }catch(e){ return ''; } }
function lcFmtDateShort(ts){ const d=new Date(ts||Date.now()); return `${d.getMonth()+1}/${d.getDate()}`; }

function lcMatches(mod, it){
  const st=lcState[mod];
  if(st.quickFilter){
    const sec=LC_CONFIG[mod].quickSections.find(s=>s.key===st.quickFilter);
    if(sec && !sec.filter(it)) return false;
  }
  if(st.searchQ){
    const q=st.searchQ.toLowerCase();
    const hay=[it.name,it.location,it.note,it.type,...(it.tags||[])].join(' ').toLowerCase();
    if(!hay.includes(q)) return false;
  }
  if(st.activeTab!=='all' && it.type!==st.activeTab) return false;
  return true;
}
function lcFilteredList(mod){ return lcState[mod].items.filter(it=>lcMatches(mod,it)); }
function lcSortList(list){
  const l=[...list];
  l.sort((a,b)=>{ if(!!a.pinned!==!!b.pinned) return a.pinned?-1:1; return (b.addedAt||0)-(a.addedAt||0); });
  return l;
}

function lcRenderPage(mod){
  const cfg=LC_CONFIG[mod], st=lcState[mod];
  const el=document.getElementById(mod+'-page'); if(!el) return;
  const sumCards = cfg.quickSections.map(sec=>{
    const cnt = st.items.filter(sec.filter).length;
    return `<div class="lc-sum-card${st.quickFilter===sec.key?' active':''}" onclick="lcToggleQuickFilter('${mod}','${sec.key}')">
      <div class="lc-sum-icon" style="background:${cfg.accent}1c;color:${cfg.accent}"><i class="ti ${sec.icon}"></i></div>
      <div class="lc-sum-label">${sec.label.replace(/^\S+\s/,'')}</div>
      <div class="lc-sum-amount">${cnt} 筆</div>
      <div class="lc-sum-foot">共 ${st.items.length} 筆收藏</div>
    </div>`;
  }).join('');

  const totalSpent = st.items.reduce((s,i)=>s+(Number(i.amount)||0),0);
  const budgetAmt = st.budget.amount||0;
  const pct = budgetAmt>0 ? Math.min(100, totalSpent/budgetAmt*100) : (totalSpent>0?100:0);
  const overBudget = budgetAmt>0 && totalSpent>budgetAmt;
  const budgetBarHTML = `
    <div class="fin-card" style="margin-bottom:16px;cursor:pointer" onclick="openLcBudgetModal('${mod}')" title="點擊設定預算">
      <div class="fin-cat-bar-row" style="margin-bottom:0">

        <div class="fin-cat-bar-track"><div class="fin-cat-bar-fill" style="width:${pct}%;background:${overBudget?'#E24B4A':cfg.accent}"></div></div>
        <div class="fin-cat-bar-pct">${fmtMoney(totalSpent)}${budgetAmt>0?` / ${fmtMoney(budgetAmt)}`:''}</div>
      </div>
      ${budgetAmt>0 ? (overBudget?`<div style="font-size:11px;color:#E24B4A;margin-top:6px">超出預算 ${fmtMoney(totalSpent-budgetAmt)}</div>`:`<div style="font-size:11px;color:var(--text3);margin-top:6px">預算剩餘 ${fmtMoney(budgetAmt-totalSpent)}</div>`) : `<div style="font-size:11px;color:var(--text3);margin-top:6px">尚未設定預算，點擊設定</div>`}
    </div>`;

  el.innerHTML = `
    <div class="lc-page" style="--lc-accent:${cfg.accent}">
      <div class="lc-header">
        <div class="lc-header-title">${cfg.icon==='ti-map-pin'?'📍 旅遊景點':'🍜 美食紀錄'}</div>
        <button class="fin-quickadd-btn" style="background:${cfg.accent}" onclick="lcOpenAddModal('${mod}')"><i class="ti ti-plus"></i>${cfg.addLabel}</button>
      </div>
      <div class="lc-summary-grid">${sumCards}</div>
      ${budgetBarHTML}
      <div class="lc-tabs" id="lc-tabs-${mod}"></div>
      <div class="lc-toolbar">
        <div class="lc-search-wrap"><i class="ti ti-search"></i><input placeholder="搜尋名稱 / 地點 / 標籤..." value="${esc(st.searchQ)}" oninput="lcSetSearch('${mod}',this.value)"/></div>
        <div class="lc-viewswitch">
          <button class="lc-view-btn${st.viewMode==='card'?' active':''}" onclick="lcSetViewMode('${mod}','card')" title="卡片模式"><i class="ti ti-layout-grid"></i></button>
          <button class="lc-view-btn${st.viewMode==='list'?' active':''}" onclick="lcSetViewMode('${mod}','list')" title="清單模式"><i class="ti ti-list"></i></button>
          <button class="lc-view-btn${st.viewMode==='map'?' active':''}" onclick="lcSetViewMode('${mod}','map')" title="地圖模式"><i class="ti ti-map"></i></button>
        </div>
      </div>
      <div id="lc-content-${mod}"></div>
    </div>`;
  lcRenderTabs(mod);
  lcRenderContent(mod);
}

function lcSaveBudgetModal(mod){
  const v=Number(document.getElementById('lc-budget-input').value)||0;
  lcState[mod].budget={amount:v}; lcSaveBudget(mod); closeModal(); lcRenderPage(mod);

function lcRenderTabs(mod){
  const cfg=LC_CONFIG[mod], st=lcState[mod];
  const el=document.getElementById('lc-tabs-'+mod); if(!el) return;
  let html = `<div class="lc-tab${st.activeTab==='all'?' active':''}" onclick="lcSetTab('${mod}','all')">全部 (${st.items.length})</div>`;
  html += st.cats.map((c,idx)=>{
    const count = st.items.filter(i=>i.type===c.name).length;
    return `<div class="lc-tab${st.activeTab===c.name?' active':''}"
        draggable="true" ondragstart="lcCatDragStart(event,'${mod}',${idx})" ondragover="event.preventDefault()" ondrop="lcCatDrop(event,'${mod}',${idx})"
        onclick="lcSetTab('${mod}','${esc(c.name)}')" ondblclick="event.stopPropagation();lcRenameCat('${mod}','${esc(c.name)}')" title="雙擊改名，拖曳排序">
        ${esc(c.name)} (${count})<i class="ti ti-x" onclick="event.stopPropagation();lcDeleteCat('${mod}','${esc(c.name)}')" title="刪除分類"></i>
      </div>`;
  }).join('');
  html += `<button class="lc-tab-addbtn" title="新增${cfg.typeLabel}" onclick="lcAddCatPrompt('${mod}')"><i class="ti ti-plus"></i></button>`;
  el.innerHTML = html;
}
function lcSetTab(mod,key){ lcState[mod].activeTab=key; lcState[mod].sectionExpand=null; lcRenderTabs(mod); lcRenderContent(mod); }
function lcAddCatPrompt(mod){
  const cfg=LC_CONFIG[mod];
  const name=prompt(`新${cfg.typeLabel}名稱：`); if(!name || !name.trim()) return;
  const val=name.trim();
  if(lcState[mod].cats.find(c=>c.name===val)){ toast('分類已存在'); return; }
  const colors=['#5B4FE0','#E67E22','#1D9E75','#D4537E','#378ADD','#C9A24B','#9B59B6','#E24B4A'];
  lcState[mod].cats.push({name:val, color:colors[lcState[mod].cats.length%colors.length]});
  lcSaveCats(mod); lcRenderTabs(mod); renderFixedNav();
}
function lcRenameCat(mod,name){
  const val=prompt('分類名稱：', name); if(!val || !val.trim() || val.trim()===name) return;
  const newName=val.trim();
  if(lcState[mod].cats.find(c=>c.name===newName)){ toast('分類名稱重複'); return; }
  const cat=lcState[mod].cats.find(c=>c.name===name); if(cat) cat.name=newName;
  lcState[mod].items.forEach(i=>{ if(i.type===name) i.type=newName; });
  if(lcState[mod].activeTab===name) lcState[mod].activeTab=newName;
  lcSaveCats(mod); lcSaveItems(mod); lcRenderPage(mod);
}
function lcDeleteCat(mod,name){
  if(!confirm(`確定要刪除分類「${name}」？該分類內的項目會變成未分類。`)) return;
  lcState[mod].cats = lcState[mod].cats.filter(c=>c.name!==name);
  lcState[mod].items.forEach(i=>{ if(i.type===name) i.type=''; });
  if(lcState[mod].activeTab===name) lcState[mod].activeTab='all';
  lcSaveCats(mod); lcSaveItems(mod); lcRenderPage(mod);
}
let _lcCatDragIdx=null, _lcCatDragMod=null;
function lcCatDragStart(e,mod,idx){ _lcCatDragIdx=idx; _lcCatDragMod=mod; e.dataTransfer.effectAllowed='move'; }
function lcCatDrop(e,mod,idx){
  e.preventDefault();
  if(_lcCatDragMod!==mod || _lcCatDragIdx===null || _lcCatDragIdx===idx){ _lcCatDragIdx=null; return; }
  const moved=lcState[mod].cats.splice(_lcCatDragIdx,1)[0];
  lcState[mod].cats.splice(idx,0,moved);
  _lcCatDragIdx=null;
  lcSaveCats(mod); lcRenderTabs(mod);
}

function lcSetSearch(mod,v){ lcState[mod].searchQ=v; lcState[mod].sectionExpand=null; lcRenderContent(mod); }
function lcToggleQuickFilter(mod,key){
  const st=lcState[mod];
  st.quickFilter = st.quickFilter===key ? null : key;
  lcRenderPage(mod);
}
function lcSetViewMode(mod,mode){ lcState[mod].viewMode=mode; lcSaveView(mod); lcRenderPage(mod); }

function lcRenderContent(mod){
  const cfg=LC_CONFIG[mod], st=lcState[mod];
  const el=document.getElementById('lc-content-'+mod); if(!el) return;
  const list = lcSortList(lcFilteredList(mod));
  if(!list.length){
    el.innerHTML = `<div class="lc-empty"><i class="ti ${cfg.emptyIcon}" style="font-size:32px;display:block;margin-bottom:10px"></i>${cfg.emptyText}</div>`;
    return;
  }
  if(st.viewMode==='list'){ el.innerHTML = lcRenderListView(mod,list); return; }
  if(st.viewMode==='map'){ el.innerHTML = lcRenderMapView(mod,list); return; }

  const noExtraFilter = !st.searchQ && !st.quickFilter;
  if(st.activeTab==='all' && noExtraFilter){
    if(st.sectionExpand){
      const sec=cfg.quickSections.find(s=>s.key===st.sectionExpand);
      const filtered = sec ? st.items.filter(sec.filter) : list;
      el.innerHTML = `<div class="lc-section-head"><div class="lc-section-title">${sec?sec.label:''}</div><div class="lc-section-link" onclick="lcCollapseSection('${mod}')">← 返回分區顯示</div></div><div class="lc-grid">${lcSortList(filtered).map(it=>lcCardHTML(mod,it)).join('')}</div>`;
      return;
    }
    const out = cfg.quickSections.map(sec=>{
      const items = lcSortList(st.items.filter(sec.filter));
      if(!items.length) return '';
      const shown=items.slice(0,10);
      return `<div class="lc-section">
        <div class="lc-section-head"><div class="lc-section-title">${sec.label}</div>${items.length>10?`<div class="lc-section-link" onclick="lcViewAllSection('${mod}','${sec.key}')">查看全部 (${items.length})</div>`:''}</div>
        <div class="lc-row-scroll">${shown.map(it=>lcCardHTML(mod,it)).join('')}</div>
      </div>`;
    }).join('');
    el.innerHTML = out || `<div class="lc-empty">還沒有任何收藏</div>`;
    return;
  }
  el.innerHTML = `<div class="lc-grid">${list.map(it=>lcCardHTML(mod,it)).join('')}</div>`;
}
function lcCollapseSection(mod){ lcState[mod].sectionExpand=null; lcRenderContent(mod); }
function lcViewAllSection(mod,key){ lcState[mod].sectionExpand=key; lcRenderContent(mod); }

function lcCardHTML(mod, it){
  const cfg=LC_CONFIG[mod];
  const status=lcStatusDef(mod, it.status);
  const catColor = it.type ? lcCatColor(mod, it.type) : null;
  const domain = lcDomain(it.url);
  const img = it.image
    ? `<img src="${esc(it.image)}" onerror="this.parentElement.innerHTML='<div class=\\'lc-card-noimg\\'><i class=\\'ti ${cfg.noImgIcon}\\'></i></div>'"/>`
    : `<div class="lc-card-noimg">${domain?`<img src="https://www.google.com/s2/favicons?domain=${esc(domain)}&sz=64" style="width:32px;height:32px" onerror="this.style.display='none'"/>`:`<i class="ti ${cfg.noImgIcon}"></i>`}</div>`;
  const priceLine = it.price ? `<span class="lc-card-price">${esc(it.price)}</span>` : '';
  const tagsHTML = (it.tags&&it.tags.length) ? `<div class="lc-card-tags">${it.tags.slice(0,3).map(t=>`<span class="lc-tag-chip" style="cursor:pointer" onclick="event.stopPropagation();openTagHubModal('${esc(t).replace(/'/g,"&#39;")}')">#${esc(t)}</span>`).join('')}</div>` : '';
  const visited = it.status==='been';
  const reviewHTML = (visited && cfg.reviewEnabled && (it.rating||it.review)) ? `
    <div class="lc-card-review" style="margin-top:4px">
      ${it.rating?`<span style="color:#E8A91D;font-size:11px;letter-spacing:1px">${'★'.repeat(it.rating)}${'☆'.repeat(5-it.rating)}</span>`:''}
      ${it.review?`<div style="font-size:11px;color:var(--text2);margin-top:2px;line-height:1.4">${esc(it.review)}</div>`:''}
    </div>` : '';
  const tripDateHTML = (cfg.dateEnabled && it.tripStart) ? `<div style="font-size:10.5px;color:var(--text3);margin-top:2px"><i class="ti ti-calendar-event" style="font-size:10px"></i> ${esc(it.tripStart)}${it.tripEnd&&it.tripEnd!==it.tripStart?' ~ '+esc(it.tripEnd):''}</div>` : '';
  return `<div class="lc-card" data-id="${it.id}">
    <div class="lc-card-imgwrap" onclick="lcOpenEditModal('${mod}','${it.id}')">
      ${img}
      <div class="lc-card-badges">
        ${it.favorite?`<span class="lc-card-badge"><i class="ti ti-heart-filled" style="font-size:9px"></i>收藏</span>`:''}
      </div>
      <div class="lc-card-top-actions" onclick="event.stopPropagation()">
        <button class="lc-card-icon-btn fav${it.favorite?' active':''}" onclick="lcToggleFav('${mod}','${it.id}')" title="收藏"><i class="ti ${it.favorite?'ti-heart-filled':'ti-heart'}"></i></button>
        <button class="lc-card-icon-btn pin${it.pinned?' active':''}" onclick="lcTogglePin('${mod}','${it.id}')" title="置頂"><i class="ti ti-pin"></i></button>
        <button class="lc-card-icon-btn" onclick="lcToggleMenu(event,'${mod}','${it.id}')" title="更多"><i class="ti ti-dots"></i></button>
      </div>
    </div>
    <div class="lc-card-body">
      <div class="lc-card-name" onclick="lcOpenEditModal('${mod}','${it.id}')" title="${esc(it.name||'')}">${esc(it.name||'未命名')}</div>
      <div class="lc-card-loc">${it.location?`<i class="ti ti-map-pin" style="font-size:10px"></i>${esc(it.location)}`:domain?`<i class="ti ti-world" style="font-size:10px"></i>${esc(domain)}`:''}</div>
      ${tripDateHTML}
      <div class="lc-card-meta-row">
        ${it.type?`<span class="lc-cat-chip" style="background:${catColor}22;color:${catColor}">${esc(it.type)}</span>`:'<span></span>'}
        ${priceLine}
      </div>
      ${it.note?`<div class="lc-card-note">${esc(it.note)}</div>`:''}
      ${reviewHTML}
      ${tagsHTML}
      <div class="lc-card-status" style="background:${status.color}1c;color:${status.color}">${status.label}</div>
    </div>
  </div>`;
}

function lcToggleFav(mod,id){ const it=lcState[mod].items.find(i=>i.id===id); if(!it) return; it.favorite=!it.favorite; lcSaveItems(mod); lcRenderPage(mod); }
function lcTogglePin(mod,id){ const it=lcState[mod].items.find(i=>i.id===id); if(!it) return; it.pinned=!it.pinned; lcSaveItems(mod); lcRenderContent(mod); }

function lcCloseMenus(){ document.querySelectorAll('.lc-menu').forEach(m=>m.remove()); }
function lcToggleMenu(e,mod,id){
  e.stopPropagation();
  const already = e.currentTarget.closest('.lc-card, .lc-list-row')?.querySelector('.lc-menu');
  lcCloseMenus();
  if(already) return;
  const card = e.currentTarget.closest('.lc-card') || e.currentTarget.closest('.lc-list-row');
  if(!card) return;
  const it=lcState[mod].items.find(i=>i.id===id); if(!it) return;
  const cfg=LC_CONFIG[mod];
  const menu=document.createElement('div');
  menu.className='lc-menu';
  menu.onclick=ev=>ev.stopPropagation();
  menu.innerHTML=`
    <button onclick="lcOpenEditModal('${mod}','${id}');lcCloseMenus()"><i class="ti ti-edit"></i>編輯</button>
    ${it.url?`<button onclick="lcCopyLink('${mod}','${id}')"><i class="ti ti-copy"></i>複製連結</button><button onclick="window.open('${esc(it.url)}','_blank');lcCloseMenus()"><i class="ti ti-external-link"></i>開啟原始連結</button>`:''}
    ${cfg.statusDefs.map(s=>`<button onclick="lcSetStatus('${mod}','${id}','${s.key}')"><i class="ti ti-check"></i>標記為「${s.label}」</button>`).join('')}
    <button class="danger" onclick="lcDeleteItem('${mod}','${id}')"><i class="ti ti-trash"></i>刪除</button>
  `;
  card.appendChild(menu);
  setTimeout(()=>document.addEventListener('click', lcCloseMenus, {once:true}), 0);
}
function lcCopyLink(mod,id){ const it=lcState[mod].items.find(i=>i.id===id); if(!it) return; navigator.clipboard?.writeText(it.url||'').then(()=>toast('✅ 已複製連結')); lcCloseMenus(); }
function lcSetStatus(mod,id,status){ const it=lcState[mod].items.find(i=>i.id===id); if(!it) return; it.status=status; lcSaveItems(mod); lcCloseMenus(); lcRenderPage(mod); toast('✅ 狀態已更新'); }
function lcDeleteItem(mod,id){
  if(!confirm('確定要刪除這筆收藏？（可到回收桶復原）')) return;
  const it = lcState[mod].items.find(i=>i.id===id);
  if(it) moveToTrash('lc_'+mod, mod==='food'?'美食':'旅遊', mod==='food'?'🍜':'🧭', it.name||'項目', it);
  lcState[mod].items=lcState[mod].items.filter(i=>i.id!==id); lcSaveItems(mod); lcCloseMenus(); lcRenderPage(mod); renderFixedNav(); renderSidebarExtras();
}

/* 新增 / 編輯 Modal */
function lcOpenAddModal(mod){
  lcModalCtx={mod, id:null}; window._lcAutoImg='';
  document.getElementById('modal-inner').innerHTML = lcModalHTML(mod, null);
  document.getElementById('modal').style.display='flex';
}
function lcOpenEditModal(mod,id){
  lcCloseMenus();
  lcModalCtx={mod, id};
  const it=lcState[mod].items.find(i=>i.id===id); if(!it) return;
  it.viewedAt=Date.now(); it.clicks=(it.clicks||0)+1; lcSaveItems(mod); logActivity();
  document.getElementById('modal-inner').innerHTML = lcModalHTML(mod, it);
  document.getElementById('modal').style.display='flex';
}

/* 免金鑰 Google 地圖嵌入（q=關鍵字&output=embed），輸入名稱/地點即可自動定位標籤 */
function lcMapEmbedUrl(query){
  if(!query) return '';
  return `https://www.google.com/maps?q=${encodeURIComponent(query)}&output=embed`;
}
function lcUpdateMapPreview(mod){
  const nameEl=document.getElementById('lc-f-name');
  const locEl=document.getElementById('lc-f-location');
  const name=nameEl?nameEl.value.trim():'';
  const loc=locEl?locEl.value.trim():'';
  const query=[name,loc].filter(Boolean).join(' ');
  const wrap=document.getElementById('lc-modal-mappreview');
  if(!wrap) return;
  if(!query){ wrap.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text3);font-size:11.5px;text-align:center;padding:0 12px">請先輸入名稱或地點，<br>再點「重新定位」查看地圖</div>'; return; }
  wrap.innerHTML = `<iframe src="${lcMapEmbedUrl(query)}" loading="lazy" referrerpolicy="no-referrer-when-downgrade" style="width:100%;height:100%;border:0"></iframe>`;
}

async function lcAutoFetch(evt, mod){
  const urlInp=document.getElementById('lc-f-url');
  const url=urlInp?urlInp.value.trim():'';
  if(!url){ toast('請先貼上連結'); return; }
  const btn=(evt&&evt.target)?evt.target.closest('button'):null;
  const orig=btn?btn.innerHTML:'';
  if(btn){ btn.innerHTML='擷取中…'; btn.disabled=true; }
  let img='', title='';
  try{
    const res=await fetch(`https://api.microlink.io/?url=${encodeURIComponent(url)}&meta=true`);
    const data=await res.json();
    if(data.status==='success'){
      img = data.data?.image?.url || '';
      title = data.data?.title || '';
    }
  }catch(e){}
  if(!img){
    try{ const domain=new URL(url).hostname; img=`https://www.google.com/s2/favicons?domain=${domain}&sz=128`; }catch(e){}
  }
  if(!title){ title = lcDomain(url); }
  const nameInp=document.getElementById('lc-f-name');
  if(nameInp && !nameInp.value) nameInp.value=title;
  if(img){
    const wrap=document.getElementById('lc-modal-imgpreview'), imgEl=document.getElementById('lc-modal-img');
    if(wrap && imgEl){ imgEl.src=img; wrap.style.display=''; }
    window._lcAutoImg = img;
  }
  if(btn){ btn.innerHTML=orig; btn.disabled=false; }
  lcUpdateMapPreview(mod);
  toast(img||title?'✅ 已自動擷取資訊（圖片與標題僅供參考，其餘欄位請手動確認）':'⚠️ 無法取得資訊，請手動填寫');
}

function lcSaveItem(){
  const {mod, id}=lcModalCtx;
  const cfg=LC_CONFIG[mod];
  const url=document.getElementById('lc-f-url').value.trim();
  const name=document.getElementById('lc-f-name').value.trim() || lcDomain(url) || (mod==='food'?'未命名美食':'未命名景點');
  const location=document.getElementById('lc-f-location').value.trim();
  const type=document.getElementById('lc-f-type').value;
  const price=document.getElementById('lc-f-price').value;
  const ratingEl=document.getElementById('lc-f-rating');
  const rating = ratingEl && ratingEl.value!=='' ? Number(ratingEl.value) : null;
  const hoursEl=document.getElementById('lc-f-hours');
  const hours = hoursEl ? hoursEl.value.trim() : '';
  const tripStartEl=document.getElementById('lc-f-tripstart');
  const tripEndEl=document.getElementById('lc-f-tripend');
  const tripStart = tripStartEl ? tripStartEl.value : '';
  const tripEnd = tripEndEl ? tripEndEl.value : '';
  const amountEl=document.getElementById('lc-f-amount');
  const amount = amountEl && amountEl.value!=='' ? Number(amountEl.value) : null;
  const reviewEl=document.getElementById('lc-f-review');
  const review = reviewEl ? reviewEl.value.trim() : '';
  const tags=document.getElementById('lc-f-tags').value.split(',').map(t=>t.trim()).filter(Boolean);
  const note=document.getElementById('lc-f-note').value.trim();
  const favorite=document.getElementById('lc-f-fav').checked;
  const status=document.getElementById('lc-f-status').value;
  const imgEl=document.getElementById('lc-modal-img');
  const img=(imgEl && imgEl.getAttribute('src')) ? imgEl.getAttribute('src') : '';

  if(id){
    const it=lcState[mod].items.find(i=>i.id===id); if(!it){ closeModal(); return; }
    it.url=url; it.name=name; it.location=location; it.type=type; it.price=price;
    if(rating!=null) it.rating=rating;
    it.hours=hours; it.tags=tags; it.note=note; it.favorite=favorite; it.status=status; it.updatedAt=Date.now();
    it.amount=amount; it.review=review; it.tripStart=tripStart; it.tripEnd=tripEnd;

// ── 回收桶（跨模組軟刪除，可復原）──
let trashBin = []; // [{id,type,typeLabel,icon,title,deletedAt,payload}]
function loadTrashBin(){
  try{ trashBin = JSON.parse(localStorage.getItem('lv_trash_bin')||'[]'); }catch(e){ trashBin=[]; }
  const cutoff = Date.now()-30*86400000;
  const before = trashBin.length;
  trashBin = trashBin.filter(t=>t.deletedAt>cutoff);
  if(trashBin.length!==before) saveTrashBin();
}
function saveTrashBin(){ localStorage.setItem('lv_trash_bin', JSON.stringify(trashBin)); }
function moveToTrash(type, typeLabel, icon, title, payload){
  trashBin.unshift({id:uid(), type, typeLabel, icon, title: (title||'(未命名)').toString().slice(0,80), deletedAt:Date.now(), payload});
  saveTrashBin();
}
function restoreFromTrash(trashId){
  const idx = trashBin.findIndex(t=>t.id===trashId); if(idx===-1) return;
  const t = trashBin[idx];
  switch(t.type){
    case 'card': state.cards.unshift(t.payload); save(); break;
    case 'note': notes.unshift(t.payload); saveNotes(); break;
    case 'todo':
      if(!todos[t.payload._dateStr]) todos[t.payload._dateStr]=[];
      todos[t.payload._dateStr].push(t.payload._item);
      saveTodos(); break;
    case 'quicklink': quicklinks.unshift(t.payload); saveQuicklinks(); break;
    case 'finance': financeTx.unshift(t.payload); saveFinanceTx(); break;
    case 'shopping': shoppingItems.unshift(t.payload); saveShoppingItems(); break;
    case 'lc_food': lcState.food.items.unshift(t.payload); lcSaveItems('food'); break;
    case 'lc_travel': lcState.travel.items.unshift(t.payload); lcSaveItems('travel'); break;
  }
  trashBin.splice(idx,1); saveTrashBin();
  renderFixedNav(); render();
  toast('↩️ 已復原：'+t.title);
}
function permanentDeleteTrash(trashId){
  if(!confirm('確定要永久刪除嗎？此動作無法復原。')) return;
  trashBin = trashBin.filter(t=>t.id!==trashId);
  saveTrashBin(); renderTrashPage(); renderSidebarExtras();
}
function emptyTrash(){
  if(!trashBin.length) return;
  if(!confirm(`確定要清空回收桶嗎？將永久刪除 ${trashBin.length} 個項目，且無法復原。`)) return;
  trashBin=[]; saveTrashBin(); renderTrashPage(); renderSidebarExtras();
  toast('🗑️ 回收桶已清空');
}
function selectTrash(){
  state.view='trash'; state.showDue=false; state.activeCat=null; state.selected.clear();
  render();
}
function renderTrashPage(){
  const el = document.getElementById('trash-page'); if(!el) return;
  if(!trashBin.length){
    el.innerHTML = `<div class="bm-empty"><i class="ti ti-trash-off"></i><p>回收桶是空的</p></div>`;
    return;
  }
  el.innerHTML = `
    <div class="bm-viewall-header" style="padding-top:14px">
      <span class="bm-viewall-title">回收桶 (${trashBin.length})　<span style="font-weight:400;color:var(--text3);font-size:11px">超過30天會自動清除</span></span>
      <button class="btn-ghost" onclick="emptyTrash()"><i class="ti ti-trash" style="font-size:12px;margin-right:4px"></i>清空回收桶</button>
    </div>
    <div class="bm-viewall-list" style="padding:0 22px">
      ${trashBin.map(t=>`
        <div class="bm-list-item" style="cursor:default">
          <div class="bm-list-thumb" style="display:flex;align-items:center;justify-content:center;font-size:16px">${t.icon||'📄'}</div>
          <div style="flex:1;min-width:0">
            <div class="bm-list-title">${esc(t.title)}</div>
            <div class="bm-list-domain">${esc(t.typeLabel)} · 刪除於 ${relTime(t.deletedAt)}</div>
          </div>
          <button class="icon-btn" title="復原" onclick="restoreFromTrash('${t.id}')"><i class="ti ti-arrow-back-up"></i></button>
          <button class="icon-btn" title="永久刪除" onclick="permanentDeleteTrash('${t.id}')"><i class="ti ti-x"></i></button>
        </div>
      `).join('')}
    </div>`;
}

function saveNewShortcut(){
  const icon = (document.getElementById('qs-icon').value||'').trim().slice(0,4) || '⭐';
  const label = (document.getElementById('qs-label').value||'').trim();
  const targetVal = document.getElementById('qs-target').value;
  if(!label){ toast('請輸入捷徑名稱'); return; }
  const [ttype, tval] = targetVal.split(':');
  const target = ttype==='cat' ? {type:'cat', name:tval} : {type:'nav', key:tval};
  quickShortcuts.push({id:uid(), icon, label, target});
  saveQuickShortcuts(); closeModal(); renderSidebarExtras();
  toast('✅ 已新增捷徑');
}
function deleteQuickShortcut(id){
  quickShortcuts = quickShortcuts.filter(s=>s.id!==id);

}
let _qsDragId=null;
function qsDragStart(e,id){ _qsDragId=id; e.dataTransfer.effectAllowed='move'; e.currentTarget.classList.add('dragging'); }
function qsDrop(e,targetId){
  e.preventDefault();
  document.querySelectorAll('.sidebar-extra-item.qs-drag').forEach(el=>el.classList.remove('dragging'));
  if(!_qsDragId || _qsDragId===targetId){ _qsDragId=null; return; }
  const ids = quickShortcuts.map(s=>s.id);
  const from = ids.indexOf(_qsDragId), to = ids.indexOf(targetId);
  if(from===-1||to===-1){ _qsDragId=null; return; }
  const moved = quickShortcuts.splice(from,1)[0];
  quickShortcuts.splice(to,0,moved);
  _qsDragId=null;
  saveQuickShortcuts(); renderSidebarExtras();
}

function activityAllItems(){
  const out=[];
  state.cards.forEach(c=>out.push({
    type:'card', id:c.id, icon:'🔖', typeLabel:'書籤', title:c.title||c.url||'(未命名)',
    updatedAt:c.updatedAt||c.addedAt||0, viewedAt:c.lastOpenedAt||0, favorite:!!c.starred, clicks:c.clicks||0
  }));
  notes.forEach(n=>out.push({
    type:'note', id:n.id, icon:'📗', typeLabel:'筆記', title:n.title||'(未命名筆記)',
    updatedAt:n.updatedAt||n.createdAt||0, viewedAt:n.viewedAt||0, favorite:false, clicks:n.clicks||0
  }));
  Object.keys(todos).forEach(d=>(todos[d]||[]).forEach(t=>out.push({
    type:'todo', id:t.id, icon:'🗓️', typeLabel:'待辦', title:t.text||'(未命名待辦)',
    updatedAt:t.updatedAt||t.createdAt||0, viewedAt:0, favorite:false, clicks:0
  })));
  quicklinks.forEach(q=>out.push({
    type:'quicklink', id:q.id, icon:'🔗', typeLabel:'常用連結', title:q.label||q.url||'(連結)',
    updatedAt:q.updatedAt||q.createdAt||q.lastUsed||0, viewedAt:q.lastUsed||0, favorite:!!q.favorite, clicks:q.clicks||0
  }));
  financeTx.forEach(t=>out.push({
    type:'finance', id:t.id, icon:'💰', typeLabel:'財務', title:t.note||t.category||(t.type==='income'?'收入紀錄':'支出紀錄'),
    updatedAt:t.updatedAt||(t.createdAt?(Date.parse(t.createdAt)||0):0), viewedAt:t.viewedAt||0, favorite:!!t.favorite, clicks:t.clicks||0
  }));
  (typeof shoppingItems!=='undefined'?shoppingItems:[]).forEach(it=>out.push({
    type:'shopping', id:it.id, icon:'🛒', typeLabel:'購物', title:it.name||'(購物項目)',
    updatedAt:it.updatedAt||it.addedAt||0, viewedAt:it.viewedAt||0, favorite:!!it.favorite, clicks:it.clicks||0
  }));
  ['food','travel'].forEach(mod=>(lcState[mod]?.items||[]).forEach(it=>out.push({
    type:'lc_'+mod, id:it.id, icon: mod==='food'?'🍜':'🧭', typeLabel: mod==='food'?'美食':'旅遊', title:it.name||'(項目)',
    updatedAt:it.updatedAt||it.addedAt||0, viewedAt:it.viewedAt||0, favorite:!!it.favorite, clicks:it.clicks||0
  })));
  (typeof entItems!=='undefined'?entItems:[]).forEach(it=>{
    const cat = (typeof entCatById==='function') ? entCatById(it.categoryId) : null;
    out.push({
      type:'entertainment', id:it.id, icon: (cat&&cat.icon)||'🎭', typeLabel: (cat&&cat.name)||'娛樂', title:it.title||'(項目)',
      updatedAt:it.updatedAt||it.createdAt||0, viewedAt:0, favorite:!!it.favorite, clicks:it.clicks||0
    });
  });
  return out;
}
function sidebarActivityOpen(type, id){
  switch(type){
    case 'card': navClick('all'); openViewModal(id); break;
    case 'note': selectNotes(); selectNote(id); break;

      let foundDate=null;
      Object.keys(todos).forEach(d=>{ if((todos[d]||[]).some(t=>t.id===id)) foundDate=d; });
      selectTodo();
      if(foundDate){ selectedDate=foundDate; renderTodoPage(); }
      break;
    }
    case 'quicklink': { const q=quicklinks.find(x=>x.id===id); if(q){ qlRegisterClick(id); window.open(q.url,'_blank','noopener'); } break; }
    case 'finance': selectFinance(); openFinanceDetailModal(id); break;
    case 'shopping': selectShopping(); openShoppingEditModal(id); break;
    case 'lc_food': lcSelect('food'); lcOpenEditModal('food', id); break;
    case 'lc_travel': lcSelect('travel'); lcOpenEditModal('travel', id); break;
    case 'entertainment': {
      const it=entItems.find(x=>x.id===id);

            onclick="if(!event.target.closest('.ent-cat-actions') && !event.target.closest('.ent-cat-name-inp')) entOpenCategory('${c.id}')">
            <div class="ent-cat-icon">${esc(c.icon||'🎭')}</div>
            <div style="flex:1;min-width:0">
              <div class="ent-cat-name" onclick="event.stopPropagation();entCatNameEditStart('${c.id}')" title="點擊可直接改名">${esc(c.name)}</div>
              ${c.desc ? `<div class="ent-cat-desc">${esc(c.desc)}</div>` : ''}
            </div>
            <div class="ent-cat-count">${cnt} 項</div>
            <div class="ent-cat-actions">
              <i class="ti ti-pencil" onclick="event.stopPropagation();entOpenEditCatModal('${c.id}')" title="重新命名 / 編輯"></i>
              <i class="ti ti-mood-smile" onclick="event.stopPropagation();entOpenEditCatModal('${c.id}')" title="更換圖示"></i>
              <i class="ti ti-palette" onclick="event.stopPropagation();entOpenEditCatModal('${c.id}')" title="更換顏色"></i>
              <i class="ti ti-grip-vertical" title="拖曳排序" style="cursor:grab"></i>
              <i class="ti ti-trash ent-danger" onclick="event.stopPropagation();entDeleteCat('${c.id}')" title="刪除分類"></i>
            </div>
          </div>`;
        }).join('')}
      </div>`}
    </div>`;
}

let _entCatDragId=null;
function entCatDragStart(e,id){ _entCatDragId=id; e.dataTransfer.effectAllowed='move'; e.currentTarget.classList.add('dragging'); }
function entCatDrop(e,targetId){
  e.preventDefault();
  document.querySelectorAll('.ent-cat-row').forEach(el=>el.classList.remove('dragging'));
  if(!_entCatDragId || _entCatDragId===targetId){ _entCatDragId=null; return; }
  const cats = entSortedCats();
  const fromIdx = cats.findIndex(c=>c.id===_entCatDragId);
  const toIdx = cats.findIndex(c=>c.id===targetId);
  if(fromIdx<0||toIdx<0){ _entCatDragId=null; return; }
  const moved = cats.splice(fromIdx,1)[0];
  cats.splice(toIdx,0,moved);
  cats.forEach((c,i)=>c.sortOrder=i);
  _entCatDragId=null;
  saveEntCats(); renderEntPage();
}

// ── 分類名稱：直接點擊改名 ──
function entCatNameEditStart(id){
  const cat=entCatById(id); if(!cat) return;
  const rows=document.querySelectorAll('.ent-cat-row');
  let nameEl=null;
  rows.forEach(r=>{ if(r.getAttribute('onclick')&&r.getAttribute('onclick').includes(`'${id}'`)) nameEl=r.querySelector('.ent-cat-name'); });
  if(!nameEl) return;
  const inp=document.createElement('input');
  inp.className='ent-cat-name-inp';
  inp.value=cat.name;
  inp.onclick=e=>e.stopPropagation();
  let committed=false;
  const commit=()=>{
    if(committed) return; committed=true;
    const val=inp.value.trim();
    if(val) cat.name=val;
    saveEntCats(); renderEntPage();
  };
  inp.onblur=commit;
  inp.onkeydown=e=>{
    e.stopPropagation();
    if(e.key==='Enter') inp.blur();
    if(e.key==='Escape'){ committed=true; renderEntPage(); }
  };
  nameEl.replaceWith(inp); inp.focus(); inp.select();
}

function entSaveCatModal(id){
  const name=document.getElementById('ent-cat-name').value.trim();
  if(!name){ toast('請輸入分類名稱'); return; }
  const desc=document.getElementById('ent-cat-desc').value.trim();
  const statuses=(window._entModalStatuses||[]).map(s=>({key:s.key,label:(s.label||'').trim()||'未命名狀態'}));

  const icon=(window._entModalEmoji||'').trim();
  if(id){
    const cat=entCatById(id); if(!cat) return;
    cat.name=name; cat.desc=desc; cat.color=color; cat.icon=icon;
    // 保留既有 items 的 status（若對應的 status key 被刪除，改成第一個狀態）
    const validKeys=statuses.map(s=>s.key);
    entItems.forEach(it=>{ if(it.categoryId===id && !validKeys.includes(it.status)) it.status=statuses[0].key; });
    cat.statuses=statuses;
    saveEntItems();
  } else {
    entCats.push({ id:uid(), name, desc, color, icon, sortOrder:entCats.length, statuses });

function entDeleteCat(id){

    ? `確定要刪除分類「${cat.name}」嗎？\n此分類底下的 ${cnt} 個項目也會一併刪除，此操作無法復原。`
    : `確定要刪除分類「${cat.name}」嗎？此操作無法復原。`;
  if(!confirm(msg)) return;
  entCats=entCats.filter(c=>c.id!==id);
  entItems=entItems.filter(i=>i.categoryId!==id);
  saveEntCats(); saveEntItems();
  if(entState.activeCatId===id) entState.activeCatId=null;
  renderEntPage(); renderFixedNav();
  toast('🗑️ 已刪除分類「'+cat.name+'」');
}

function entUpdateCoverPreview(){
  const box = document.getElementById('ent-item-cover-preview'); if(!box) return;
  const val = (document.getElementById('ent-item-cover')?.value || '').trim();
  box.innerHTML = val
    ? `<img src="${esc(val)}" style="width:100%;height:100%;object-fit:cover" onerror="this.parentElement.innerHTML='<i class=\\'ti ti-photo-off\\' style=\\'color:var(--text3);font-size:20px\\'></i>'"/>`
    : `<i class="ti ti-photo" style="color:var(--text3);font-size:20px"></i>`;
}
function entHandleCoverUpload(e){
  const file = e.target.files && e.target.files[0];
  if(!file) return;
  if(!file.type.startsWith('image/')){ toast('請選擇圖片檔案'); e.target.value=''; return; }
  if(file.size > 3*1024*1024){ toast('圖片檔案過大，請選擇 3MB 以下的圖片'); e.target.value=''; return; }
  const reader = new FileReader();
  reader.onload = () => {
    const inp = document.getElementById('ent-item-cover');
    if(inp){ inp.value = reader.result; }
    entUpdateCoverPreview();
    toast('✅ 圖片已上傳，記得按「儲存」');
  };
  reader.onerror = () => toast('圖片讀取失敗，請再試一次');
  reader.readAsDataURL(file);
  e.target.value = '';
}

  ).join('') + (r>0?`<i class="ti ti-x" style="font-size:13px;color:var(--text3);margin-left:6px" onclick="entSetItemRating(0)" title="清除評分"></i>`:'');

      <div class="sidebar-extra-item qs-drag" draggable="true" ondragstart="qsDragStart(event,'${s.id}')" ondragover="event.preventDefault()" ondrop="qsDrop(event,'${s.id}')"
        onclick="runQuickShortcut('${s.id}')" title="${esc(s.label)}">
        <span class="sx-icon">${s.icon}</span><span class="sx-label">${esc(s.label)}</span>
        <span class="sx-del" onclick="event.stopPropagation();deleteQuickShortcut('${s.id}')" title="刪除捷徑"><i class="ti ti-x"></i></span>
      </div>`).join('') : `<div class="sidebar-extra-empty">點右上角 + 新增你的常用捷徑</div>`}
  </div>`;

  html += '<div class="sidebar-divider"></div>';

  // 🔥 熱門書籤
  html += sec('熱門書籤', '🔥',
    popular.length ? popular.map(sidebarActivityRowHTML).join('') : '',
    '還沒有瀏覽紀錄');

  html += '<div class="sidebar-divider"></div>';

  // ⭐ 我的最愛
  html += `<div class="sidebar-extra-section">
    <div class="sidebar-extra-item" onclick="selectFavorites()" style="font-weight:600">
      <span class="sx-icon">⭐</span><span class="sx-label">我的最愛</span>
      ${favorites.length?`<span class="sidebar-extra-badge">${favorites.length}</span>`:''}
    </div>
    ${favorites.slice(0,4).map(sidebarActivityRowHTML).join('')}
  </div>`;

  html += '<div class="sidebar-divider"></div>';

  // 🕒 最近瀏覽
  html += `<div class="sidebar-extra-section">
    <div class="sidebar-extra-title"><span>🕒 最近瀏覽</span></div>
    ${recentViewed.length ? recentViewed.map(sidebarActivityRowHTML).join('') : `<div class="sidebar-extra-empty">還沒有瀏覽紀錄</div>`}
  </div>`;

  html += '<div class="sidebar-divider"></div>';

  // 📂 回收桶
  html += `<div class="sidebar-extra-section" style="margin-bottom:10px">
    <div class="sidebar-extra-item trash-link" onclick="selectTrash()">
      <span class="sx-icon">📂</span><span class="sx-label">回收桶</span>
      ${trashBin.length?`<span class="sidebar-extra-badge">${trashBin.length}</span>`:''}
    </div>
  </div>`;

  el.innerHTML = html;
}
