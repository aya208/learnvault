      <div style="display:flex;align-items:flex-start;gap:4px;">
        <div style="flex:1;min-width:0;">
          <div class="note-list-title">${esc(n.title||'未命名筆記')}</div>
          <div class="note-list-preview">${esc(stripHtml(n.content||'').slice(0,50)||'（尚無內容）')}</div>
          <div class="note-list-meta"><span>${fmtRelTime(n.updatedAt)}</span>${tagDots}</div>
        </div>
        <button class="note-del-btn" onclick="event.stopPropagation();deleteNote('${n.id}')" title="刪除">🗑</button>
      </div>
    </div>`;
  }).join('');

  el.innerHTML=`<div class="notes-layout">
    <div class="notes-sidebar">
      <div class="notes-sidebar-head">
        <h4>筆記（${notes.length}）</h4>
        <button onclick="newNote()" class="btn-primary" style="font-size:11px;padding:4px 10px;"><i class="ti ti-plus" style="font-size:11px"></i>新增</button>
      </div>
      <div style="padding:6px 8px;border-bottom:1px solid var(--border);">
        <input style="width:100%;font-size:11px;padding:5px 8px;border:1px solid var(--border);border-radius:6px;outline:none;background:#fff;" placeholder="搜尋筆記…" value="${esc(noteSearchQ)}" oninput="noteSearchQ=this.value;renderNotesPage()"/>
      </div>
      ${tagFilterHTML}
      <div class="notes-list">${listHTML||`<div style="font-size:12px;color:var(--text3);padding:16px;text-align:center;">${noteFilterTag!=='all'?'這個標籤下沒有筆記':'還沒有筆記<br>點上方「新增」開始'}</div>`}</div>
    </div>
    <div class="notes-editor-wrap" id="notes-editor-wrap">
      ${activeNote ? noteEditorHTML(activeNote) : `<div class="notes-editor-empty"><i class="ti ti-notebook"></i><p>選擇左側筆記或新增一篇</p></div>`}
    </div>
  </div>`;

  if(activeNote){
    const editorEl=document.getElementById('note-editor');
    if(editorEl && !editorEl._bound){
      editorEl._bound=true;
      editorEl.addEventListener('input',debounceFlush);
      editorEl.addEventListener('keydown', handleEditorKeydown);
    }
    updateToolbarState();
    document.addEventListener('selectionchange', updateToolbarState);
  }
}

function selectNote(id){ flushNoteContent(); activeNoteId=id; renderNotesPage(); }

function stripHtml(html){ const d=document.createElement('div');d.innerHTML=html;return d.textContent||''; }
function fmtRelTime(ts){
  if(!ts) return '';
  const diff=Date.now()-ts;
  if(diff<60000) return '剛剛';
  if(diff<3600000) return Math.floor(diff/60000)+'分鐘前';
  if(diff<86400000) return Math.floor(diff/3600000)+'小時前';
  return Math.floor(diff/86400000)+'天前';
}
let _flushTimer=null;
function debounceFlush(){ clearTimeout(_flushTimer); _flushTimer=setTimeout(flushNoteContent,600); }

function noteEditorHTML(n){
  const tagChips=(n.tags||[]).map(tag=>{
    const tdef=noteTagLib.find(x=>x.label===tag);
    const col=tdef?tdef.color:'var(--purple)';
    return `<span class="note-tag-chip" style="background:${col}22;color:${col};border:1px solid ${col}44;">${esc(tag)}<span class="rm" onclick="removeNoteTag('${n.id}','${esc(tag)}')">×</span></span>`;
  }).join('');
  const linkedCardsHTML=(n.linkedCards||[]).map(cid=>{
    const c=state.cards.find(x=>x.id===cid);
    if(!c) return '';
    const m=TYPE_META[c.type]||TYPE_META.article;
    return `<span style="font-size:10px;background:var(--purple-light);color:var(--purple);border-radius:4px;padding:1px 7px;display:inline-flex;align-items:center;gap:3px;cursor:pointer;" onclick="openViewModal('${cid}')" title="${esc(c.title)}">
      ${m.emoji} ${esc(c.title.slice(0,20))}
      <span onclick="event.stopPropagation();unlinkCard('${n.id}','${cid}')" style="opacity:.6;margin-left:2px;">×</span>
    </span>`;
  }).join('');

  return `
    <div class="note-editor-head">
      <input class="note-title-inp" id="note-title-inp" value="${esc(n.title||'')}" placeholder="筆記標題…"
        oninput="debounceFlush()" onblur="flushNoteContent();renderNotesList()"/>
      <button onclick="openLinkCardPicker('${n.id}')" style="font-size:11px;padding:4px 9px;background:var(--purple-light);color:var(--purple);border:1px solid #AFA9EC;border-radius:6px;cursor:pointer;font-family:inherit;" title="引用書籤">🔗 引用書籤</button>
      <button onclick="exportNoteAsHTML('${n.id}')" style="font-size:11px;padding:4px 9px;border:1px solid var(--border);border-radius:6px;cursor:pointer;font-family:inherit;" title="匯出筆記">⬇ 匯出</button>
    </div>
    <div class="note-meta-bar">
      <span>${new Date(n.createdAt).toLocaleDateString('zh-TW')} 建立</span>
      <span>·</span>
      <span>${fmtRelTime(n.updatedAt)} 更新</span>
      ${tagChips}
      <button class="note-add-tag-btn" onclick="promptAddNoteTag('${n.id}')">+ 標籤</button>
      ${linkedCardsHTML?`<span style="color:var(--text3)">·</span>${linkedCardsHTML}`:''}
    </div>
    <div class="editor-toolbar" id="editor-toolbar">
      <select class="tb-select" onchange="execCmd('formatBlock',this.value);this.value='p'" title="段落格式">
        <option value="p">段落</option>
        <option value="h1">標題 1</option>
        <option value="h2">標題 2</option>
        <option value="h3">標題 3</option>
        <option value="pre">程式碼塊</option>
      </select>
      <div class="tb-sep"></div>
      <button class="tb-btn" id="tb-bold" onclick="execCmd('bold')" title="粗體"><i class="ti ti-bold"></i></button>
      <button class="tb-btn" id="tb-italic" onclick="execCmd('italic')" title="斜體"><i class="ti ti-italic"></i></button>
      <button class="tb-btn" id="tb-underline" onclick="execCmd('underline')" title="底線"><i class="ti ti-underline"></i></button>
      <button class="tb-btn" id="tb-strike" onclick="execCmd('strikeThrough')" title="刪除線"><i class="ti ti-strikethrough"></i></button>
      <button class="tb-btn" onclick="execCmd('hiliteColor','#fff3b0')" title="螢光標記">🖊</button>
      <div class="tb-sep"></div>
      <button class="tb-btn" id="tb-ul" onclick="execCmd('insertUnorderedList')" title="項目清單"><i class="ti ti-list"></i></button>
      <button class="tb-btn" id="tb-ol" onclick="execCmd('insertOrderedList')" title="數字清單"><i class="ti ti-list-numbers"></i></button>
      <button class="tb-btn" onclick="execCmd('formatBlock','blockquote')" title="引用"><i class="ti ti-quote"></i></button>
      <div class="tb-sep"></div>
      <button class="tb-btn" onclick="insertLink()" title="插入連結"><i class="ti ti-link"></i></button>
      <button class="tb-btn" onclick="insertImage()" title="插入圖片"><i class="ti ti-photo"></i></button>
      <button class="tb-btn" onclick="insertHR()" title="分隔線"><i class="ti ti-minus"></i></button>
      <button class="tb-btn" onclick="insertCode()" title="行內程式碼"><i class="ti ti-code"></i></button>
      <div class="tb-sep"></div>
      <input type="color" title="文字顏色" style="width:26px;height:26px;border:1px solid var(--border);border-radius:4px;cursor:pointer;padding:1px;" onchange="execCmd('foreColor',this.value)"/>
      <div class="tb-sep"></div>
      <button class="tb-btn" onclick="execCmd('undo')" title="復原"><i class="ti ti-arrow-back-up"></i></button>
      <button class="tb-btn" onclick="execCmd('redo')" title="重做"><i class="ti ti-arrow-forward-up"></i></button>
    </div>
    <div class="note-content-area">
      <div class="note-editor" id="note-editor" contenteditable="true" spellcheck="false">${n.content||''}</div>
    </div>`;
}

function renderNotesList(){
  const listEl=document.querySelector('.notes-list'); if(!listEl) return;
  let filtered=notes;
  if(noteSearchQ) filtered=filtered.filter(n=>n.title.toLowerCase().includes(noteSearchQ.toLowerCase())||(n.content||'').toLowerCase().includes(noteSearchQ.toLowerCase()));
  if(noteFilterTag!=='all') filtered=filtered.filter(n=>(n.tags||[]).includes(noteFilterTag));
  listEl.innerHTML=filtered.map(n=>{
    const tagDots=(n.tags||[]).map(tag=>{
      const tdef=noteTagLib.find(x=>x.label===tag);
      return `<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${tdef?tdef.color:'var(--purple)'};margin-right:2px;" title="${esc(tag)}"></span>`;
    }).join('');
    return `<div class="note-list-item${n.id===activeNoteId?' active':''}" onclick="selectNote('${n.id}')">
      <div style="display:flex;align-items:flex-start;gap:4px;">
        <div style="flex:1;min-width:0;">
          <div class="note-list-title">${esc(n.title||'未命名筆記')}</div>
          <div class="note-list-preview">${esc(stripHtml(n.content||'').slice(0,50)||'（尚無內容）')}</div>
          <div class="note-list-meta"><span>${fmtRelTime(n.updatedAt)}</span>${tagDots}</div>
        </div>
        <button class="note-del-btn" onclick="event.stopPropagation();deleteNote('${n.id}')" title="刪除">🗑</button>
      </div>
    </div>`;
  }).join('')||`<div style="font-size:12px;color:var(--text3);padding:16px;text-align:center;">${noteFilterTag!=='all'?'這個標籤下沒有筆記':'還沒有筆記'}</div>`;
}

// ── Editor commands ───────────────────────────────
function execCmd(cmd, val){
  document.getElementById('note-editor')?.focus();
  document.execCommand(cmd, false, val||null);
  updateToolbarState(); debounceFlush();
}
function updateToolbarState(){
  try{
    ['bold','italic','underline','strikeThrough','insertUnorderedList','insertOrderedList'].forEach(cmd=>{
      const map={bold:'tb-bold',italic:'tb-italic',underline:'tb-underline',strikeThrough:'tb-strike',insertUnorderedList:'tb-ul',insertOrderedList:'tb-ol'};
      const el=document.getElementById(map[cmd]); if(el) el.classList.toggle('active',document.queryCommandState(cmd));
    });
  }catch(e){}
}
function insertLink(){
  const url=prompt('輸入連結網址：'); if(!url) return;
  const text=prompt('連結顯示文字：')||url;
  execCmd('insertHTML',`<a href="${esc(url)}" target="_blank">${esc(text)}</a>`);
}
function insertImage(){
  const url=prompt('輸入圖片網址：'); if(!url) return;
  execCmd('insertHTML',`<img src="${esc(url)}" style="max-width:100%;border-radius:8px;margin:6px 0;"/>`);
}
function insertHR(){ execCmd('insertHTML','<hr/>'); }
function insertCode(){
  const sel=window.getSelection();
  const text=sel&&sel.toString()?sel.toString():'';
  execCmd('insertHTML',`<code>${esc(text)||'code'}</code>`);
}
function handleEditorKeydown(e){
  // Tab → indent
  if(e.key==='Tab'){ e.preventDefault(); execCmd('insertHTML','&nbsp;&nbsp;&nbsp;&nbsp;'); }
}

// ── Note tags ─────────────────────────────────────
function promptAddNoteTag(id){
  flushNoteContent();
  const n=notes.find(x=>x.id===id); if(!n) return;
  n.tags=n.tags||[];
  // Build a quick picker popover in the modal system
  const modalEl=document.getElementById('modal-inner');
  modalEl.innerHTML=`
    <div class="modal-header"><h3>新增標籤</h3>
      <button class="icon-btn" onclick="closeModal()"><i class="ti ti-x" style="font-size:15px"></i></button></div>
    <div class="modal-body">
      <p style="font-size:12px;color:var(--text2);margin-bottom:10px;">點擊標籤加入這篇筆記，或在下方新增自訂標籤。</p>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;">
        ${noteTagLib.map(t=>{
          const has=n.tags.includes(t.label);
          return `<span style="display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:99px;cursor:pointer;font-size:12px;border:1.5px solid ${t.color};background:${has?t.color+'dd':'#fff'};color:${has?'#fff':t.color};"
            onclick="toggleNoteTag('${id}','${t.label}',this,'${t.color}')">
            ${has?'✓ ':''} ${esc(t.label)}
          </span>`;
        }).join('')}
      </div>
      <div style="border-top:1px solid var(--border);padding-top:10px;">
        <div style="font-size:11px;color:var(--text2);margin-bottom:6px;font-weight:600;">新增自訂標籤到筆記</div>
        <div style="display:flex;gap:6px;">
          <input id="custom-tag-inp" class="inp" style="flex:1;font-size:12px;" placeholder="標籤名稱…"/>
          <button class="btn-primary" style="font-size:12px;" onclick="addCustomNoteTag('${id}')">新增</button>
        </div>
      </div>
    </div>
    <div class="modal-footer"><div></div>
      <div class="modal-footer-right"><button class="btn-primary" onclick="closeModal();renderNotesPage()">完成</button></div>
    </div>`;
  document.getElementById('modal').style.display='flex';
}

function toggleNoteTag(noteId, label, el, color){
  const n=notes.find(x=>x.id===noteId); if(!n) return;
  n.tags=n.tags||[];
  if(n.tags.includes(label)){
    n.tags=n.tags.filter(t=>t!==label);
    el.style.background='#fff'; el.style.color=color; el.innerHTML=esc(label);
  } else {
    n.tags.push(label);
    el.style.background=color+'dd'; el.style.color='#fff'; el.innerHTML='✓ '+esc(label);
  }
  n.updatedAt=Date.now(); saveNotes();
}

function addCustomNoteTag(noteId){
  const inp=document.getElementById('custom-tag-inp');
  const label=(inp?.value||'').trim(); if(!label){inp?.focus();return;}
  const n=notes.find(x=>x.id===noteId); if(!n) return;
  n.tags=n.tags||[];
  if(!n.tags.includes(label)) n.tags.push(label);
  n.updatedAt=Date.now(); saveNotes();
  inp.value='';
  toast('✅ 標籤已新增：'+label);
}
function openNoteTagManager(){
  const modalEl=document.getElementById('modal-inner');
  const renderManagerBody=()=>`
    <div class="modal-header"><h3>管理筆記標籤</h3>
      <button class="icon-btn" onclick="closeModal();renderNotesPage()"><i class="ti ti-x" style="font-size:15px"></i></button></div>
    <div class="modal-body">
      <div id="ntm-list">
        ${noteTagLib.map(t=>`<div class="ntm-row">
          <span class="ntm-swatch" style="background:${t.color}"></span>
          <span class="ntm-label">${esc(t.label)}</span>
          ${noteTagLib.length>1?`<button class="ntm-del" onclick="deleteNoteTag('${t.id}')">✕</button>`:''}
        </div>`).join('')}
      </div>
      <div style="border-top:1px solid var(--border);margin-top:10px;padding-top:10px;">
        <div style="font-size:11px;color:var(--text2);font-weight:600;margin-bottom:6px;">新增標籤</div>
        <div style="display:flex;gap:6px;align-items:center;">
          <input id="ntm-new-label" class="inp" style="flex:1;font-size:12px;" placeholder="標籤名稱"/>
          <input type="color" id="ntm-new-color" value="#7c3aed" style="width:32px;height:32px;border:1px solid var(--border);border-radius:6px;cursor:pointer;padding:2px;"/>
          <button class="btn-primary" style="font-size:12px;" onclick="addNoteTagToLib()">新增</button>
        </div>
      </div>
    </div>
    <div class="modal-footer"><div></div>
      <div class="modal-footer-right"><button class="btn-primary" onclick="closeModal();renderNotesPage()">完成</button></div>
    </div>`;
  modalEl.innerHTML=renderManagerBody();
  document.getElementById('modal').style.display='flex';
}

function addNoteTagToLib(){
  const label=(document.getElementById('ntm-new-label')?.value||'').trim();
  if(!label){document.getElementById('ntm-new-label')?.focus();return;}
  if(noteTagLib.find(t=>t.label===label)){toast('標籤已存在');return;}
  const color=document.getElementById('ntm-new-color')?.value||'#7c3aed';
  noteTagLib.push({id:'ntag_'+uid(),label,color});
  saveNotes();
  openNoteTagManager(); // re-render manager
}

function deleteNoteTag(tid){
  const t=noteTagLib.find(x=>x.id===tid); if(!t) return;
  noteTagLib=noteTagLib.filter(x=>x.id!==tid);
  // remove from all notes
  notes.forEach(n=>{n.tags=(n.tags||[]).filter(tag=>tag!==t.label);});
  saveNotes();
  openNoteTagManager();
}

function removeNoteTag(id,tag){
  const n=notes.find(x=>x.id===id); if(!n) return;
  n.tags=(n.tags||[]).filter(t=>t!==tag);
  n.updatedAt=Date.now(); saveNotes(); renderNotesPage();
}

// ── Card linking ──────────────────────────────────
function openLinkCardPicker(noteId){
  const n=notes.find(x=>x.id===noteId); if(!n) return;
  const linked=n.linkedCards||[];
  const modalEl=document.getElementById('modal-inner');
  modalEl.innerHTML=`
    <div class="modal-header"><h3>引用書籤到筆記</h3>
      <button class="icon-btn" onclick="closeModal()"><i class="ti ti-x" style="font-size:15px"></i></button></div>
    <div class="modal-body">
      <input class="inp" placeholder="搜尋書籤…" oninput="renderCardPickerList('${noteId}',this.value)" id="card-picker-search"/>
      <div id="card-picker-list" style="margin-top:8px;max-height:320px;overflow-y:auto;"></div>
    </div>
    <div class="modal-footer"><div></div><div class="modal-footer-right">
      <button class="btn-ghost" onclick="closeModal()">完成</button>
    </div></div>`;
  document.getElementById('modal').style.display='flex';
  renderCardPickerList(noteId,'');
}

function renderCardPickerList(noteId, q){
  const n=notes.find(x=>x.id===noteId); if(!n) return;
  const linked=n.linkedCards||[];
  const cards=q ? state.cards.filter(c=>c.title.toLowerCase().includes(q.toLowerCase())) : state.cards;
  const el=document.getElementById('card-picker-list'); if(!el) return;
  el.innerHTML=cards.slice(0,40).map(c=>{
    const m=TYPE_META[c.type]||TYPE_META.article;
    const isLinked=linked.includes(c.id);
    return `<div style="display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:7px;cursor:pointer;${isLinked?'background:var(--purple-light);':''}" onclick="toggleCardLink('${noteId}','${c.id}')">
      <span style="font-size:16px;">${m.emoji}</span>
      <div style="flex:1;min-width:0;">
        <div style="font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(c.title)}</div>
        <div style="font-size:10px;color:var(--text3);">${m.label}${c.cat?' · '+esc(c.cat):''}</div>
      </div>
      <span style="font-size:14px;">${isLinked?'✅':''}</span>
    </div>`;
  }).join('')||'<div style="font-size:12px;color:var(--text3);padding:12px;">沒有符合的書籤</div>';
}

function toggleCardLink(noteId, cardId){
  const n=notes.find(x=>x.id===noteId); if(!n) return;
  n.linkedCards=n.linkedCards||[];
  if(n.linkedCards.includes(cardId)) n.linkedCards=n.linkedCards.filter(id=>id!==cardId);
  else n.linkedCards.push(cardId);
  n.updatedAt=Date.now(); saveNotes();
  renderCardPickerList(noteId, document.getElementById('card-picker-search')?.value||'');
  // also insert citation block into editor
  if(n.linkedCards.includes(cardId)){
    const c=state.cards.find(x=>x.id===cardId); if(!c) return;
    const m=TYPE_META[c.type]||TYPE_META.article;
    const thumbHtml=c.thumbUrl?`<img src="${esc(c.thumbUrl)}" style="width:36px;height:36px;object-fit:cover;border-radius:6px;" onerror="this.style.display='none'"/>`:m.emoji;
    const html=`<div class="note-card-cite" onclick="if(window.openViewModal)openViewModal('${c.id}')">
      <div class="note-card-cite-thumb">${thumbHtml}</div>
      <div class="note-card-cite-body">
        <div class="note-card-cite-label">📎 引用書籤</div>
        <div class="note-card-cite-title">${esc(c.title)}</div>
        <div class="note-card-cite-url">${esc(c.url||'')}</div>
      </div>
    </div>`;
    const editorEl=document.getElementById('note-editor');
    if(editorEl){ editorEl.focus(); document.execCommand('insertHTML',false,html); debounceFlush(); }
  }
  // re-render meta bar
  const metaLinked=document.querySelector('.note-meta-bar');
  if(metaLinked && n){
    // re-render just the note to refresh meta
    const wrap=document.getElementById('notes-editor-wrap');
    if(wrap){ wrap.innerHTML=noteEditorHTML(n);
      const ed=document.getElementById('note-editor');
      if(ed){ed.addEventListener('input',debounceFlush);ed.addEventListener('keydown',handleEditorKeydown);}
    }
  }
}

function unlinkCard(noteId, cardId){
  const n=notes.find(x=>x.id===noteId); if(!n) return;
  n.linkedCards=(n.linkedCards||[]).filter(id=>id!==cardId);
  n.updatedAt=Date.now(); saveNotes(); renderNotesPage();
}

// ── Export note ───────────────────────────────────
function exportNoteAsHTML(id){
  flushNoteContent();
  const n=notes.find(x=>x.id===id); if(!n) return;
  const html=`<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"/><title>${esc(n.title)}</title>
  <style>body{max-width:720px;margin:40px auto;font-family:sans-serif;font-size:14px;line-height:1.8;color:#1f1e1b}
  h1{font-size:24px}h2{font-size:19px}h3{font-size:16px}
  blockquote{border-left:3px solid #7c3aed;padding:4px 12px;background:#f5f3ff;border-radius:0 6px 6px 0}
  pre{background:#1e1e2e;color:#cdd6f4;border-radius:8px;padding:14px;font-family:monospace;font-size:13px}
  code{background:#f0eeff;color:#7c3aed;border-radius:4px;padding:1px 5px;font-family:monospace}
  pre code{background:transparent;color:inherit}hr{border:none;border-top:2px solid #eee}
  img{max-width:100%;border-radius:8px}.meta{font-size:12px;color:#888;margin-bottom:24px}</style></head>
  <body><h1>${esc(n.title)}</h1><div class="meta">${new Date(n.createdAt).toLocaleDateString('zh-TW')} 建立 · ${new Date(n.updatedAt).toLocaleDateString('zh-TW')} 更新${n.tags?.length?' · '+n.tags.map(t=>'#'+t).join(' '):''}</div>
  ${n.content||''}</body></html>`;
  const blob=new Blob([html],{type:'text/html'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=(n.title||'note').replace(/[/\\?%*:|"<>]/g,'-')+'.html';
  a.click();
}
