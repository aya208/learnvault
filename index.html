<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Danny's資料庫</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --purple:#5B4FE0;--purple-dark:#3F35A8;--purple-light:#EFEDFF;
  --ink:#171321;--gold:#C9A24B;
  --border:#E7E4F0;--bg:#fff;--bg2:#F7F6FB;
  --text:#1A1626;--text2:#5C5670;--text3:#A39FB5;
  --radius:10px;--radius-lg:16px;
  --shadow-sm:0 1px 2px rgba(23,19,33,.05),0 1px 1px rgba(23,19,33,.03);
  --shadow-md:0 6px 20px -4px rgba(60,52,137,.12),0 2px 6px rgba(23,19,33,.05);
  --shadow-lg:0 16px 48px -8px rgba(60,52,137,.22),0 4px 16px rgba(23,19,33,.08);
  --font-display:'Fraunces',Georgia,serif;
  --font-body:'Plus Jakarta Sans','Inter',-apple-system,sans-serif;
}
body.dark-mode{
  --border:#332F42;--bg:#1C1926;--bg2:#141220;
  --text:#EDEBF5;--text2:#AFA9C4;--text3:#726C85;
  --shadow-sm:0 1px 2px rgba(0,0,0,.35),0 1px 1px rgba(0,0,0,.22);
  --shadow-md:0 6px 20px -4px rgba(0,0,0,.5),0 2px 6px rgba(0,0,0,.28);
  --shadow-lg:0 16px 48px -8px rgba(0,0,0,.6),0 4px 16px rgba(0,0,0,.32);
}
body{font-family:var(--font-body);color:var(--text);background:var(--bg2);height:100vh;overflow:hidden;background-image:radial-gradient(circle at 0% 0%,rgba(91,79,224,.05),transparent 45%),radial-gradient(circle at 100% 0%,rgba(201,162,75,.05),transparent 40%);transition:background-color .2s,color .2s}
body.dark-mode{background-image:radial-gradient(circle at 0% 0%,rgba(91,79,224,.1),transparent 45%),radial-gradient(circle at 100% 0%,rgba(201,162,75,.07),transparent 40%)}
body.dark-mode img:not(.no-dark-dim){filter:brightness(.92)}
#app{display:flex;height:100vh}

/* ── Sidebar ── */
:root{
  --side-bg-1:#1C1730;--side-bg-2:#241D3D;
  --side-text:#C9C4DC;--side-text-dim:#7A7393;--side-ink:#fff;
  --side-active-bg:rgba(255,255,255,.09);--side-hover-bg:rgba(255,255,255,.05);
  --side-border:rgba(255,255,255,.08);--side-input-bg:rgba(255,255,255,.06);
  --side-input-bg-focus:rgba(255,255,255,.1);
}
.sidebar{width:236px;flex-shrink:0;background:linear-gradient(165deg,var(--side-bg-1) 0%,var(--side-bg-2) 100%);display:flex;flex-direction:column;overflow:hidden;position:relative;z-index:2;box-shadow:6px 0 24px -8px rgba(23,19,33,.35)}
.sidebar::before{content:'';position:absolute;top:0;right:0;bottom:0;width:1px;background:linear-gradient(180deg,rgba(201,162,75,.55) 0%,rgba(255,255,255,.12) 35%,rgba(255,255,255,.05) 100%)}
.sidebar-logo{padding:22px 18px 18px;font-size:17px;font-weight:600;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--side-border);font-family:var(--font-display);letter-spacing:.01em;color:var(--side-ink)}
.sidebar-logo .logo-badge{width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,var(--purple) 0%,#8A7FFF 100%);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 14px rgba(91,79,224,.45)}
.sidebar-logo .logo-badge i{color:#fff;font-size:16px}
.sidebar-logo .logo-text{display:flex;flex-direction:column;line-height:1.18}
.sidebar-logo .logo-text small{font-family:var(--font-body);font-size:9.5px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--gold)}
.sec-label{padding:16px 18px 5px;font-size:10px;color:var(--side-text-dim);letter-spacing:.12em;text-transform:uppercase;font-weight:700}
.cat-sec-label{display:flex;align-items:center;justify-content:space-between;user-select:none;transition:color .12s}
.cat-sec-label:hover{color:var(--side-ink)}
.cat-sec-toggle-icon{font-size:11px;transition:transform .15s}
.cat-sec-label.collapsed .cat-sec-toggle-icon{transform:rotate(-90deg)}
#cat-list-wrap.collapsed{display:none}

.cat-item{display:flex;align-items:center;gap:8px;padding:7.5px 11px;cursor:pointer;font-size:12.5px;border-radius:9px;margin:1.5px 9px;color:var(--side-text);transition:background .12s,color .12s;user-select:none}
.cat-item:hover{background:var(--side-hover-bg);color:var(--side-ink)}
.cat-item.active{background:var(--side-active-bg);color:var(--side-ink);font-weight:600;box-shadow:inset 0 0 0 1px rgba(201,162,75,.35)}
.cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;border:1.5px solid rgba(255,255,255,.18)}
.cat-count{margin-left:auto;font-size:10px;color:var(--side-text-dim)}
.cat-count.due{background:linear-gradient(135deg,var(--purple) 0%,#8A7FFF 100%);color:#fff;font-weight:700;padding:1px 6px;border-radius:999px;font-size:9.5px}
.cat-actions{display:flex;gap:2px;margin-left:4px}

/* ── 側邊欄「固定導覽」項目：純文字條列風格（無底色方塊），只作用於 #nav-fixed-list ── */
#nav-fixed-list .cat-item{
  border-radius:0;
  margin:0;
  padding:6.5px 18px;
  gap:10px;
  border-left:2px solid transparent;
  background:transparent !important;
  box-shadow:none !important;
}
#nav-fixed-list .cat-item:hover{
  background:transparent !important;
  color:var(--side-ink);
  border-left-color:rgba(255,255,255,.18);
}
#nav-fixed-list .cat-item.active{
  background:transparent !important;
  color:var(--side-ink);
  font-weight:700;
  border-left-color:var(--gold);
}
#nav-fixed-list .nav-emoji{font-size:14px;flex-shrink:0;line-height:1}
#nav-fixed-list .nav-label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
#nav-fixed-list .nav-label-edit{flex-shrink:0;font-size:10.5px;color:var(--side-text-dim);opacity:0;transition:opacity .12s,color .12s,background .12s;padding:2px;border-radius:4px;cursor:pointer}
#nav-fixed-list .cat-item:hover .nav-label-edit{opacity:1}
#nav-fixed-list .nav-label-edit:hover{color:var(--side-ink);background:rgba(255,255,255,.12)}
#nav-fixed-list .cat-count{font-size:9.5px;opacity:.75}
.add-cat-area{padding:10px 10px 6px;margin-top:4px;border-top:1px dashed var(--side-border)}
.add-cat-row{display:flex;gap:4px;align-items:center}
.add-cat-input{flex:1;padding:5px 8px;font-size:11px;border:1px solid var(--side-border);border-radius:5px;background:var(--side-input-bg);color:var(--side-ink);font-family:inherit}
.add-cat-input::placeholder{color:var(--side-text-dim)}
.add-cat-input:focus{outline:none;border-color:var(--gold);background:var(--side-input-bg-focus)}
.add-cat-btn{padding:5px 9px;background:linear-gradient(135deg,var(--purple) 0%,#8A7FFF 100%);color:#fff;border:none;border-radius:5px;font-size:13px;cursor:pointer;font-weight:500}
.add-cat-btn:hover{filter:brightness(1.1)}
.add-cat-toggle{display:flex;align-items:center;gap:4px;font-size:10.5px;color:var(--side-text-dim);cursor:pointer;padding:6px 2px 2px;user-select:none}
.add-cat-toggle:hover{color:var(--side-ink)}
.add-cat-toggle i{font-size:11px;transition:transform .15s}
.add-cat-extra{margin-top:6px}
.add-cat-extra .emoji-picker-row{margin-top:6px}

/* 顏色選擇器 */
.color-picker-row{display:flex;gap:5px;flex-wrap:wrap;padding:5px 0 2px}
.color-swatch{width:18px;height:18px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .1s;flex-shrink:0}
.color-swatch:hover{transform:scale(1.2)}
.color-swatch.selected{border-color:var(--text);transform:scale(1.15)}
.sidebar .color-swatch.selected{border-color:var(--side-ink)}

.emoji-picker-row{margin-bottom:8px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg2);overflow:hidden}
.emoji-tabs{display:flex;gap:2px;padding:5px 5px 4px;overflow-x:auto;border-bottom:1px solid var(--border);background:var(--bg)}
.emoji-tabs::-webkit-scrollbar{height:3px}
.emoji-tab{flex-shrink:0;width:26px;height:24px;display:flex;align-items:center;justify-content:center;font-size:13px;border:none;background:transparent;border-radius:5px;cursor:pointer;opacity:.55;transition:opacity .1s,background .1s}
.emoji-tab:hover{opacity:.9;background:var(--bg2)}
.emoji-tab.active{opacity:1;background:var(--purple-light)}
.emoji-grid{display:flex;flex-wrap:wrap;gap:3px;padding:6px;max-height:120px;overflow-y:auto}
.emoji-swatch{width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:14px;border-radius:5px;cursor:pointer;border:1.5px solid transparent;background:var(--bg);transition:transform .1s,border-color .1s;flex-shrink:0}
.emoji-swatch:hover{transform:scale(1.15);background:#eee}
.emoji-swatch.selected{border-color:var(--purple);background:var(--purple-light)}
.emoji-swatch.emoji-clear{color:var(--text3);font-size:11px}
.emoji-input-row{display:flex;gap:6px;align-items:center}
.emoji-input-row input{width:64px;text-align:center;font-size:16px;flex:none}
.emoji-input-row .emoji-hint{font-size:10px;color:var(--text3);flex:1}
.sidebar .emoji-picker-row{border-color:var(--side-border);background:rgba(255,255,255,.04)}
.sidebar .emoji-tabs{background:rgba(255,255,255,.03);border-color:var(--side-border)}
.sidebar .emoji-swatch{background:rgba(255,255,255,.06)}
.sidebar .emoji-swatch:hover{background:rgba(255,255,255,.14)}
.sidebar-scroll-mid{flex:1;overflow-y:auto;min-height:0;display:flex;flex-direction:column}
.sidebar-divider{height:1px;margin:14px 14px;background:linear-gradient(90deg,transparent 0%,rgba(201,162,75,.5) 12%,rgba(201,162,75,.5) 88%,transparent 100%)}
.sidebar-extra-section{padding:0 14px;margin-bottom:6px}
.sidebar-extra-title{display:flex;align-items:center;gap:6px;font-size:10.5px;font-weight:700;letter-spacing:.03em;color:var(--side-text-dim,rgba(255,255,255,.45));padding:4px 4px 6px;text-transform:uppercase}
.sidebar-extra-title .sx-add{margin-left:auto;cursor:pointer;color:var(--side-text-dim,rgba(255,255,255,.45));width:16px;height:16px;display:flex;align-items:center;justify-content:center;border-radius:5px;font-size:12px}
.sidebar-extra-title .sx-add:hover{background:rgba(255,255,255,.1);color:var(--side-ink)}
.sidebar-extra-item{display:flex;align-items:center;gap:7px;padding:5px 6px;border-radius:7px;cursor:pointer;font-size:12px;color:var(--side-ink);white-space:nowrap;overflow:hidden}
.sidebar-extra-item .sx-icon{flex-shrink:0;font-size:12px;width:16px;text-align:center}
.sidebar-extra-item .sx-label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.sidebar-extra-item .sx-del{flex-shrink:0;opacity:0;font-size:11px;color:var(--side-text-dim,rgba(255,255,255,.4));width:16px;height:16px;display:flex;align-items:center;justify-content:center;border-radius:5px}
.sidebar-extra-item:hover{background:rgba(255,255,255,.08)}
.sidebar-extra-item:hover .sx-del{opacity:1}
.sidebar-extra-item .sx-del:hover{background:rgba(255,255,255,.15);color:#fff}
.sidebar-extra-item.trash-link{font-weight:600}
.sidebar-extra-badge{margin-left:auto;font-size:9.5px;background:rgba(255,255,255,.12);color:var(--side-ink);border-radius:999px;padding:1px 6px;flex-shrink:0}
.sidebar-extra-empty{font-size:11px;color:var(--side-text-dim,rgba(255,255,255,.4));padding:3px 6px 8px}
.sidebar-tag-cloud{display:flex;flex-wrap:wrap;gap:5px;padding:0 6px 6px}
.sidebar-tag-chip{font-size:10.5px;padding:2px 8px;border-radius:999px;background:rgba(255,255,255,.08);color:var(--side-ink);cursor:pointer}
.sidebar-tag-chip:hover{background:rgba(255,255,255,.16)}
.add-menu{position:absolute;top:calc(100% + 6px);right:0;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);padding:6px;min-width:128px;z-index:40;flex-direction:column;gap:1px}
.add-menu-item{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:8px;cursor:pointer;font-size:12.5px;color:var(--ink);white-space:nowrap}
.add-menu-item i{font-size:14px;color:var(--text3);width:15px;text-align:center;flex-shrink:0}
.add-menu-item:hover{background:var(--bg2)}
.add-menu-item:hover i{color:var(--purple)}

.progress-box{padding:12px 18px 14px;border-top:1px solid var(--side-border)}
.progress-label{display:flex;justify-content:space-between;font-size:11px;color:var(--side-text);margin-bottom:6px}
.progress-bar{height:5px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--purple) 0%,var(--gold) 100%);border-radius:3px;transition:width .4s}

.backup-area{padding:10px 10px 14px;border-top:1px solid var(--side-border);display:flex;flex-direction:column;gap:5px}
.backup-btn{display:flex;align-items:center;gap:6px;padding:7px 11px;border:1px solid var(--side-border);border-radius:7px;font-size:11px;font-family:inherit;cursor:pointer;background:rgba(255,255,255,.04);color:var(--side-text);transition:all .12s;width:100%}
.backup-btn:hover{background:rgba(255,255,255,.09);color:#fff}
.backup-btn.imp{color:var(--side-ink);border-color:rgba(201,162,75,.5);background:linear-gradient(135deg,rgba(91,79,224,.4) 0%,rgba(201,162,75,.25) 100%)}
.backup-btn.imp:hover{filter:brightness(1.15)}
.settings-area{padding:10px 10px 0}

/* ── Main ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{padding:14px 22px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0}
.topbar-title{font-size:18px;font-weight:600;flex:1;font-family:var(--font-display);color:var(--ink);letter-spacing:.01em}
.search-wrap{position:relative;display:flex;align-items:center}
.search-input{padding:7px 12px 7px 31px;border:1px solid var(--border);border-radius:999px;font-size:12px;font-family:inherit;color:var(--text);background:var(--bg2);width:190px;transition:width .2s,border-color .15s,background .15s}
.search-input:focus{outline:none;border-color:var(--purple);background:var(--bg);width:230px;box-shadow:0 0 0 3px rgba(91,79,224,.1)}
.search-input::placeholder{color:var(--text3)}
.search-icon{position:absolute;left:11px;color:var(--text3);font-size:14px;pointer-events:none}
.sort-select{padding:7px 10px;border:1px solid var(--border);border-radius:999px;font-size:11px;font-family:inherit;color:var(--text2);background:var(--bg2);cursor:pointer}
.sort-select:focus{outline:none;border-color:var(--purple)}
.btn-primary{display:flex;align-items:center;gap:5px;padding:8px 15px;background:linear-gradient(135deg,var(--purple) 0%,var(--purple-dark) 100%);color:#fff;border:none;border-radius:999px;font-size:12.5px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit;box-shadow:var(--shadow-sm);transition:box-shadow .15s,transform .1s}
.btn-primary:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.btn-primary:active{transform:translateY(0)}

.content{flex:1;overflow-y:auto;display:flex;flex-direction:column;min-height:0}
#card-grid.bm-mode{flex:1;overflow-y:auto;padding:0;min-height:0}
#card-grid:not(.bm-mode){padding:18px 22px}
#home-page,#stats-page,#todo-page,#notes-page,#quicklinks-page,#finance-page,#food-page,#travel-page{flex:1}

.bookmarklet-tip{background:var(--bg)8e6;border:1px solid #f0d080;border-radius:var(--radius);padding:9px 13px;margin:12px 22px 0;font-size:12px;color:#7a5c00;display:flex;align-items:center;gap:8px}
.bookmarklet-tip i{flex-shrink:0;font-size:15px;color:#c49000}
.bk-link{display:inline-block;background:var(--purple);color:#fff;padding:2px 9px;border-radius:5px;font-size:11px;font-weight:500;text-decoration:none;cursor:grab;margin:0 3px}
.tip-close{margin-left:auto;cursor:pointer;color:#c49000;background:none;border:none;font-size:16px;flex-shrink:0;padding:0}
.review-strip{background:linear-gradient(120deg,var(--purple-light) 0%,#fff 100%);border:1px solid #E1DCFB;border-radius:var(--radius);padding:9px 14px;margin:12px 22px 0;display:flex;align-items:center;gap:8px;font-size:12px}
.review-strip i{color:var(--purple)}
.review-strip strong{color:var(--purple-dark)}
.review-link{margin-left:auto;font-size:11px;color:var(--purple);text-decoration:underline;text-underline-offset:2px;cursor:pointer}
.proto-warn{background:var(--bg)8e6;border:1px solid #f0d080;border-radius:var(--radius);padding:9px 13px;margin:12px 22px 0;font-size:12px;color:#7a5c00;display:flex;align-items:center;gap:8px}

/* ── Cards (legacy grid/list) ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px}
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;cursor:pointer;transition:box-shadow .2s,border-color .2s,transform .2s;position:relative}
.card:hover{box-shadow:var(--shadow-md);border-color:#D8D2F2;transform:translateY(-2px)}
.card-thumb{height:80px;display:flex;align-items:center;justify-content:center;font-size:26px;position:relative;overflow:hidden}
.card-thumb-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:0;}
.card-thumb-img.loaded{opacity:1;}
.card-thumb-img{opacity:0;transition:opacity .25s;}
.card-thumb-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 40%,rgba(0,0,0,.45) 100%);}
.card-thumb-favicon{position:absolute;bottom:5px;left:7px;width:16px;height:16px;border-radius:3px;background:var(--bg);padding:1px;object-fit:contain;}
.card-thumb-emoji{position:relative;z-index:1;font-size:26px;}
.card-source{position:absolute;top:6px;left:6px;background:rgba(0,0,0,.45);color:#fff;font-size:9px;border-radius:4px;padding:2px 6px;display:flex;align-items:center;gap:3px}
.card-body{padding:12px 13px}
.card-title{font-size:12.5px;font-weight:600;line-height:1.4;margin-bottom:5px;color:var(--ink)}
.card-tags{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:5px}
.tag{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:500}
.card-summary{font-size:11px;color:var(--text2);line-height:1.5;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-footer{display:flex;align-items:center;gap:5px;padding-top:7px;border-top:1px solid var(--border);flex-wrap:wrap}
.card-date{font-size:10px;color:var(--text3);flex:1}
.review-badge{font-size:9px;padding:2px 6px;border-radius:4px;background:#faeeda;color:#633806;font-weight:500}
.review-badge.due{background:#fcebeb;color:#791f1f}
.icon-btn{padding:4px;border:none;background:transparent;cursor:pointer;color:var(--text3);border-radius:4px;display:flex;align-items:center;font-size:13px;line-height:1}
.icon-btn:hover{background:var(--bg2);color:var(--text)}
.empty-state{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--text3);font-size:13px}
.empty-state i{font-size:32px;display:block;margin-bottom:10px}

/* ══════════════════════════════
   書籤頁 YouTube 風格介面
══════════════════════════════ */

/* Tab 列 */
.bm-tabs-wrap{background:var(--bg);border-bottom:1px solid var(--border);padding:0 22px;flex-shrink:0;position:sticky;top:0;z-index:10}
.bm-tabs{display:flex;align-items:stretch;gap:2px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.bm-tabs::-webkit-scrollbar{height:0}
.bm-tab{display:flex;align-items:center;gap:6px;padding:12px 14px;font-size:12.5px;font-weight:500;color:var(--text2);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;user-select:none;flex-shrink:0}
.bm-tab:hover{color:var(--text)}
.bm-tab.active{color:var(--purple);border-bottom-color:var(--purple);font-weight:700}
.bm-tab .bm-tab-cnt{font-size:10px;background:var(--bg2);color:var(--text3);padding:1px 6px;border-radius:999px;transition:background .15s}
.bm-tab.active .bm-tab-cnt{background:var(--purple-light);color:var(--purple)}
.bm-tab-add{padding:10px 12px;color:var(--text3);cursor:pointer;font-size:15px;display:flex;align-items:center;border-bottom:2px solid transparent;flex-shrink:0}
.bm-tab-add:hover{color:var(--purple)}
.bm-tab-edit{font-size:11px;color:var(--text3);opacity:0;transition:opacity .12s;padding:2px;border-radius:4px}
.bm-tab:hover .bm-tab-edit{opacity:1}
.bm-tab-edit:hover{color:var(--purple);background:var(--purple-light)}

/* 資訊列 */
.bm-infobar{display:flex;align-items:center;gap:10px;padding:9px 22px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0}
.bm-stats{display:flex;align-items:center;gap:6px;flex:1;flex-wrap:wrap}
.bm-stat-chip{font-size:11px;color:var(--text2);background:var(--bg2);padding:3px 9px;border-radius:999px;white-space:nowrap}
.bm-stat-chip strong{color:var(--ink);font-weight:700}
.bm-controls{display:flex;align-items:center;gap:5px;flex-shrink:0}
.bm-search-wrap{position:relative}
.bm-search-input{padding:6px 10px 6px 30px;border:1px solid var(--border);border-radius:999px;font-size:11.5px;font-family:inherit;color:var(--text);background:var(--bg2);width:160px;transition:width .2s,border-color .15s}
.bm-search-input:focus{outline:none;border-color:var(--purple);background:var(--bg);width:210px}
.bm-search-input::placeholder{color:var(--text3)}
.bm-sort-select{padding:6px 10px;border:1px solid var(--border);border-radius:999px;font-size:11px;font-family:inherit;color:var(--text2);background:var(--bg2);cursor:pointer}
.bm-sort-select:focus{outline:none;border-color:var(--purple)}
.bm-ctrl-btn{width:30px;height:30px;border:1px solid var(--border);border-radius:999px;background:var(--bg2);cursor:pointer;color:var(--text2);display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .12s;flex-shrink:0}
.bm-ctrl-btn:hover,.bm-ctrl-btn.active{background:var(--purple-light);color:var(--purple);border-color:var(--purple)}

/* 書籤內容區 */
#card-grid.bm-mode{display:block;padding:0}
#card-grid.bm-mode .grid,#card-grid.bm-mode .list-mode{display:none}
.bm-section{padding:18px 22px 6px}
.bm-section-header{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.bm-section-title{font-size:13.5px;font-weight:700;color:var(--ink);font-family:var(--font-display)}
.bm-section-see-all{margin-left:auto;font-size:11.5px;color:var(--purple);cursor:pointer;padding:3px 10px;border-radius:999px;border:1px solid var(--purple-light);background:var(--purple-light);transition:background .12s;white-space:nowrap;font-weight:500}
.bm-section-see-all:hover{background:#E0DCFF}

/* 橫向卡片列 */
.bm-row{display:flex;gap:12px;overflow-x:auto;padding-bottom:14px;-webkit-overflow-scrolling:touch;scroll-behavior:smooth}
.bm-row::-webkit-scrollbar{height:5px}
.bm-row::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.bm-row::-webkit-scrollbar-thumb:hover{background:#C2B9E8}
/* 收藏列：左右箭頭 + 捲動吸附 + 收合 + 拖曳排序 + 快速取消收藏 */
.bm-row-wrap{position:relative}
.bm-row-wrap .bm-row{scroll-snap-type:x proximity}
.bm-row-wrap .bm-row .bm-card{scroll-snap-align:start}
.bm-row-arrow{position:absolute;top:47px;width:30px;height:30px;border-radius:50%;background:var(--bg);border:1px solid var(--border);box-shadow:0 2px 10px rgba(23,19,33,.16);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);z-index:5;transition:opacity .15s,box-shadow .15s,color .15s}
.bm-row-arrow:hover{color:var(--purple);border-color:var(--purple-light)}
.bm-row-arrow.prev{left:-14px}
.bm-row-arrow.next{right:-14px}
.bm-row-arrow.disabled{opacity:.28;pointer-events:none}
.bm-section-collapse-btn{background:transparent;border:1px solid var(--border);border-radius:8px;width:24px;height:24px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);font-size:11px;margin-left:6px;flex-shrink:0}
.bm-section-collapse-btn:hover{color:var(--purple);border-color:var(--purple-light)}
.bm-section-count{font-size:10.5px;color:var(--text3);font-weight:600;margin-left:3px}
.bm-star-grip{position:absolute;top:6px;left:6px;width:20px;height:20px;border-radius:6px;background:rgba(255,255,255,.92);color:var(--text3);display:flex;align-items:center;justify-content:center;font-size:11px;cursor:grab;opacity:0;transition:opacity .15s;z-index:2}
.bm-card:hover .bm-star-grip{opacity:1}
.bm-star-grip:active{cursor:grabbing}
.bm-unfav-btn{position:absolute;top:38px;right:6px;width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,.94);border:none;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:11px;cursor:pointer;opacity:0;transition:opacity .15s,color .15s,background .15s;z-index:2}
.bm-card:hover .bm-unfav-btn{opacity:1}
.bm-unfav-btn:hover{color:#c00;background:var(--bg)}
.bm-card.star-drag.dragging{opacity:.4}
.bm-card.star-drag.drag-over{box-shadow:0 0 0 2px var(--purple) inset;border-radius:var(--radius-lg)}

/* YouTube 風格書籤卡片 */
.bm-card{flex-shrink:0;width:210px;border-radius:var(--radius-lg);overflow:visible;cursor:pointer;position:relative;transition:transform .18s}
.bm-card:hover{transform:translateY(-3px)}
.bm-card:hover .bm-card-thumb{box-shadow:var(--shadow-md)}
.bm-card-thumb{position:relative;width:100%;height:118px;border-radius:var(--radius-lg);overflow:hidden;background:var(--bg2);flex-shrink:0}
.bm-card-thumb img.bm-thumb-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .3s}
.bm-card-thumb img.bm-thumb-img.loaded{opacity:1}
.bm-card-thumb-emoji{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:32px}
.bm-card-thumb-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 50%,rgba(0,0,0,.35) 100%);pointer-events:none}
.bm-pin-badge{position:absolute;top:6px;left:6px;background:var(--gold);color:#fff;font-size:8px;padding:2px 5px;border-radius:4px;font-weight:700;letter-spacing:.04em}
.bm-star-btn{position:absolute;top:6px;right:6px;width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.9);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--text3);opacity:0;transition:opacity .15s,color .15s;z-index:2}
.bm-card:hover .bm-star-btn,.bm-star-btn.starred{opacity:1}
.bm-star-btn.starred{color:var(--gold);background:rgba(255,255,255,.95)}
.bm-card-body{padding:9px 2px 4px}
.bm-card-meta{display:flex;align-items:flex-start;gap:7px}
.bm-card-favicon{width:18px;height:18px;border-radius:4px;flex-shrink:0;margin-top:1px;object-fit:contain;background:var(--bg2);padding:1px}
.bm-card-info{flex:1;min-width:0}
.bm-card-title{font-size:12px;font-weight:600;line-height:1.4;color:var(--ink);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:3px}
.bm-card-domain{font-size:10.5px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bm-card-date{font-size:10px;color:var(--text3);margin-top:2px}
.bm-card-note{font-size:10.5px;color:var(--text2);margin-top:3px;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
.bm-more-btn{width:24px;height:24px;border-radius:50%;background:transparent;border:none;cursor:pointer;color:var(--text3);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;transition:background .12s;margin-top:1px;line-height:1}
.bm-more-btn:hover{background:var(--bg2);color:var(--text)}

/* 更多選單下拉 */
.bm-more-menu{position:fixed;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);z-index:300;min-width:160px;overflow:hidden;padding:4px}
.bm-more-menu-item{display:flex;align-items:center;gap:8px;padding:8px 12px;font-size:12px;color:var(--text);cursor:pointer;border-radius:7px;transition:background .1s}
.bm-more-menu-item:hover{background:var(--bg2)}
.bm-more-menu-item.danger{color:#c00}
.bm-more-menu-item.danger:hover{background:var(--bg)0f0}
.bm-more-menu-sep{height:1px;background:var(--border);margin:3px 0}

/* 展開全部（grid/list）模式 */
.bm-viewall-header{display:flex;align-items:center;gap:10px;padding:14px 22px 0;margin-bottom:14px}
.bm-viewall-title{font-size:14px;font-weight:700;color:var(--ink);font-family:var(--font-display);flex:1}
.bm-viewall-back{display:flex;align-items:center;gap:5px;font-size:11.5px;color:var(--purple);cursor:pointer;padding:4px 10px;border-radius:999px;border:1px solid var(--purple-light);background:var(--purple-light)}
.bm-viewall-back:hover{background:#E0DCFF}
.bm-viewall-mode{display:flex;gap:3px;background:var(--bg2);border-radius:8px;padding:2px}
.bm-viewall-mode button{padding:4px 8px;border:none;background:transparent;border-radius:6px;cursor:pointer;color:var(--text2);font-size:13px}
.bm-viewall-mode button.active{background:var(--bg);color:var(--purple);box-shadow:var(--shadow-sm)}
.bm-viewall-grid{padding:0 22px;display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.bm-viewall-list{padding:0 22px;display:flex;flex-direction:column;gap:6px}
.bm-mainview-switch{display:flex;align-items:center;gap:2px;background:var(--bg2);border:1px solid var(--border);border-radius:999px;padding:2px;flex-shrink:0}
.bm-mainview-btn{width:28px;height:26px;border:none;border-radius:999px;background:transparent;cursor:pointer;color:var(--text3);display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .12s}
.bm-mainview-btn:hover{color:var(--text2)}
.bm-mainview-btn.active{background:var(--bg);color:var(--purple);box-shadow:var(--shadow-sm)}
.bm-masonry{padding-bottom:8px}
.bm-masonry .bm-section{padding:14px 22px 6px}
.bm-masonry-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.bm-masonry .bm-card{width:100%}
.bm-card-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.bm-card-tags .tag{font-size:9px;padding:1px 6px}
.bm-card-thumb-skel{position:absolute;inset:0;background:linear-gradient(90deg,var(--bg2) 25%,#eceaf5 37%,var(--bg2) 63%);background-size:400% 100%;animation:bm-skel-shine 1.4s ease infinite}
@keyframes bm-skel-shine{0%{background-position:100% 0}100%{background-position:0 0}}
.bm-list-item{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);cursor:pointer;transition:box-shadow .15s}
.bm-list-item:hover{box-shadow:var(--shadow-sm)}
.bm-list-thumb{width:52px;height:36px;border-radius:7px;flex-shrink:0;overflow:hidden;background:var(--bg2);position:relative}
.bm-list-thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.bm-list-thumb-emoji{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:16px}
.bm-list-favicon{width:16px;height:16px;flex-shrink:0;border-radius:3px}
.bm-list-title{flex:1;font-size:12.5px;font-weight:600;color:var(--ink);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bm-list-domain{font-size:10.5px;color:var(--text3);margin-top:1px}
.bm-list-date{font-size:10.5px;color:var(--text3);white-space:nowrap;flex-shrink:0}

/* 無內容 */
.bm-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:var(--text3)}
.bm-empty i{font-size:36px;margin-bottom:12px;display:block}
.bm-empty p{font-size:13px;text-align:center}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(23,19,33,.45);backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:center;z-index:100}
.gsearch-modal{width:560px;max-width:94vw;margin-top:10vh;padding:0;display:flex;flex-direction:column;max-height:72vh}
.gsearch-input-row{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.gsearch-input-row i.ti-search{font-size:16px;color:var(--text3)}
.gsearch-input-row input{flex:1;border:none;outline:none;font-size:15px;font-family:inherit;color:var(--ink);background:transparent}
.gsearch-results{overflow-y:auto;padding:8px}
.gsearch-group{margin-bottom:6px}
.gsearch-group-label{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.04em;text-transform:uppercase;padding:8px 10px 4px}
.gsearch-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:10px;cursor:pointer}
.gsearch-item:hover{background:var(--bg2)}
.gsearch-item-icon{flex-shrink:0;width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:14px;background:color-mix(in srgb,var(--gi-color,var(--purple)) 14%,#fff);color:var(--gi-color,var(--purple))}
.gsearch-item-body{flex:1;min-width:0}
.gsearch-item-title{font-size:13px;color:var(--ink);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gsearch-item-sub{font-size:11px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gsearch-empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:13px}
.gsearch-hint{text-align:center;padding:20px 20px 8px;color:var(--text3);font-size:12.5px;line-height:1.8}
.gsearch-recent-wrap{padding:6px 10px 4px}
.gsearch-recent-head{display:flex;align-items:center;justify-content:space-between;padding:6px 0 8px}
.gsearch-recent-head span{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.04em;text-transform:uppercase}
.gsearch-recent-clear{font-size:11px;color:var(--text3);cursor:pointer;background:none;border:none;font-family:inherit}
.gsearch-recent-clear:hover{color:var(--purple)}
.gsearch-recent-chips{display:flex;flex-wrap:wrap;gap:6px}
.gsearch-recent-chip{display:flex;align-items:center;gap:5px;padding:6px 11px;border-radius:999px;background:var(--bg2);border:1px solid var(--border);font-size:12px;color:var(--text2);cursor:pointer}
.gsearch-recent-chip:hover{border-color:var(--purple);color:var(--purple)}
.gsearch-filter-tabs{display:flex;gap:6px;overflow-x:auto;padding:8px 10px;border-bottom:1px solid var(--border);flex-shrink:0}
.gsearch-filter-tab{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:999px;background:var(--bg2);border:1px solid transparent;font-size:11.5px;font-weight:600;color:var(--text2);cursor:pointer;white-space:nowrap;font-family:inherit}
.gsearch-filter-tab:hover{border-color:var(--border2,var(--border))}
.gsearch-filter-tab.active{background:var(--purple);color:#fff}
.gsearch-item-title mark, .gsearch-item-sub mark{background:var(--purple);color:#fff;border-radius:3px;padding:0 2px}
.note-list-title mark, .note-list-preview mark{background:var(--purple);color:#fff;border-radius:3px;padding:0 1px}
.modal{background:var(--bg);border-radius:var(--radius-lg);border:1px solid var(--border);width:480px;max-width:94vw;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
.modal-header{padding:15px 18px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:10px;position:sticky;top:0;background:var(--bg);z-index:1}
.modal-header h3{font-size:14px;font-weight:600;line-height:1.4;font-family:var(--font-display)}
.modal-body{padding:16px}
.form-label{font-size:11px;color:var(--text2);font-weight:500;margin-bottom:4px;display:block}
.form-group{margin-bottom:12px}
.inp{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:12px;font-family:inherit;color:var(--text);background:#fafafa;transition:border-color .15s}
.inp:focus{outline:none;border-color:var(--purple);background:var(--bg)}
.inp::placeholder{color:var(--text3)}
textarea.inp{resize:vertical;min-height:60px;line-height:1.55}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.points-list{display:flex;flex-direction:column;gap:5px;margin-bottom:6px}
.point-row{display:flex;gap:5px;align-items:center}
.point-row .inp{flex:1}
.btn-add-point{display:flex;align-items:center;gap:4px;padding:5px 10px;border:1px dashed var(--border);background:transparent;border-radius:var(--radius);font-size:11px;color:var(--text2);cursor:pointer;width:100%;justify-content:center;font-family:inherit}
.btn-add-point:hover{background:var(--bg2)}
.modal-footer{padding:10px 16px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;bottom:0;background:var(--bg)}
.modal-footer-right{display:flex;gap:8px}
.btn-ghost{padding:7px 13px;border:1px solid var(--border);border-radius:var(--radius);font-size:12px;background:transparent;cursor:pointer;color:var(--text2);font-family:inherit}
.btn-ghost:hover{background:var(--bg2)}
.btn-danger{padding:7px 13px;border:1px solid #fcc;border-radius:var(--radius);font-size:12px;background:transparent;cursor:pointer;color:#c00;font-family:inherit}
.btn-danger:hover{background:var(--bg)0f0}
.src-tabs{display:flex;gap:4px;margin-bottom:10px;flex-wrap:wrap}
.src-tab{padding:5px 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:11px;cursor:pointer;color:var(--text2);background:transparent;display:flex;align-items:center;gap:4px;font-family:inherit}
.src-tab.active{background:var(--purple-light);color:var(--purple);border-color:#AFA9EC;font-weight:500}
.notes-section{background:var(--bg2);border-radius:var(--radius);padding:11px;margin-bottom:11px}
.notes-label{font-size:10px;color:var(--purple);font-weight:500;margin-bottom:7px;display:flex;align-items:center;gap:4px}
.points-view{list-style:none;display:flex;flex-direction:column;gap:5px}
.points-view li{font-size:12px;color:var(--text2);display:flex;gap:6px;line-height:1.5}
.points-view li::before{content:"·";color:var(--purple);font-weight:700;flex-shrink:0}

/* 複習 / SRS */
.review-reset-row{display:flex;align-items:center;gap:8px;background:var(--bg2);border-radius:var(--radius);padding:8px 11px;margin-bottom:12px;font-size:12px}
.review-reset-row i{color:var(--purple)}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:9px 18px;border-radius:8px;font-size:12px;z-index:999;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap}
.backup-reminder{position:fixed;bottom:24px;right:24px;width:280px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);padding:16px;z-index:400;flex-direction:column;gap:4px;animation:backupReminderIn .25s ease}
@keyframes backupReminderIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.backup-reminder-title{font-size:12.5px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:6px}
.backup-reminder-desc{font-size:11.5px;color:var(--text2);line-height:1.5;margin:4px 0 10px}
.backup-reminder-actions{display:flex;gap:8px;justify-content:flex-end}
.backup-reminder-close{position:absolute;top:10px;right:10px;color:var(--text3);cursor:pointer;font-size:14px;background:none;border:none}
.toast.show{opacity:1}

/* Color edit modal */
.cat-edit-modal{background:var(--bg);border-radius:var(--radius-lg);border:1px solid var(--border);width:260px;padding:16px;box-shadow:0 8px 40px rgba(0,0,0,.15)}
.cat-edit-modal h4{font-size:13px;font-weight:500;margin-bottom:12px}

@keyframes spin{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-thumb{background:#D8D2EE;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#C2B9E8}
body.dark-mode ::-webkit-scrollbar-thumb{background:#3A3650}
body.dark-mode ::-webkit-scrollbar-thumb:hover{background:#4A4566}
body.dark-mode .bm-row::-webkit-scrollbar-thumb,body.dark-mode .ql-smart-row::-webkit-scrollbar-thumb,body.dark-mode .shop-row-scroll::-webkit-scrollbar-thumb{background:var(--border)}

/* ══════════════════════════════
   新增功能樣式
   ══════════════════════════════ */

/* 統計頁 */
.stats-grid-top{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:14px}
.stat-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px;text-align:center;box-shadow:var(--shadow-sm)}
.stat-card.warn{border-color:#f0c0c0;background:var(--bg)6f6}
.stat-num{font-size:24px;font-weight:600;color:var(--purple);font-family:var(--font-display)}
.stat-card.warn .stat-num{color:#c00}
.stat-label{font-size:11px;color:var(--text2);margin-top:3px}
.stats-section{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:14px}
.stats-section-title{font-size:12px;font-weight:600;margin-bottom:12px}
.stats-tabs{display:flex;gap:4px;margin-bottom:14px;border-bottom:1px solid var(--border);}
.stats-tab{display:flex;align-items:center;gap:6px;padding:8px 14px;border:none;background:transparent;font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;font-family:inherit;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .1s,border-color .1s;}
.stats-tab:hover{color:var(--text);}
.stats-tab.active{color:var(--purple);border-bottom-color:var(--purple);}
.stats-tab i{font-size:13px;}
.stats-empty-mini{font-size:12px;color:var(--text3);padding:14px;text-align:center;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:14px;}
.bar-chart{display:flex;align-items:flex-end;gap:8px;height:130px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end}
.bar-track{width:100%;max-width:28px;height:90px;background:var(--bg2);border-radius:4px;display:flex;align-items:flex-end;overflow:hidden;margin:0 auto}
.bar-fill{width:100%;background:var(--purple);border-radius:4px 4px 0 0;transition:height .3s;min-height:2px}
.bar-val{font-size:10px;color:var(--text2);margin-top:4px;height:12px}
.bar-label{font-size:10px;color:var(--text3);margin-top:2px}
.cat-bars{display:flex;flex-direction:column;gap:8px}
.cat-bar-row{display:flex;align-items:center;gap:8px;font-size:11px}
.cat-bar-name{display:flex;align-items:center;gap:5px;width:96px;flex-shrink:0;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cat-bar-track{flex:1;height:8px;background:var(--bg2);border-radius:4px;overflow:hidden}
.cat-bar-fill{height:100%;border-radius:4px;transition:width .3s}
.cat-bar-count{width:24px;text-align:right;color:var(--text2);flex-shrink:0}

.nav-rename-inp{font-size:12px;font-weight:500;background:transparent;border:none;border-bottom:1px solid var(--gold);outline:none;width:80px;color:var(--side-ink);padding:0 2px;font-family:inherit;}
.nav-label{cursor:default;flex:1;}
.cat-name-label:hover{text-decoration:underline dotted rgba(255,255,255,.4);}

/* 拖曳排序分類 */
.cat-item[draggable="true"]{cursor:grab}
.cat-item.dragging{opacity:.4}
/* todo tag manager */
.todo-tag-manager{margin-top:8px;padding:8px 10px;background:#f7f5ff;border-radius:8px;border:1px solid var(--border);}
.todo-tag-manager-title{font-size:10px;font-weight:600;color:var(--text2);margin-bottom:6px;letter-spacing:.04em;text-transform:uppercase;}
.todo-tag-row{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
.todo-tag-swatch{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.todo-tag-name{font-size:12px;flex:1;}
.todo-tag-del{font-size:10px;background:transparent;border:none;cursor:pointer;color:var(--text3);padding:0 3px;}
.todo-tag-del:hover{color:#e04a49;}
.todo-tag-add-row{display:flex;gap:4px;margin-top:6px;}
.todo-tag-add-row input{flex:1;font-size:11px;padding:4px 7px;}
.todo-tag-add-row input[type=color]{width:30px;padding:1px 2px;border-radius:4px;cursor:pointer;}
.todo-tag-add-row button{font-size:11px;padding:4px 8px;}
.cat-item.drag-over{box-shadow:inset 0 0 0 1.5px var(--purple);background:var(--purple-light)}

/* 卡片 / 列表模式切換 */
.icon-btn.active-toggle,.btn-ghost.active-toggle{background:var(--purple-light);color:var(--purple)}
.grid.list-mode{display:flex;flex-direction:column;gap:6px}
.list-item{display:flex;align-items:center;gap:10px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px;cursor:pointer;transition:box-shadow .15s,border-color .15s}
.list-item:hover{box-shadow:0 2px 10px rgba(0,0,0,.06);border-color:#ccc}
.list-item.selected{border-color:var(--purple);box-shadow:0 0 0 2px var(--purple-light)}
.list-thumb{width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.list-title{font-size:12px;font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.list-meta{display:flex;align-items:center;gap:6px;flex-shrink:0}
.list-checkbox{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--bg);color:transparent}
.list-checkbox.checked{background:var(--purple);border-color:var(--purple);color:#fff}

/* 批次操作 */
.card-checkbox{position:absolute;top:6px;right:6px;width:18px;height:18px;border-radius:4px;background:var(--bg);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;z-index:2;color:transparent}
.card-checkbox.checked{background:var(--purple);border-color:var(--purple);color:#fff}
.card.selected{border-color:var(--purple);box-shadow:0 0 0 2px var(--purple-light)}
.batch-bar{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 14px;border-radius:10px;display:flex;align-items:center;gap:10px;font-size:12px;box-shadow:0 8px 30px rgba(0,0,0,.25);z-index:50}
.batch-bar select{padding:5px 8px;border-radius:6px;border:1px solid #444;background:#2a2a2a;color:#fff;font-size:11px;font-family:inherit}

/* 測驗模式 */
.quiz-top{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border)}
.quiz-progress{font-size:11px;color:var(--text3);font-weight:500}
.quiz-card-body{padding:32px 26px 28px;text-align:center}
.quiz-question{font-size:17px;font-weight:600;line-height:1.5;margin:8px 0 4px}
.quiz-hint{font-size:12px;color:var(--text3);margin-top:8px}
.quiz-answer{text-align:left;background:var(--bg2);border-radius:var(--radius);padding:14px;margin-top:18px}
.quiz-summary{font-size:12px;color:var(--text2);line-height:1.6;margin-top:8px}
.quiz-actions{display:flex;gap:10px;margin-top:20px}

/* ══════════════════════════════
   待辦事項 + 月曆
   ══════════════════════════════ */
.todo-layout{display:grid;grid-template-columns:330px 1fr;gap:14px;align-items:start}
@media (max-width:780px){.todo-layout{grid-template-columns:1fr}}
.cal-box{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px}
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cal-head strong{font-size:13px;font-weight:600}
.cal-nav-btn{padding:4px 7px;border:1px solid var(--border);border-radius:6px;background:var(--bg);cursor:pointer;color:var(--text2);font-size:12px}
.cal-nav-btn:hover{background:var(--bg2)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-dow{font-size:10px;color:var(--text3);text-align:center;padding:3px 0;font-weight:500}
.cal-cell{position:relative;aspect-ratio:1/1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:7px;cursor:pointer;font-size:11px;color:var(--text);background:transparent;border:1px solid transparent}
.cal-cell:hover{background:var(--bg2)}
.cal-cell.muted{color:var(--text3)}
.cal-cell.today{border-color:var(--purple)}
.cal-cell.selected{background:var(--purple);color:#fff}
.cal-cell.selected .cal-badge{background:var(--bg);color:var(--purple-dark)}
.cal-badge{position:absolute;bottom:2px;right:3px;min-width:13px;height:13px;padding:0 3px;border-radius:7px;font-size:8px;line-height:13px;text-align:center;background:var(--purple);color:#fff;font-weight:700;display:inline-flex;align-items:center;justify-content:center}
.cal-badge.overdue{background:#c0392b}
.cal-badge.done-all{background:#1D9E75}
.cal-dots{position:absolute;bottom:3px;left:3px;display:flex;gap:2px}
.cal-dot{width:4px;height:4px;border-radius:50%;display:block}
.cal-dot.fin-income{background:#1D9E75}
.cal-dot.fin-expense{background:#c0392b}
.cal-dot.review{background:var(--purple)}
.cal-cell.selected .cal-dot{outline:1px solid rgba(255,255,255,.7)}
.cal-legend-dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:3px}
.todo-recur-badge{font-size:9px;color:var(--purple);flex-shrink:0;display:inline-flex;align-items:center;gap:2px}
.todo-sub-toggle{font-size:9px;color:var(--text2);flex-shrink:0;cursor:pointer;display:inline-flex;align-items:center;gap:2px;padding:2px 5px;border-radius:5px;background:var(--bg2)}
.todo-sub-toggle:hover{background:var(--purple-light);color:var(--purple)}
.todo-subtasks{margin:2px 0 6px 34px;padding:6px 8px;border-left:2px solid var(--border);display:flex;flex-direction:column;gap:4px}
.todo-sub-item{display:flex;align-items:center;gap:6px;font-size:11.5px}
.todo-sub-item .todo-check{width:13px;height:13px;flex-shrink:0}
.todo-sub-item .sub-text{flex:1}
.todo-sub-item .sub-text.done{text-decoration:line-through;color:var(--text3)}
.todo-sub-add-row{display:flex;gap:5px;margin-top:2px}
.todo-sub-add-row input{flex:1;font-size:11px;padding:4px 7px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text)}
.todo-box{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;min-height:300px}
.todo-box-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.todo-box-head h3{font-size:13px;font-weight:600}
.todo-box-head span{font-size:11px;color:var(--text3)}
.todo-add-row{display:flex;gap:6px;margin-bottom:12px}
.todo-add-row .inp{flex:1}
.todo-list{display:flex;flex-direction:column;gap:6px}
.todo-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border:1px solid var(--border);border-radius:8px;background:var(--bg2)}
.todo-check{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border);background:var(--bg);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;color:transparent}
.todo-check.done{background:var(--purple);border-color:var(--purple);color:#fff}
.todo-text{flex:1;font-size:12px;line-height:1.4;word-break:break-word}
.todo-text.done{color:var(--text3);text-decoration:line-through}
.todo-empty{text-align:center;color:var(--text3);font-size:12px;padding:30px 10px}
.todo-progress{font-size:11px;color:var(--text2);margin-bottom:10px}

/* 今日待辦統計卡 */
.todo-stats-card{display:flex;align-items:center;gap:14px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:14px}
.todo-stats-ring{position:relative;width:52px;height:52px;flex-shrink:0}
.todo-stats-ring svg{width:100%;height:100%;transform:rotate(-90deg)}
.todo-stats-ring-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--purple)}
.todo-stats-text{flex:1}
.todo-stats-text .big{font-size:13px;font-weight:600;margin-bottom:2px}
.todo-stats-text .small{font-size:11px;color:var(--text3)}
.todo-archive-btn{display:flex;align-items:center;gap:5px;padding:7px 12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--text2);font-size:11px;font-family:inherit;cursor:pointer;white-space:nowrap}
.todo-archive-btn:hover{background:var(--bg2)}
.todo-archive-btn:disabled{opacity:.4;cursor:not-allowed}

/* 封存區 */
.todo-archive-toggle{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--purple);cursor:pointer;margin-top:10px;user-select:none}
.todo-archive-section{margin-top:8px;border-top:1px dashed var(--border);padding-top:10px}
.todo-archive-day{margin-bottom:10px}
.todo-archive-day-label{font-size:10px;color:var(--text3);font-weight:600;margin-bottom:5px;display:flex;align-items:center;gap:6px}
.todo-archive-item{display:flex;align-items:center;gap:8px;padding:6px 9px;border-radius:6px;background:var(--bg2);font-size:11px;color:var(--text3);margin-bottom:3px}
.todo-archive-item .archived-check{color:#1D9E75;flex-shrink:0}
.todo-archive-item .archived-text{flex:1;text-decoration:line-through}
.todo-archive-item .archived-restore{cursor:pointer;color:var(--text3);background:none;border:none;flex-shrink:0}
.todo-archive-item .archived-restore:hover{color:var(--purple)}
.proto-warn{background:#fcebeb;border:1px solid #f0b0b0;border-radius:var(--radius);padding:9px 13px;margin-bottom:13px;font-size:12px;color:#791f1f;display:flex;align-items:center;gap:8px}
.proto-warn i{flex-shrink:0;font-size:15px}

/* 待辦：編號 / 標籤 / 今明摘要 */
.todo-num{width:18px;text-align:center;font-size:11px;color:var(--text3);flex-shrink:0;font-weight:500}
.todo-tag-badge{font-size:9px;padding:2px 7px;border-radius:4px;font-weight:500;flex-shrink:0;white-space:nowrap}
.todo-tag-select{padding:7px 9px;border:1px solid var(--border);border-radius:var(--radius);font-size:12px;font-family:inherit;color:var(--text);background:#fafafa;flex-shrink:0}
.todo-tag-select:focus{outline:none;border-color:var(--purple)}
.todo-filter-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.todo-filter-chip{padding:3px 10px;border-radius:12px;font-size:10px;cursor:pointer;border:1px solid var(--border);color:var(--text2);background:var(--bg);user-select:none}
.todo-filter-chip.active{background:var(--purple);color:#fff;border-color:var(--purple)}
.agenda-box{margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.agenda-title{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:6px;display:flex;align-items:center;gap:5px;cursor:pointer}
.agenda-title:hover{color:var(--purple)}
.agenda-list{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.agenda-item{display:flex;align-items:center;gap:7px;font-size:11px;padding:5px 7px;border-radius:6px;background:var(--bg2)}
.agenda-item .todo-text{font-size:11px}
.agenda-empty{font-size:11px;color:var(--text3);padding:2px 7px 6px}
/* ── Notes page ── */
.notes-layout{display:grid;grid-template-columns:240px 1fr;gap:0;height:calc(100vh - 54px);overflow:hidden;}
.notes-sidebar{border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;background:var(--bg2);}
.notes-sidebar-head{padding:10px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.notes-sidebar-head h4{font-size:12px;font-weight:600;color:var(--text2);}
.notes-list{flex:1;overflow-y:auto;padding:6px;}
.note-list-item{padding:8px 10px;border-radius:8px;cursor:pointer;margin-bottom:2px;border:1px solid transparent;}
.note-list-item:hover{background:var(--bg);border-color:var(--border);}
.note-list-item.active{background:var(--bg);border-color:var(--purple);box-shadow:0 0 0 1px var(--purple)22;}
.note-list-title{font-size:12px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.note-list-preview{font-size:10px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
.note-list-meta{font-size:9px;color:var(--text3);margin-top:2px;display:flex;gap:6px;}
.note-list-item .note-del-btn{display:none;background:none;border:none;color:var(--text3);cursor:pointer;font-size:11px;padding:0 2px;margin-left:auto;}
.note-list-item:hover .note-del-btn{display:block;}

.notes-editor-wrap{display:flex;flex-direction:column;overflow:hidden;}
.notes-editor-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text3);gap:10px;}
.notes-editor-empty i{font-size:36px;}
.notes-editor-empty p{font-size:13px;}

.note-editor-head{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0;}
.note-title-inp{font-size:16px;font-weight:600;border:none;outline:none;flex:1;background:transparent;color:var(--text);font-family:inherit;}
.note-title-inp::placeholder{color:var(--text3);}
.note-meta-bar{font-size:10px;color:var(--text3);padding:4px 16px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;gap:10px;}
.note-tag-chip{display:inline-flex;align-items:center;gap:3px;background:var(--purple-light);color:var(--purple);border-radius:99px;padding:1px 8px;font-size:10px;cursor:pointer;}
.note-tag-chip .rm{opacity:.6;cursor:pointer;}
.note-tag-chip .rm:hover{opacity:1;}
.note-add-tag-btn{font-size:10px;color:var(--text3);background:none;border:1px dashed var(--border);border-radius:99px;padding:1px 8px;cursor:pointer;font-family:inherit;}
.note-add-tag-btn:hover{border-color:var(--purple);color:var(--purple);}

/* toolbar */
.editor-toolbar{display:flex;align-items:center;gap:1px;padding:5px 12px;border-bottom:1px solid var(--border);flex-wrap:wrap;flex-shrink:0;background:#fafafa;}
.tb-btn{background:none;border:none;border-radius:5px;padding:4px 6px;cursor:pointer;font-size:13px;color:var(--text2);display:flex;align-items:center;justify-content:center;min-width:28px;}
.tb-btn:hover{background:var(--purple-light);color:var(--purple);}
.tb-btn.active{background:var(--purple-light);color:var(--purple);}
.tb-sep{width:1px;height:18px;background:var(--border);margin:0 3px;flex-shrink:0;}
.tb-select{font-size:11px;border:1px solid var(--border);border-radius:5px;padding:3px 6px;background:var(--bg);color:var(--text);font-family:inherit;cursor:pointer;}
.tb-select:focus{outline:none;border-color:var(--purple);}

/* editor content */
.note-content-area{flex:1;overflow-y:auto;padding:16px 20px;}
.note-editor{outline:none;min-height:400px;font-size:13px;line-height:1.8;color:var(--text);}
.note-editor h1{font-size:22px;font-weight:700;margin:12px 0 6px;color:var(--text);}
.note-editor h2{font-size:17px;font-weight:600;margin:10px 0 4px;color:var(--text);}
.note-editor h3{font-size:14px;font-weight:600;margin:8px 0 3px;color:var(--text);}
.note-editor p{margin:2px 0;}
.note-editor ul,.note-editor ol{padding-left:20px;margin:4px 0;}
.note-editor li{margin:2px 0;}
.note-editor blockquote{border-left:3px solid var(--purple);margin:6px 0;padding:4px 12px;background:var(--purple-light);border-radius:0 6px 6px 0;color:var(--text2);}
.note-editor pre{background:#1e1e2e;color:#cdd6f4;border-radius:8px;padding:12px 14px;font-family:monospace;font-size:12px;overflow-x:auto;margin:6px 0;white-space:pre-wrap;}
.note-editor code{background:#f0eeff;color:var(--purple);border-radius:4px;padding:1px 5px;font-family:monospace;font-size:12px;}
.note-editor pre code{background:transparent;color:inherit;padding:0;}
.note-editor a{color:var(--purple);text-decoration:underline;}
.note-editor hr{border:none;border-top:2px solid var(--border);margin:12px 0;}
.note-editor img{max-width:100%;border-radius:8px;margin:6px 0;}
.note-editor mark{background:var(--bg)3b0;border-radius:3px;padding:0 2px;}

/* card citation block */
.note-card-cite{display:flex;gap:10px;align-items:flex-start;border:1px solid var(--border);border-radius:8px;padding:8px 10px;margin:6px 0;background:#fafafa;cursor:pointer;}
.note-card-cite:hover{border-color:var(--purple);}
.note-card-cite-thumb{width:36px;height:36px;border-radius:6px;background:var(--purple-light);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;overflow:hidden;}
.note-card-cite-thumb img{width:100%;height:100%;object-fit:cover;}
.note-card-cite-body{flex:1;min-width:0;}
.note-card-cite-title{font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.note-card-cite-url{font-size:10px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.note-card-cite-label{font-size:9px;color:var(--purple);font-weight:600;text-transform:uppercase;letter-spacing:.04em;}

/* note tag filter strip */
.note-tag-filter{padding:6px 8px;border-bottom:1px solid var(--border);display:flex;flex-wrap:wrap;gap:4px;}
.note-tag-filter-chip{font-size:10px;padding:2px 8px;border-radius:99px;border:1px solid var(--border);cursor:pointer;background:var(--bg);color:var(--text2);white-space:nowrap;}
.note-tag-filter-chip:hover{border-color:var(--purple);color:var(--purple);}
.note-tag-filter-chip.active{color:#fff;border-color:transparent;}
.note-tag-filter-chip.manage{background:transparent;border:1px dashed var(--border);color:var(--text3);}
.note-tag-filter-chip.manage:hover{border-color:var(--purple);color:var(--purple);}
/* tag manager modal panel */
.ntm-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);}
.ntm-swatch{width:12px;height:12px;border-radius:50%;flex-shrink:0;}
.ntm-label{flex:1;font-size:13px;}
.ntm-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px;padding:0 4px;}
.ntm-del:hover{color:#e04a49;}
.card-note-section{border-top:1px solid var(--border);padding-top:12px;margin-top:8px;}
.card-note-section h4{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:8px;}

/* ── 首頁儀表板 ── */
.home-page{display:flex;flex-direction:column;gap:14px}
.home-blocks-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media (max-width:760px){.home-blocks-grid{grid-template-columns:1fr}}
.home-priority-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media (max-width:760px){.home-priority-grid{grid-template-columns:1fr}}
.home-modgrid-section{display:flex;flex-direction:column;gap:12px;padding-top:18px;border-top:1px solid var(--border)}
.home-modgrid-header{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.home-modgrid-header .home-section-label{margin:0}
.home-block-overview{grid-column:1/-1}
.home-block-overview .home-block-icon{background:var(--purple)}
.home-block-overview .home-stat-grid{border:none;box-shadow:none;border-radius:0;margin:0 -16px -15px;width:calc(100% + 32px)}
.home-block-overview .home-stat-card:first-child{padding-left:16px}
.home-block-overview .home-stat-card:last-child{padding-right:16px}
.home-blocks-list{display:flex;flex-direction:column;gap:14px}
.home-blocks-row{display:flex;gap:14px;overflow-x:auto;padding-bottom:6px;-webkit-overflow-scrolling:touch}
.home-blocks-row .home-block{flex:1 0 320px;min-width:300px}
.home-toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.home-block{transition:opacity .15s,box-shadow .15s}
.home-block.dragging{opacity:.4}
.home-block.drag-over{box-shadow:0 0 0 2px var(--purple) inset}
.home-block-grip{font-size:13px;color:var(--text3);cursor:grab;flex-shrink:0}
.home-block-hide{margin-left:4px;width:22px;height:22px;border:none;background:transparent;color:var(--text3);border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;opacity:0;transition:opacity .12s,background .12s,color .12s}
.home-block:hover .home-block-hide{opacity:1}
.home-block-hide:hover{background:var(--bg2);color:var(--purple)}
.home-hidden-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.home-hidden-label{font-size:11px;color:var(--text3)}
.home-hidden-chip{display:flex;align-items:center;gap:4px;font-size:11px;padding:4px 10px;border-radius:999px;border:1px dashed var(--border);background:var(--bg2);color:var(--text2);cursor:pointer}
.home-hidden-chip:hover{border-color:var(--purple);color:var(--purple)}
.home-block{background:var(--bg);border:1px solid var(--border);border-top:3px solid var(--block-accent, var(--border));border-radius:var(--radius-lg);padding:14px 16px 15px;box-shadow:var(--shadow-sm);transition:box-shadow .15s,transform .15s,border-color .15s}
.home-block:hover{box-shadow:var(--shadow-md);transform:translateY(-1px);border-color:color-mix(in srgb, var(--block-accent, var(--border)) 40%, var(--border));border-top-color:var(--block-accent, var(--border))}
.home-block-head{display:flex;align-items:center;gap:9px;margin-bottom:12px}
.home-block-count-wrap{display:flex;align-items:baseline;gap:4px;cursor:pointer;padding:3px 4px;border-radius:8px;background:transparent;flex-shrink:0;transition:background .15s}
.home-block-count-wrap:hover{background:var(--bg2)}
.home-block-count{font-family:var(--font-body);font-weight:800;font-size:15px;color:var(--ink);line-height:1}
.home-block-count-label{font-size:10.5px;color:var(--text3);font-weight:600;white-space:nowrap}
.home-block-head .home-block-icon{width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;color:#fff}
.home-block-todo .home-block-icon{background:#D85A30}
.home-block-bk .home-block-icon{background:#378ADD}
.home-block-note .home-block-icon{background:#7F77DD}
.home-block-ql .home-block-icon{background:#1D9E75}
.home-block-shop .home-block-icon{background:#D4537E}
.home-block-food .home-block-icon{background:#E67E22}
.home-block-travel .home-block-icon{background:#378ADD}
.home-block-finance .home-block-icon{background:#C9A24B}
.home-block-reminder .home-block-icon{background:#E64545}
.home-block-timeline .home-block-icon{background:#8B5CF6}
.home-block-head h3{font-size:13.5px;font-weight:700;flex:1;color:var(--ink)}
.home-block-head h3[ondblclick]{cursor:text}
.home-block-title-edit{flex-shrink:0;font-size:10.5px;color:var(--text3);opacity:0;cursor:pointer;padding:3px;border-radius:5px;margin-right:2px;transition:opacity .12s,color .12s,background .12s}
.home-block-head:hover .home-block-title-edit{opacity:1}
.home-block-title-edit:hover{color:var(--ink);background:var(--bg2)}
.home-block-title-inp{font-size:13.5px;font-weight:700;color:var(--ink);font-family:inherit;border:1px solid var(--purple);border-radius:6px;padding:2px 7px;flex:1;min-width:0;outline:none;background:var(--bg)}
.home-block-more{font-size:11px;color:var(--purple);cursor:pointer;text-decoration:underline;text-underline-offset:2px;flex-shrink:0}
.home-bk-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
.home-bk-card{display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;background:var(--bg);overflow:hidden}
.home-bk-card:hover{border-color:#378ADD;box-shadow:0 1px 6px rgba(55,138,221,.12)}
.home-bk-emoji{font-size:18px;flex-shrink:0}
.home-bk-title{font-size:11.5px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.home-note-row{display:flex;flex-direction:column;gap:6px;max-height:168px;overflow-y:auto}
.home-note-card{display:flex;align-items:center;gap:9px;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;background:var(--bg)}
.home-note-card:hover{border-color:#7F77DD;box-shadow:0 1px 6px rgba(127,119,221,.12)}
.home-note-title{font-size:12px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.home-note-time{font-size:10px;color:var(--text3);flex-shrink:0}
.home-ql-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px}
.home-ql-card{display:flex;flex-direction:column;align-items:center;gap:5px;padding:10px 6px;border:1px solid var(--border);border-radius:var(--radius);text-decoration:none;color:var(--text);background:var(--bg)}
.home-ql-card:hover{border-color:#1D9E75;box-shadow:0 1px 6px rgba(29,158,117,.12)}
.home-ql-card img{width:20px;height:20px;border-radius:4px}
.home-ql-card-label{font-size:11px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%}
.home-empty-mini{font-size:11.5px;color:var(--text3);padding:10px 4px}
.home-greeting{font-size:21px;font-weight:800;margin-bottom:2px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;padding:2px 4px;border-radius:6px;border:1px solid transparent;font-family:var(--font-body);letter-spacing:-.01em;color:var(--ink)}
.home-greeting:hover{background:var(--bg2);border-color:var(--border)}
.home-greeting .home-sub-edit-icon{font-size:11px;color:var(--text3);opacity:0;flex-shrink:0;font-weight:400}
.home-greeting:hover .home-sub-edit-icon{opacity:1}
.home-greeting-inp{font-size:16px;font-weight:600;color:var(--text);font-family:inherit;border:1px solid var(--purple);border-radius:6px;padding:4px 8px;width:min(360px,100%);outline:none;background:var(--bg)}
.home-greeting-sub{font-size:12px;color:var(--text2);margin-bottom:4px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;padding:2px 4px;border-radius:6px;border:1px solid transparent}
.home-greeting-sub:hover{background:var(--bg2);border-color:var(--border)}
.home-greeting-sub .home-sub-edit-icon{font-size:11px;color:var(--text3);opacity:0;flex-shrink:0}
.home-greeting-sub:hover .home-sub-edit-icon{opacity:1}
.home-greeting-sub-inp{font-size:12px;color:var(--text2);font-family:inherit;border:1px solid var(--purple);border-radius:6px;padding:4px 8px;width:min(440px,100%);outline:none;background:var(--bg)}
.home-todo-row{display:flex;flex-direction:column;gap:6px;max-height:168px;overflow-y:auto}
.home-todo-card{display:flex;align-items:center;gap:9px;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg)}
.home-todo-text{font-size:12px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.home-todo-text.done{color:var(--text3);text-decoration:line-through}
.home-todo-date{font-size:10px;color:var(--text3);flex-shrink:0}

/* 今天需要處理：勾選框＋色點＋單行文字＋右側到期狀態 */
.home-task-row{display:flex;align-items:center;gap:10px;padding:8px 4px;border-radius:9px;cursor:pointer}
.home-task-row:hover{background:var(--bg2)}
.home-task-check{width:16px;height:16px;border-radius:5px;border:1.5px solid var(--border);background:var(--bg);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;color:transparent}
.home-task-check.done{background:var(--purple);border-color:var(--purple);color:#fff}
.home-task-check i{font-size:10px}
.home-task-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.home-task-text{flex:1;min-width:0;font-size:13px;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.home-task-due{font-size:11px;color:var(--text3);flex-shrink:0;white-space:nowrap}
.home-task-due.is-overdue{color:#D85A30;font-weight:700}
.home-task-due.is-today{color:var(--text3);font-weight:500}
.home-reminder-subhead{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.03em;margin:2px 2px 6px}
.home-reminder-subhead:not(:first-child){margin-top:2px}
.home-reminder-subhead i{font-size:12px}
.home-reminder-subcount{background:var(--bg2);color:var(--text2);border-radius:999px;padding:0 6px;font-size:10px;font-weight:700}
.home-reminder-divider{height:1px;background:var(--border);margin:10px 2px;border:none}

/* 最近活動：圖示＋單行文字＋右側時間 */
.home-activity-row{display:flex;align-items:center;gap:10px;padding:8px 4px;border-radius:9px;cursor:pointer}
.home-activity-row:hover{background:var(--bg2)}
.home-activity-icon{flex-shrink:0;font-size:15px;width:20px;text-align:center;line-height:1}
.home-activity-text{flex:1;min-width:0;font-size:13px;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.home-activity-time{font-size:11px;color:var(--text3);flex-shrink:0;white-space:nowrap}

/* ── 首頁精簡佈局：收合控制 ── */
.home-statgrid-toggle-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.home-section-label{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.04em;text-transform:uppercase}
.home-collapse-btn{display:flex;align-items:center;gap:3px;font-size:11.5px;color:var(--text2);background:none;border:none;cursor:pointer;padding:4px 8px;border-radius:6px;font-family:var(--font-body)}
.home-collapse-btn:hover{background:var(--bg2)}
.home-block-collapse{flex-shrink:0;width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:6px;color:var(--text3);cursor:pointer;background:none;border:none;font-size:12px;transition:background .12s,color .12s}
.home-block-collapse:hover{background:rgba(0,0,0,.06);color:var(--ink)}
.home-block.is-collapsed{padding-bottom:15px}
.home-block.is-collapsed .home-block-head{margin-bottom:0}

/* ── 首頁「今日一覽」統計長條：統一容器，卡片間用分隔線取代各自邊框陰影 ── */
.home-stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:1px;background:var(--border);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);overflow:hidden}
@media (max-width:520px){.home-stat-grid{grid-template-columns:1fr}}
.home-stat-card{position:relative;display:flex;align-items:center;gap:10px;background:var(--bg);border:none;border-top:3px solid var(--purple);border-radius:0;padding:13px 16px;cursor:pointer;overflow:hidden;box-shadow:none;transition:background .15s}
.home-stat-card::before{display:none}
.home-stat-card:hover{background:var(--bg2);box-shadow:none;transform:none}
.home-stat-card:active{transform:none}
.home-stat-icon{display:flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:8px;flex-shrink:0;font-size:14px;background:color-mix(in srgb, var(--purple) 15%, transparent);color:var(--purple)}
.home-stat-body{flex:1;min-width:0;display:flex;flex-direction:column}
.home-stat-label{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px;display:flex;align-items:center;gap:5px;order:2}
.home-stat-value{font-family:var(--font-body);font-size:27px;font-weight:800;letter-spacing:-.02em;color:var(--purple-dark);line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;order:1;margin-bottom:1px}
.home-stat-value .unit{font-family:var(--font-body);font-size:12px;font-weight:600;color:var(--text2);margin-left:2px}
.home-stat-delta{font-size:11px;color:var(--text3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;order:3}
.home-stat-delta.up{color:#1D9E75;font-weight:700}
.home-stat-delta.down{color:#D85A30;font-weight:700}
.home-stat-arrow{display:none}

/* ── 常用連結頁面：卡片式快捷入口儀表板 ── */
.ql-page{max-width:980px;padding-bottom:40px;}
.ql-empty{text-align:center;padding:60px 20px;color:var(--text3);font-size:13px;line-height:1.8;}

/* Spotlight 搜尋 */
.ql-spotlight-wrap{position:relative;margin-bottom:20px;}
.ql-spotlight-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:15px;pointer-events:none;}
.ql-spotlight{width:100%;box-sizing:border-box;padding:12px 16px 12px 40px;border-radius:12px;border:1.5px solid var(--border);font-size:13.5px;font-family:inherit;outline:none;background:var(--bg);transition:border-color .15s,box-shadow .15s;}
.ql-spotlight:focus{border-color:var(--purple);box-shadow:0 0 0 3px #7c6fef18;}
.ql-spotlight-results{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--bg);border:1px solid var(--border);border-radius:12px;box-shadow:0 10px 30px rgba(23,19,33,.16);max-height:360px;overflow-y:auto;z-index:80;padding:6px;}
.ql-spotlight-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;cursor:pointer;text-decoration:none;color:var(--text);}
.ql-spotlight-item.active,.ql-spotlight-item:hover{background:var(--purple-light);}
.ql-spotlight-item img{width:18px;height:18px;border-radius:4px;flex-shrink:0;}
.ql-spotlight-item-title{font-size:12.5px;font-weight:500;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ql-spotlight-item-domain{font-size:10.5px;color:var(--text3);flex-shrink:0;}
.ql-spotlight-item-group{font-size:9.5px;color:#fff;padding:1px 6px;border-radius:999px;flex-shrink:0;}
.ql-spotlight-empty{padding:22px;text-align:center;color:var(--text3);font-size:12px;}

/* 收藏／智能常用 橫向捲動列 */
.ql-smart-section{margin-bottom:22px;}
.ql-smart-title{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;}
.ql-smart-row{display:flex;gap:12px;overflow-x:auto;padding:2px 2px 10px;scrollbar-width:thin;}
.ql-smart-row::-webkit-scrollbar{height:5px;}
.ql-smart-row::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
.ql-smart-row .ql-card{min-width:96px;flex-shrink:0;}

.ql-groups-toolbar{display:flex;justify-content:flex-end;margin-bottom:10px;}
.ql-add-group-btn{display:flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;color:var(--purple);background:var(--bg);border:1.5px solid #c7c1f0;border-radius:8px;padding:6px 11px;cursor:pointer;font-family:inherit;transition:background .1s;}
.ql-add-group-btn:hover{background:var(--purple-light);}
.ql-group{margin-bottom:26px;}
.ql-group-title{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.ql-group-empty{font-size:11.5px;color:var(--text3);padding:10px 2px;}
.ql-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(112px,1fr));gap:12px;}

/* App-like 卡片 */
.ql-card{
  position:relative;display:flex;flex-direction:column;align-items:center;gap:7px;
  padding:18px 10px 13px;background:var(--bg);border:1px solid var(--border);border-radius:16px;
  text-decoration:none;color:var(--text);cursor:pointer;text-align:center;overflow:hidden;
  transition:transform .16s cubic-bezier(.2,.8,.3,1),box-shadow .16s ease,border-color .16s ease;
}
.ql-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--card-accent,var(--purple));opacity:.9;}
.ql-card:hover{transform:translateY(-3px) scale(1.045);box-shadow:0 12px 28px rgba(23,19,33,.16);border-color:var(--card-accent,var(--purple));z-index:2;}
.ql-card:hover .ql-card-icon img{transform:scale(1.18);}
.ql-card-icon{width:44px;height:44px;border-radius:12px;background:var(--bg2);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;position:relative;}
.ql-card-icon img{width:26px;height:26px;object-fit:contain;transition:transform .18s ease;opacity:0;animation:qlFadeIn .3s ease forwards;}
.ql-card-icon .ql-fallback{font-size:20px;opacity:0;animation:qlFadeIn .3s ease forwards;}
@keyframes qlFadeIn{to{opacity:1}}
.ql-card-icon.skeleton{background:linear-gradient(100deg,#ececf4 20%,#f7f6fc 40%,#ececf4 60%);background-size:250% 100%;animation:qlSkeleton 1.3s ease infinite;}
@keyframes qlSkeleton{0%{background-position:120% 0}100%{background-position:-20% 0}}
.ql-card-label{font-size:11.5px;font-weight:600;line-height:1.32;word-break:break-word;max-width:100%;}
.ql-card-domain{font-size:9.5px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%;}

/* 常駐角標：置頂／收藏 */
.ql-badge{position:absolute;left:6px;top:6px;width:16px;height:16px;border-radius:5px;background:rgba(255,255,255,.95);display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--purple);box-shadow:0 1px 3px rgba(0,0,0,.15);}
.ql-badge-fav{color:#e8a91d;}

/* hover 才顯示的操作列：置頂／收藏／編輯／刪除 */
.ql-card-actions{position:absolute;top:6px;right:6px;display:flex;gap:3px;opacity:0;transform:translateY(-2px);transition:opacity .15s,transform .15s;}
.ql-card:hover .ql-card-actions{opacity:1;transform:translateY(0);}
.ql-card-actions button{background:rgba(255,255,255,.95);border:1px solid var(--border);border-radius:6px;width:19px;height:19px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text3);font-size:10px;padding:0;}
.ql-card-actions button:hover{background:var(--bg);color:var(--purple);border-color:var(--purple-light);}
.ql-card-actions button.on{color:var(--purple);}
.ql-card-actions button.on.fav{color:#e8a91d;}
.ql-card-actions button.danger:hover{color:#c00;background:#fde2e2;border-color:#f5b8b8;}

.ql-add-panel{background:linear-gradient(135deg,#fafbff 0%,#f4f3ff 100%);border:1.5px solid #ddd9f8;border-radius:14px;padding:18px;margin-top:10px;}
body.dark-mode .ql-add-panel{background:linear-gradient(135deg,var(--bg) 0%,var(--bg2) 100%);border-color:var(--border)}
.ql-add-panel.collapsed{padding-bottom:14px;}
.ql-add-panel-header{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
.ql-add-panel.collapsed .ql-add-panel-header{margin-bottom:0;}
.ql-add-panel-body{overflow:hidden;}
.ql-add-panel.collapsed .ql-add-panel-body{display:none;}
.ql-add-collapse-btn{flex-shrink:0;}
.ql-add-panel-title{font-size:13px;font-weight:600;color:var(--text);flex:1;}
