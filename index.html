// 我的收藏 卡片自訂排序
let bmStarredOrder = loadBmStarredOrder();
function loadBmStarredOrder(){
  try{
    const saved = JSON.parse(localStorage.getItem('lv_bm_starred_order'));
    if(Array.isArray(saved)) return saved;
  }catch(e){}
  return [];
}
function saveBmStarredOrder(){ localStorage.setItem('lv_bm_starred_order', JSON.stringify(bmStarredOrder)); }
function applyBmStarredOrder(list){
  if(!bmStarredOrder.length) return list;
  const idx = id => { const i = bmStarredOrder.indexOf(id); return i===-1 ? Infinity : i; };
  return list.slice().sort((a,b)=> idx(a.id)-idx(b.id));
}
let _bmStarDragId=null;
function bmStarDragStart(e, id){
  _bmStarDragId = id;
  e.dataTransfer.effectAllowed = 'move';
  e.stopPropagation();
  e.currentTarget.classList.add('dragging');
}
function bmStarDragOver(e){ e.preventDefault(); e.stopPropagation(); e.currentTarget.classList.add('drag-over'); }
function bmStarDragLeave(e){ e.currentTarget.classList.remove('drag-over'); }
function bmStarDrop(e, targetId){
  e.preventDefault(); e.stopPropagation();
  e.currentTarget.classList.remove('drag-over');
  if(!_bmStarDragId || _bmStarDragId===targetId){ _bmStarDragId=null; return; }
  const {starred} = groupByTime(getBmList());
  const ids = starred.map(c=>c.id);
  const fromIdx = ids.indexOf(_bmStarDragId);
  const toIdx = ids.indexOf(targetId);
  if(fromIdx===-1 || toIdx===-1){ _bmStarDragId=null; return; }
  const item = ids.splice(fromIdx,1)[0];
  ids.splice(toIdx,0,item);
  bmStarredOrder = ids;
  saveBmStarredOrder();
  _bmStarDragId = null;
  renderGrid();
}
function bmStarDragEnd(e){
  document.querySelectorAll('.bm-card.star-drag').forEach(el=>el.classList.remove('dragging','drag-over'));
  _bmStarDragId = null;
}

function bmSort(){ return document.getElementById('bm-sort-select')?.value || 'newest'; }

function getBmList(){
  let list = state.activeCat ? state.cards.filter(c=>c.cat===state.activeCat) : [...state.cards];
  if(state.showDue) list = list.filter(isDue);
  if(bmState.onlyStarred) list = list.filter(c=>c.starred);
  const q = bmSearchQ();
  if(q) list = list.filter(c=>
    (c.title||'').toLowerCase().includes(q) ||
    (c.summary||'').toLowerCase().includes(q) ||
    (c.tags||[]).some(t=>t.toLowerCase().includes(q)) ||
    (c.url||'').toLowerCase().includes(q)
  );
  const tf = document.getElementById('bm-time-filter')?.value || 'all';
  if(tf!=='all'){
    const now=Date.now(), D=86400000, W=7*D, W2=14*D;
    list = list.filter(c=>{
      const age = now-(c.addedAt||0);
      if(tf==='today') return age<D;
      if(tf==='week') return age>=D && age<W;
      if(tf==='lastweek') return age>=W && age<W2;
      if(tf==='earlier') return age>=W2;
      return true;
    });
  }
  const sort = bmSort();
  if(sort==='newest') list.sort((a,b)=>b.addedAt-a.addedAt);
  else if(sort==='alpha') list.sort((a,b)=>(a.title||'').localeCompare(b.title||'','zh-TW'));
  else if(sort==='recent') list.sort((a,b)=>(b.lastOpenedAt||0)-(a.lastOpenedAt||0));
  return list;
}

function startBmTabRename(spanEl, oldName){
  const inp = document.createElement('input');
  inp.className = 'nav-rename-inp';
  inp.value = oldName;
  inp.style.cssText = 'width:80px;font-size:12.5px;';
  inp.onclick = e => e.stopPropagation();
  let committed = false;
  const commit = () => {
    if(committed) return; committed = true;
    const newName = inp.value.trim();
    if(newName && newName !== oldName && !state.cats.find(c=>c.name===newName)){
      const cat = state.cats.find(c=>c.name===oldName);
      if(cat){
        state.cards.forEach(c=>{ if(c.cat===oldName) c.cat=newName; });
        if(state.activeCat===oldName) state.activeCat=newName;
        cat.name = newName;
        save();
      }
    }
    renderBmTabs(); renderSidebar();
  };
  inp.onblur = commit;
  inp.onkeydown = e => {
    e.stopPropagation();
    if(e.key==='Enter') inp.blur();
    if(e.key==='Escape'){ committed=true; renderBmTabs(); }
  };
  spanEl.replaceWith(inp); inp.focus(); inp.select();
}

function renderBmInfobar(){

  const weekAdded = state.cards.filter(c=> c.addedAt && (now-c.addedAt)<7*86400000).length;
  const lastTs = state.cards.reduce((m,c)=>Math.max(m,c.addedAt||0),0);
  const lastStr = lastTs ? relTime(lastTs) : '—';
  const statsEl = document.getElementById('bm-stats');
  if(statsEl) statsEl.innerHTML =
    `<span class="bm-stat-chip">全部書籤 <strong>${total}</strong></span>` +

  const starBtn = document.getElementById('bm-star-btn');

function relTime(ts){
  const s = Math.floor((Date.now()-ts)/1000);
  if(s<60) return '剛剛';
  if(s<3600) return Math.floor(s/60)+'分鐘前';
  if(s<86400) return Math.floor(s/3600)+'小時前';
  return Math.floor(s/86400)+'天前';
}

// ── 時間分組 ──
function groupByTime(list){
  const now = Date.now();
  const W=7*86400000, W2=14*86400000;
  const pinned=[], starred=[], today=[], week=[], lastweek=[], earlier=[];
  list.forEach(c=>{
    if(c.pinned){ pinned.push(c); return; }
    const age=now-(c.addedAt||0);
    if(c.starred && !bmState.onlyStarred) starred.push(c);  // starred 不同於 pinned 才顯示收藏區
    if(age<86400000) today.push(c);
    else if(age<W) week.push(c);
    else if(age<W2) lastweek.push(c);
    else earlier.push(c);
  });
  return {pinned, starred: applyBmStarredOrder(starred), today, week, lastweek, earlier};
}

    : `<div class="bm-row">${cards}</div>`;
  return `<div class="bm-section">

      <span class="bm-section-title">${label}${isStarred?`<span class="bm-section-count">(${list.length})</span>`:''}</span>

      ${collapseBtn}
    </div>
    ${collapsed ? '' : rowBody}
  </div>`;
}

// ── 分區網格（瀑布流模式：依時間分區塊 + 可換行網格，取代舊的column-count排法）──
function bmGridSectionHTML(list, sectionKey, label){
  if(!list.length) return '';
  const isStarred = sectionKey==='starred';
  const collapsed = isStarred && bmState.starredCollapsed;
  const collapseBtn = isStarred
    ? `<button class="bm-section-collapse-btn" onclick="toggleBmStarredCollapsed()" title="${collapsed?'展開收藏':'收合收藏'}"><i class="ti ti-chevron-${collapsed?'down':'up'}"></i></button>`
    : '';
  const cards = collapsed ? '' : list.map(c=>bmCardHTML(c, {starredRow:isStarred})).join('');
  return `<div class="bm-section">
    <div class="bm-section-header">
      <span class="bm-section-title">${label}<span class="bm-section-count">(${list.length})</span></span>
      ${collapseBtn}
    </div>
    ${collapsed ? '' : `<div class="bm-masonry-grid">${cards}</div>`}
  </div>`;
}

function openBmViewAll(key, label){

function openBmMoreMenu(id, e){

    <div class="bm-more-menu-item" onclick="copyBmUrl('${id}')"><i class="ti ti-copy" style="font-size:13px"></i>複製連結</div>

  document.body.appendChild(menu);

    html = `<div class="bm-viewall-list" style="padding-top:14px">${flat.map(c=>bmListItemHTML(c)).join('')}</div>`;

  grid.innerHTML = html;
  syncMainViewSwitch();

function statsLineChart(labels, series, opts){
  opts = opts||{};
  const w = opts.width||560, h = opts.height||160, padL=30, padR=10, padT=10, padB=22;
  const innerW = w-padL-padR, innerH = h-padT-padB;
  const allVals = series.reduce((a,s)=>a.concat(s.values),[]);
  const maxV = Math.max(1, ...allVals);
  const stepX = labels.length>1 ? innerW/(labels.length-1) : 0;
  const yOf = v => padT + innerH - (v/maxV)*innerH;
  const xOf = i => padL + i*stepX;
  const gridLines = [0,0.5,1].map(f=>{
    const y = padT + innerH - f*innerH;
    return `<line x1="${padL}" y1="${y.toFixed(1)}" x2="${w-padR}" y2="${y.toFixed(1)}" stroke="var(--border)" stroke-width="1"/>
      <text x="${padL-6}" y="${(y+3).toFixed(1)}" text-anchor="end" font-size="9" fill="var(--text3)">${Math.round(f*maxV)}</text>`;
  }).join('');
  const linesHTML = series.map(s=>{
    const pts = s.values.map((v,i)=>`${xOf(i).toFixed(1)},${yOf(v).toFixed(1)}`).join(' ');
    const dots = s.values.map((v,i)=>`<circle cx="${xOf(i).toFixed(1)}" cy="${yOf(v).toFixed(1)}" r="2.5" fill="${s.color}"><title>${esc(s.name)} ${esc(labels[i])}: ${v}</title></circle>`).join('');
    return `<polyline points="${pts}" fill="none" stroke="${s.color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>${dots}`;
  }).join('');
  const everyN = Math.max(1, Math.ceil(labels.length/7));
  const xLabelsHTML = labels.map((l,i)=> (i%everyN===0 || i===labels.length-1) ? `<text x="${xOf(i).toFixed(1)}" y="${h-6}" text-anchor="middle" font-size="9" fill="var(--text3)">${esc(l)}</text>` : '').join('');
  const legendHTML = series.length>1 ? `<div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:6px">${series.map(s=>`<span style="font-size:10.5px;color:var(--text2);display:flex;align-items:center;gap:4px"><span style="width:8px;height:8px;border-radius:50%;background:${s.color};display:inline-block"></span>${esc(s.name)}</span>`).join('')}</div>` : '';
  return `<svg width="100%" height="${h}" viewBox="0 0 ${w} ${h}" style="overflow:visible">${gridLines}${linesHTML}${xLabelsHTML}</svg>${legendHTML}`;
}
function statsHourHistogram(log){
  const buckets = new Array(24).fill(0);
  log.forEach(ts=>{ const h=new Date(ts).getHours(); buckets[h]++; });
  const max = Math.max(1, ...buckets);
  const peakHour = buckets.indexOf(Math.max(...buckets));
  const bars = buckets.map((c,h)=>`
    <div class="bar-col">
      <div class="bar-track"><div class="bar-fill" style="height:${c?(c/max*100):2}%;${c>0&&c===max?'background:var(--purple)':''}"></div></div>
      <div class="bar-label" style="font-size:8.5px">${h%3===0?h:''}</div>
    </div>`).join('');
  return {html:`<div class="bar-chart" style="gap:2px">${bars}</div>`, peakHour, total:log.length};
}
function statsPeriodLabel(h){
  if(h>=5&&h<12) return '上午 '+h+':00';
  if(h>=12&&h<18) return '下午 '+h+':00';
  if(h>=18&&h<24) return '晚上 '+h+':00';
  return '凌晨 '+h+':00';
}

        <div class="stat-card"><div class="stat-num">${weekAdded}</div><div class="stat-label">本週新增</div></div>
      </div>

      ${totalReviews?`
      <div class="stats-section">
        <div class="stats-section-title">複習狀況</div>
        <div class="stats-grid-top">
          <div class="stat-card"><div class="stat-num">${dueNow}</div><div class="stat-label">目前待複習</div></div>

      ${total?`
      <div class="stats-section">
        <div class="stats-section-title">過去 7 天新增趨勢</div>
        <div class="bar-chart">
          ${days.map(d=>`<div class="bar-col">
              <div class="bar-track"><div class="bar-fill" style="height:${d.count?(d.count/maxDay*100):2}%"></div></div>
              <div class="bar-val">${d.count||''}</div>
              <div class="bar-label">${d.label}</div>
            </div>`).join('')}

      <div class="stats-section">
        <div class="stats-section-title">分類內容分布</div>
        <div class="cat-bars">
          ${catStats.map(s=>`
            <div class="cat-bar-row">
              <span class="cat-bar-name"><span class="cat-dot" style="background:${s.color}"></span>${esc(s.name)}</span>
              <div class="cat-bar-track"><div class="cat-bar-fill" style="width:${s.count/maxCat*100}%;background:${s.color}"></div></div>
              <span class="cat-bar-count">${s.count}</span>
            </div>`).join('')}
        </div>
      </div>`:`<div class="stats-empty-mini">還沒有書籤資料</div>`}`;

  } else if(statsTab==='todos'){
    const todayStr=fmtDate(new Date());
    const allDates=Object.keys(todos);
    const activeTodayList = todos[todayStr]||[];
    const todayDone = activeTodayList.filter(t=>t.done).length;
    const todayTotal = activeTodayList.length;

    // 統計範圍：尚未封存的全部 + 已封存的全部（封存代表「完成並收起來」）
    let totalCreated=0, totalDone=0;
    allDates.forEach(d=>{ totalCreated += todos[d].length; totalDone += todos[d].filter(t=>t.done).length; });
    totalCreated += todoArchive.length;
    totalDone += todoArchive.length; // 封存的一定是完成的
    const completionRate = totalCreated ? Math.round(totalDone/totalCreated*100) : 0;

    // 過去 7 天封存（=完成）趨勢
    const now2=Date.now();
    const days=[];
    for(let i=6;i>=0;i--){
      const d=new Date(now2-i*86400000);
      const dayStart=new Date(d); dayStart.setHours(0,0,0,0);
      const dayEnd=dayStart.getTime()+86400000;
      const archivedCnt = todoArchive.filter(a=>a.archivedAt>=dayStart.getTime() && a.archivedAt<dayEnd).length;
      const doneTodayCnt = (todos[fmtDate(d)]||[]).filter(t=>t.done).length;
      days.push({label:`${d.getMonth()+1}/${d.getDate()}`, count: archivedCnt + (fmtDate(d)===todayStr?doneTodayCnt:0)});
    }
    const maxDay = Math.max(1, ...days.map(d=>d.count));

    // 標籤分布（含封存）
    const TMAP=getTodoTagMap();
    const tagCounts={};
    allDates.forEach(d=>todos[d].forEach(t=>{ tagCounts[t.tag]=(tagCounts[t.tag]||0)+1; }));
    todoArchive.forEach(a=>{ tagCounts[a.tag]=(tagCounts[a.tag]||0)+1; });
    const tagStats = Object.entries(tagCounts).map(([key,count])=>({
      name: TMAP[key]?.label || key, color: TMAP[key]?.color || '#999', count
    })).sort((a,b)=>b.count-a.count);
    const maxTag = Math.max(1, ...tagStats.map(s=>s.count));

    bodyHTML = `
      <div class="stats-grid-top">
        <div class="stat-card"><div class="stat-num">${todayDone} / ${todayTotal}</div><div class="stat-label">今日完成</div></div>
        <div class="stat-card"><div class="stat-num">${totalCreated}</div><div class="stat-label">總建立數</div></div>
        <div class="stat-card"><div class="stat-num">${totalDone}</div><div class="stat-label">總完成數</div></div>
        <div class="stat-card"><div class="stat-num">${completionRate}%</div><div class="stat-label">完成率</div></div>
        <div class="stat-card"><div class="stat-num">${todoArchive.length}</div><div class="stat-label">封存區數量</div></div>
      </div>

      ${totalCreated?`
      <div class="stats-section">
        <div class="stats-section-title">過去 7 天完成趨勢</div>
        <div class="bar-chart">
          ${days.map(d=>`<div class="bar-col">
              <div class="bar-track"><div class="bar-fill" style="height:${d.count?(d.count/maxDay*100):2}%"></div></div>
              <div class="bar-val">${d.count||''}</div>
              <div class="bar-label">${d.label}</div>
            </div>`).join('')}
        </div>
      </div>

      <div class="stats-section">
        <div class="stats-section-title">標籤分布（含封存）</div>
        <div class="cat-bars">
          ${tagStats.map(s=>`
            <div class="cat-bar-row">
              <span class="cat-bar-name"><span class="cat-dot" style="background:${s.color}"></span>${esc(s.name)}</span>
              <div class="cat-bar-track"><div class="cat-bar-fill" style="width:${s.count/maxTag*100}%;background:${s.color}"></div></div>
              <span class="cat-bar-count">${s.count}</span>
            </div>`).join('')}
        </div>
      </div>`:`<div class="stats-empty-mini">還沒有待辦事項資料</div>`}`;

  } else if(statsTab==='notes'){
    const noteTotal = notes.length;
    const noteWeekAdded = notes.filter(n=>now-n.createdAt<=7*86400000).length;
    const noteWeekReviewed = notes.filter(n=>n.updatedAt && now-n.updatedAt<=7*86400000 && n.updatedAt!==n.createdAt).length;
    // 筆記沒有 SRS，用「最近 30 天內更新過」當作複習完成率的近似指標
    const noteRecentlyTouched = notes.filter(n=>now-n.updatedAt<=30*86400000).length;
    const noteCompletion = noteTotal ? Math.round(noteRecentlyTouched/noteTotal*100) : 0;

    bodyHTML = `
      <div class="stats-grid-top">
        <div class="stat-card"><div class="stat-num">${noteTotal}</div><div class="stat-label">總內容數</div></div>
        <div class="stat-card"><div class="stat-num">${noteWeekAdded}</div><div class="stat-label">本週新增</div></div>
        <div class="stat-card"><div class="stat-num">${noteWeekReviewed}</div><div class="stat-label">本週複習</div></div>
        <div class="stat-card"><div class="stat-num">${noteCompletion}%</div><div class="stat-label">複習完成率</div></div>
      </div>
      ${!noteTotal?`<div class="stats-empty-mini">還沒有筆記資料</div>`:''}`;

  } else if(statsTab==='quicklinks'){
    const qlTotal = quicklinks.length;
    const qlGroups = {};
    quicklinks.forEach(q=>{ const g=q.group||'一般'; qlGroups[g]=(qlGroups[g]||0)+1; });
    const qlGroupStats = Object.entries(qlGroups).map(([name,count])=>({name,count})).sort((a,b)=>b.count-a.count);
    const maxQlGroup = Math.max(1, ...qlGroupStats.map(s=>s.count));

    bodyHTML = `
      <div class="stats-grid-top">
        <div class="stat-card"><div class="stat-num">${qlTotal}</div><div class="stat-label">總連結數</div></div>
        <div class="stat-card"><div class="stat-num">${qlGroupStats.length}</div><div class="stat-label">分組數</div></div>
      </div>
      ${qlGroupStats.length?`
      <div class="stats-section">
        <div class="stats-section-title">分組分布</div>
        <div class="cat-bars">
          ${qlGroupStats.map(s=>`
            <div class="cat-bar-row">
              <span class="cat-bar-name">${esc(s.name)}</span>
              <div class="cat-bar-track"><div class="cat-bar-fill" style="width:${s.count/maxQlGroup*100}%;background:var(--purple)"></div></div>
              <span class="cat-bar-count">${s.count}</span>
            </div>`).join('')}
        </div>
      </div>`:`<div class="stats-empty-mini">還沒有常用連結資料</div>`}`;
  } else if(statsTab==='habits'){
    // ── 使用時段分析 ──
    const hist = statsHourHistogram(activityLog);
    const timeSectionHTML = hist.total>=5 ? `
      <div class="stats-section">
        <div class="stats-section-title">最常使用的時段（依 24 小時分布，共 ${hist.total} 次瀏覽紀錄）</div>
        ${hist.html}
        <div style="font-size:11.5px;color:var(--text2);margin-top:8px">📌 你最常在 <b style="color:var(--purple)">${statsPeriodLabel(hist.peakHour)}</b> 左右使用這個工具</div>
      </div>` : `<div class="stats-empty-mini">使用紀錄還太少，持續使用一陣子後這裡會顯示你最常瀏覽的時段</div>`;

    // ── 分類成長趨勢（近 8 週，書籤前 4 大分類每週新增數）──
    const weeksBack=8;
    const weekStarts=[];
    for(let i=weeksBack-1;i>=0;i--){
      const d=new Date(now-i*7*86400000); d.setHours(0,0,0,0); d.setDate(d.getDate()-d.getDay());
      weekStarts.push(d.getTime());
    }
    const weekLabels = weekStarts.map(ts=>{ const d=new Date(ts); return `${d.getMonth()+1}/${d.getDate()}`; });
    const catCounts = state.cats.map(ct=>({name:ct.name, color:ct.color, total: state.cards.filter(c=>c.cat===ct.name).length}))
      .sort((a,b)=>b.total-a.total).slice(0,4).filter(c=>c.total>0);
    const growthSeries = catCounts.map(ct=>({
      name: ct.name, color: ct.color,
      values: weekStarts.map((start,idx)=>{
        const end = idx<weekStarts.length-1 ? weekStarts[idx+1] : now+1;
        return state.cards.filter(c=>c.cat===ct.name && c.addedAt>=start && c.addedAt<end).length;
      })
    }));
    const growthHTML = growthSeries.length ? `
      <div class="stats-section">
        <div class="stats-section-title">分類成長趨勢（近 8 週，每週新增書籤數 · 前 4 大分類）</div>
        ${statsLineChart(weekLabels, growthSeries)}
      </div>` : `<div class="stats-empty-mini">還沒有足夠的分類資料可以看成長趨勢</div>`;

    // ── 複習完成率趨勢（近 14 天）──
    const daysBack=14;
    const revDayLabels=[]; const revRateVals=[]; const revCountVals=[];
    for(let i=daysBack-1;i>=0;i--){
      const dayStart=new Date(now-i*86400000); dayStart.setHours(0,0,0,0);
      const dayEnd=dayStart.getTime()+86400000;
      const dayLogs = srsReviewLog.filter(r=>r.ts>=dayStart.getTime() && r.ts<dayEnd);
      const good = dayLogs.filter(r=>r.result!=='again').length;
      revDayLabels.push(`${dayStart.getMonth()+1}/${dayStart.getDate()}`);
      revRateVals.push(dayLogs.length ? Math.round(good/dayLogs.length*100) : 0);
      revCountVals.push(dayLogs.length);
    }
    const hasReviewLog = srsReviewLog.length>0;
    const reviewTrendHTML = hasReviewLog ? `
      <div class="stats-section">
        <div class="stats-section-title">複習完成率趨勢（近 14 天，正確率 %）</div>
        ${statsLineChart(revDayLabels, [{name:'正確率 %', color:'var(--purple)', values:revRateVals}], {height:150})}
        <div class="stats-section-title" style="margin-top:16px">每日複習次數</div>
        ${statsLineChart(revDayLabels, [{name:'複習次數', color:'#1D9E75', values:revCountVals}], {height:130})}
      </div>` : `<div class="stats-empty-mini">還沒有複習紀錄，開始複習卡片後這裡會顯示每日趨勢</div>`;

    bodyHTML = timeSectionHTML + growthHTML + reviewTrendHTML;
  }

  el.innerHTML = tabsHTML + bodyHTML;
}

let navConfig = [];   // [{key, label}] in current order
function loadNavConfig(){
  try{ const s=localStorage.getItem('lv_nav_config'); if(s) navConfig=JSON.parse(s); }catch(e){}
  // merge: ensure all default keys exist (handles adding new nav items after upgrade)
  const existingKeys=navConfig.map(n=>n.key);
  NAV_DEFAULTS.forEach(d=>{
    if(!existingKeys.includes(d.key)){
      // insert at same position as in NAV_DEFAULTS
      const defaultIdx=NAV_DEFAULTS.findIndex(x=>x.key===d.key);
      navConfig.splice(Math.min(defaultIdx, navConfig.length), 0, {key:d.key, label:d.label});
    }
  });
  if(!navConfig.length) navConfig=NAV_DEFAULTS.map(n=>({key:n.key,label:n.label}));
  saveNavConfig();
}
function saveNavConfig(){ localStorage.setItem('lv_nav_config', JSON.stringify(navConfig)); }

const NAV_EMOJI = {

function renderFixedNav(){

      || (n.key==='shopping' && state.view==='shopping')

let _navDragIdx = null;
function navDragStart(e, idx){ _navDragIdx=idx; e.dataTransfer.effectAllowed='move'; e.currentTarget.classList.add('dragging'); }
function navDrop(e, targetIdx){
  e.preventDefault();
  document.querySelectorAll('#nav-fixed-list .cat-item').forEach(el=>el.classList.remove('dragging'));
  if(_navDragIdx===null||_navDragIdx===targetIdx){_navDragIdx=null;return;}
  const moved=navConfig.splice(_navDragIdx,1)[0];
  navConfig.splice(targetIdx,0,moved);
  _navDragIdx=null;
  saveNavConfig(); renderFixedNav(); updateCounts();
}

function navClick(key){
  if(key==='home') selectHome();
  else if(key==='all') { state.view='grid'; state.showDue=false; state.activeCat=null; state.selected.clear(); render(); }
  else if(key==='todo') selectTodo();
  else if(key==='notes') selectNotes();
  else if(key==='quicklinks') selectQuicklinks();
  else if(key==='finance') selectFinance();
  else if(key==='shopping') selectShopping();
  else if(key==='food') lcSelect('food');
  else if(key==='travel') lcSelect('travel');
  else if(key==='entertainment') selectEntertainment();
  else if(key==='stats') selectStats();
}

function startNavRename(key){
  const navEl = document.getElementById('nav-fixed-'+key); if(!navEl) return;
  const labelEl = document.getElementById('nav-label-'+key); if(!labelEl) return;
  const cur = navConfig.find(n=>n.key===key);
  const inp = document.createElement('input');
  inp.className='nav-rename-inp';
  inp.value = cur?.label||'';
  inp.onclick = e=>e.stopPropagation();
  inp.ondblclick = e=>e.stopPropagation();
  let committed=false;
  const commit=()=>{
    if(committed) return; committed=true;
    const val=inp.value.trim();
    if(val && cur) cur.label=val;
    const sidebar=document.getElementById('sidebar-scroll-mid');
    const scrollY=sidebar?sidebar.scrollTop:0;
    saveNavConfig(); renderFixedNav(); updateCounts();
    if(sidebar) sidebar.scrollTop=scrollY;
  };
  inp.onblur=commit;
  inp.onkeydown=e=>{
    e.stopPropagation();
    if(e.key==='Enter'){ inp.blur(); }
    if(e.key==='Escape'){ committed=true; labelEl.textContent=cur?.label||''; inp.replaceWith(labelEl); }
  };
  labelEl.replaceWith(inp); inp.focus(); inp.select();
}

function startCatRename(spanEl, oldName){
  const inp = document.createElement('input');
  inp.className = 'nav-rename-inp';
  inp.value = oldName;
  inp.style.cssText = 'width:90px;font-size:12px;';
  inp.onclick = e => e.stopPropagation();
  let committed = false;
  const commit = () => {
    if(committed) return; committed = true;
    const newName = inp.value.trim();
    if(newName && newName !== oldName){
      const cat = state.cats.find(c=>c.name===oldName);
      if(cat){
        // rename in cats and all cards
        state.cards.forEach(c=>{ if(c.cat===oldName) c.cat=newName; });
        if(state.activeCat===oldName) state.activeCat=newName;
        cat.name = newName;
        save();
      }
    }
    const sidebar = document.getElementById('sidebar-scroll-mid');
    const scrollY = sidebar ? sidebar.scrollTop : 0;
    renderSidebar();
    if(sidebar) sidebar.scrollTop = scrollY;
  };
  inp.onblur = commit;
  inp.onkeydown = e => {
    e.stopPropagation();
    if(e.key==='Enter') inp.blur();
    if(e.key==='Escape'){ committed=true; spanEl.textContent=oldName; inp.replaceWith(spanEl); }
  };
  spanEl.replaceWith(inp); inp.focus(); inp.select();
}

// ══════════════════════════════
//  重複性任務（每天／每週／每月自動產生後續待辦）
// ══════════════════════════════
let todoRecur = []; // [{id, text, tag, freq:'daily'|'weekly'|'monthly', lastGenDate:'YYYY-MM-DD', active}]
const RECUR_BATCH = {daily:30, weekly:12, monthly:6};      // 每次產生幾筆
const RECUR_EXTEND_THRESHOLD_DAYS = {daily:10, weekly:21, monthly:60}; // 剩不到幾天份時，自動再延伸

function loadTodoRecur(){
  try{ todoRecur = JSON.parse(localStorage.getItem('lv_todo_recur')||'[]'); }catch(e){ todoRecur=[]; }
}
function saveTodoRecur(){ localStorage.setItem('lv_todo_recur', JSON.stringify(todoRecur)); }

function addDaysStr(dateStr, n){
  const d=new Date(dateStr+'T00:00:00'); d.setDate(d.getDate()+n); return fmtDate(d);
}
function addMonthsStr(dateStr, n){
  const d=new Date(dateStr+'T00:00:00'); const day=d.getDate();
  d.setDate(1); d.setMonth(d.getMonth()+n); 
  const lastDay=new Date(d.getFullYear(), d.getMonth()+1, 0).getDate();
  d.setDate(Math.min(day,lastDay));
  return fmtDate(d);
}
function nextOccurrenceDate(fromDateStr, freq){
  if(freq==='daily') return addDaysStr(fromDateStr,1);
  if(freq==='weekly') return addDaysStr(fromDateStr,7);
  return addMonthsStr(fromDateStr,1);
}

// 從 meta.lastGenDate 之後，再多產生一批該系列的待辦事項
function generateRecurBatch(meta){
  const batch = RECUR_BATCH[meta.freq]||10;
  let d = meta.lastGenDate;
  for(let i=0;i<batch;i++){
    d = nextOccurrenceDate(d, meta.freq);
    if(!todos[d]) todos[d]=[];
    todos[d].push({id:uid(), text:meta.text, done:false, tag:meta.tag, recurId:meta.id});
  }
  meta.lastGenDate = d;
}

// 建立一個新的重複系列，並立即產生第一批
function createRecurSeries(text, tag, freq, startDate){
  const meta = {id:'rec_'+uid(), text, tag, freq, lastGenDate:startDate, active:true};
  todoRecur.push(meta);
  generateRecurBatch(meta);
  saveTodoRecur(); saveTodos();
  return meta;
}

// 頁面載入時檢查：剩餘的已產生天數快用完了，就自動再延伸一批（讓重複任務永遠往後展開）
function extendAllRecurSeries(){
  if(!todoRecur.length) return;
  const todayStr = fmtDate(new Date());
  let changed=false;
  todoRecur.forEach(meta=>{
    if(!meta.active) return;
    const threshold = RECUR_EXTEND_THRESHOLD_DAYS[meta.freq]||14;
    const daysLeft = Math.floor((new Date(meta.lastGenDate+'T00:00:00') - new Date(todayStr+'T00:00:00'))/86400000);
    if(daysLeft < threshold){ generateRecurBatch(meta); changed=true; }
  });
  if(changed){ saveTodoRecur(); saveTodos(); }
}

// 刪除重複任務：只刪這一筆，或連同這筆與往後所有同系列項目一起刪掉
function deleteRecurFromHere(recurId, fromDateStr){
  Object.keys(todos).forEach(d=>{
    if(d>=fromDateStr) todos[d]=todos[d].filter(t=>t.recurId!==recurId);
  });
  const meta = todoRecur.find(m=>m.id===recurId);
  if(meta) meta.active=false; // 停用系列，之後也不再自動延伸
  saveTodos(); saveTodoRecur();
}

function calendarHTML(){
  const first=new Date(calYear, calMonth, 1);
  const startOffset=first.getDay(); // 0=Sun
  const daysInMonth=new Date(calYear, calMonth+1, 0).getDate();
  const todayStr=fmtDate(new Date());
  const dows=['日','一','二','三','四','五','六'];

  // 疊加資料：財務收支（依日期分組）＋ 學習卡片複習到期（依日期分組）
  const finByDate = {};
  (typeof financeTx!=='undefined'?financeTx:[]).forEach(t=>{
    if(!finByDate[t.date]) finByDate[t.date]={income:0, expense:0};
    finByDate[t.date][t.type] += Number(t.amount)||0;
  });
  const reviewByDate = {};
  state.cards.forEach(c=>{
    if(c.nextReview==null) return;
    const d = fmtDate(new Date(c.nextReview));
    reviewByDate[d] = (reviewByDate[d]||0)+1;
  });

  let cells='';
  for(let i=0;i<startOffset;i++) cells+=`<div class="cal-cell muted"></div>`;
  for(let d=1; d<=daysInMonth; d++){
    const dateStr=`${calYear}-${pad2(calMonth+1)}-${pad2(d)}`;
    const dayTodos = todos[dateStr]||[];
    const undoneCnt = dayTodos.filter(t=>!t.done).length;
    const cls=['cal-cell'];
    if(dateStr===todayStr) cls.push('today');
    if(dateStr===selectedDate) cls.push('selected');
    let badge='';
    if(dayTodos.length>0){
      if(undoneCnt===0){
        badge=`<span class="cal-badge done-all"><i class="ti ti-check" style="font-size:8px"></i></span>`;
      } else {
        const isPast = dateStr<todayStr;
        badge=`<span class="cal-badge${isPast?' overdue':''}">${undoneCnt}</span>`;
      }
    }
    const fin = finByDate[dateStr];
    const reviewCnt = reviewByDate[dateStr]||0;
    const dots = [];
    const titleParts = [];
    if(fin){
      if(fin.income>0){ dots.push('<span class="cal-dot fin-income"></span>'); titleParts.push(`收入 $${fin.income}`); }
      if(fin.expense>0){ dots.push('<span class="cal-dot fin-expense"></span>'); titleParts.push(`支出 $${fin.expense}`); }
    }
    if(reviewCnt>0){ dots.push('<span class="cal-dot review"></span>'); titleParts.push(`${reviewCnt} 張卡片待複習`); }
    const dotsHTML = dots.length ? `<div class="cal-dots">${dots.join('')}</div>` : '';
    cells+=`<div class="${cls.join(' ')}" onclick="selectDate('${dateStr}')" ${titleParts.length?`title="${titleParts.join('，')}"`:''}>
      <span>${d}</span>
      ${badge}
      ${dotsHTML}
    </div>`;
  }
  return `
    <div class="cal-head">
      <button class="cal-nav-btn" onclick="changeMonth(-1)"><i class="ti ti-chevron-left"></i></button>
      <strong>${calYear} 年 ${calMonth+1} 月</strong>
      <button class="cal-nav-btn" onclick="changeMonth(1)"><i class="ti ti-chevron-right"></i></button>
    </div>
    <div class="cal-grid">
      ${dows.map(d=>`<div class="cal-dow">${d}</div>`).join('')}
      ${cells}
    </div>
    <div style="margin-top:10px;display:flex;gap:10px;font-size:10px;color:var(--text2);flex-wrap:wrap">
      <span><span class="cal-badge" style="position:static;display:inline-flex;margin-right:3px">N</span>未完成件數</span>
      <span><span class="cal-badge overdue" style="position:static;display:inline-flex;margin-right:3px">N</span>已逾期</span>
      <span><span class="cal-badge done-all" style="position:static;display:inline-flex;margin-right:3px"><i class="ti ti-check" style="font-size:8px"></i></span>全部完成</span>
    </div>
    <div style="margin-top:4px;display:flex;gap:10px;font-size:10px;color:var(--text2);flex-wrap:wrap">
      <span><span class="cal-legend-dot" style="background:#1D9E75"></span>當日有收入</span>
      <span><span class="cal-legend-dot" style="background:#c0392b"></span>當日有支出</span>
      <span><span class="cal-legend-dot" style="background:var(--purple)"></span>有卡片待複習</span>
    </div>
    <button class="btn-ghost" style="width:100%;margin-top:10px;justify-content:center;display:flex" onclick="selectDate('${todayStr}')">回到今天</button>
    ${agendaHTML()}`;
}

function agendaHTML(){
  const now=new Date();
  const tomorrow=new Date(now); tomorrow.setDate(now.getDate()+1);
  const todayStr=fmtDate(now), tomorrowStr=fmtDate(tomorrow);
  const TMAP=getTodoTagMap();
  const agendaRow=(dateStr,label)=>{
    const list=todos[dateStr]||[];
    if(!list.length) return `<div class="agenda-title" onclick="selectDate('${dateStr}')">${label}</div><div class="agenda-empty">沒有待辦事項</div>`;
    return `<div class="agenda-title" onclick="selectDate('${dateStr}')">${label}<span style="color:var(--text3);font-weight:400">（${list.filter(t=>t.done).length}/${list.length}）</span></div>
      <div class="agenda-list">
        ${list.map(t=>{
          const tag=TMAP[t.tag];
          return `<div class="agenda-item">
            <div class="todo-check${t.done?' done':''}" style="width:15px;height:15px" onclick="toggleTodoItem('${t.id}','${dateStr}')"><i class="ti ti-check" style="font-size:9px"></i></div>
            <div class="todo-text${t.done?' done':''}">${esc(t.text)}</div>
            ${tag?`<span class="todo-tag-badge" style="background:${tag.color}20;color:${tag.color}">${tag.label}</span>`:''}
          </div>`;
        }).join('')}
      </div>`;
  };
  // 逾期未完成：今天以前所有日期中尚未完成的項目，依日期排序
  const overdueEntries = Object.keys(todos)
    .filter(d=>d<todayStr)
    .sort()
    .flatMap(d=>(todos[d]||[]).filter(t=>!t.done).map(t=>({...t, dateStr:d})));
  const overdueRow = (()=>{
    if(!overdueEntries.length) return '';
    return `<div class="agenda-title" style="color:#c0392b" onclick="selectDate('${overdueEntries[0].dateStr}')"><i class="ti ti-alert-triangle" style="font-size:11px"></i>逾期還未完成<span style="color:#c0392b;font-weight:400">（${overdueEntries.length}）</span></div>
      <div class="agenda-list">
        ${overdueEntries.map(t=>{
          const tag=TMAP[t.tag];
          return `<div class="agenda-item" style="background:#fdeceb">
            <div class="todo-check" style="width:15px;height:15px" onclick="toggleTodoItem('${t.id}','${t.dateStr}')"><i class="ti ti-check" style="font-size:9px"></i></div>
            <div class="todo-text">${esc(t.text)}</div>
            <span style="font-size:9px;color:#c0392b;flex-shrink:0">${t.dateStr.slice(5)}</span>
            ${tag?`<span class="todo-tag-badge" style="background:${tag.color}20;color:${tag.color}">${tag.label}</span>`:''}
          </div>`;
        }).join('')}
      </div>`;
  })();
  return `<div class="agenda-box">
    ${agendaRow(todayStr,'📌 今天要做')}
    ${overdueRow}
    ${agendaRow(tomorrowStr,'➡️ 明天要做')}
  </div>`;
}

function toggleTodoExpand(id){

  renderTodoPage();
}
function todoSubtasksHTML(t){

      <div class="todo-sub-item">

    <div class="todo-sub-add-row">

}
function findTodoItem(id, dateStr){
  dateStr = dateStr || selectedDate;
  return (todos[dateStr]||[]).find(x=>x.id===id);
}
function addSubtask(todoId){
  const inp = document.getElementById('sub-add-'+todoId);
  const text = (inp?.value||'').trim();
  if(!text) return;
  const t = findTodoItem(todoId); if(!t) return;
  if(!t.subtasks) t.subtasks=[];
  t.subtasks.push({id:uid(), text, done:false});
  saveTodos(); renderTodoPage();
}
function toggleSubtask(todoId, subId){
  const t = findTodoItem(todoId); if(!t||!t.subtasks) return;
  const s = t.subtasks.find(x=>x.id===subId); if(!s) return;
  s.done = !s.done;
  saveTodos(); renderTodoPage();
}
function deleteSubtask(todoId, subId){
  const t = findTodoItem(todoId); if(!t||!t.subtasks) return;
  t.subtasks = t.subtasks.filter(x=>x.id!==subId);
  saveTodos(); renderTodoPage();
}

function setTodoFilter(tag){ todoFilterTag=tag; renderTodoPage(); }

function addTodoTag(){
  const labelInp=document.getElementById('new-tag-label');
  const colorInp=document.getElementById('new-tag-color');
  const label=(labelInp?.value||'').trim();
  if(!label){ labelInp?.focus(); return; }
  const color=colorInp?.value||'#7F77DD';
  const key='tag_'+Date.now().toString(36);
  todoTags.push({key,label,color});
  saveTodoTags(); renderTodoPage();
}
function deleteTodoTag(key){
  if(todoTags.length<=1){ toast('至少保留一個標籤'); return; }
  todoTags=todoTags.filter(t=>t.key!==key);
  if(todoFilterTag===key) todoFilterTag='all';

function addTodoItem(){
  const inp=document.getElementById('todo-add-input');
  const tagSel=document.getElementById('todo-tag-select');
  const recurSel=document.getElementById('todo-recur-select');
  const text=inp.value.trim();
  if(!text){ inp.focus(); toast('請先輸入待辦事項內容'); return; }
  const tag = tagSel?tagSel.value:'work';
  const freq = recurSel?recurSel.value:'none';
  if(freq && freq!=='none'){
    createRecurSeries(text, tag, freq, selectedDate);
    toast(`✅ 已建立${freq==='daily'?'每天':freq==='weekly'?'每週':'每月'}重複任務`);
  } else {
    if(!todos[selectedDate]) todos[selectedDate]=[];
    todos[selectedDate].push({id:uid(), text, done:false, tag});
    saveTodos();
  }
  inp.value='';
  renderTodoPage(); renderFixedNav();
  document.getElementById('todo-add-input')?.focus();
}
function toggleTodoItem(id, dateStr){
  dateStr = dateStr || selectedDate;
  const list=todos[dateStr]||[];
  const t=list.find(x=>x.id===id);
  if(t){ t.done=!t.done; saveTodos(); renderTodoPage(); renderFixedNav(); }
}
function deleteTodoItem(id, dateStr){
  dateStr = dateStr || selectedDate;
  const item = (todos[dateStr]||[]).find(x=>x.id===id);
  if(!item) return;
  if(item.recurId){
    const delAll = confirm('這是重複性任務的一部分。\n按「確定」會刪除這筆與之後所有同系列的重複項目；按「取消」則只刪除這一筆。');
    if(delAll){
      deleteRecurFromHere(item.recurId, dateStr);
      renderTodoPage(); renderFixedNav(); renderSidebarExtras();
      toast('已刪除這筆與之後的重複項目');
      return;
    }
  }
  moveToTrash('todo', '待辦', '🗓️', item.text||'(未命名待辦)', {_dateStr:dateStr, _item:item});
  todos[dateStr]=(todos[dateStr]||[]).filter(x=>x.id!==id);
  saveTodos(); renderTodoPage(); renderFixedNav(); renderSidebarExtras();
}

function archiveDoneTodos(){
  const list = todos[selectedDate]||[];
  const doneItems = list.filter(t=>t.done);
  if(!doneItems.length) return;
  doneItems.forEach(t=>{
    todoArchive.unshift({ id:t.id, text:t.text, tag:t.tag, dateStr:selectedDate, archivedAt:Date.now() });
  });
  todos[selectedDate] = list.filter(t=>!t.done);
  saveTodos(); saveTodoArchive();
  showTodoArchive = true;
  renderTodoPage();
  renderFixedNav();
  toast(`✅ 已封存 ${doneItems.length} 項完成的待辦！`);
}

function todoArchiveSectionHTML(){
  if(!todoArchive.length){
    return `<div class="todo-archive-section"><div class="todo-empty" style="padding:14px"><i class="ti ti-archive" style="font-size:20px;display:block;margin-bottom:5px"></i>封存區還是空的</div></div>`;
  }
  const TMAP=getTodoTagMap();
  // 依日期分組
  const byDate = {};
  todoArchive.forEach(a=>{ if(!byDate[a.dateStr]) byDate[a.dateStr]=[]; byDate[a.dateStr].push(a); });
  const dateKeys = Object.keys(byDate).sort((a,b)=>b.localeCompare(a));
  return `<div class="todo-archive-section">
    ${dateKeys.map(d=>{
      const dObj=new Date(d+'T00:00:00');
      const dLabel=dObj.toLocaleDateString('zh-TW',{month:'numeric',day:'numeric',weekday:'short'});
      return `<div class="todo-archive-day">
        <div class="todo-archive-day-label"><i class="ti ti-calendar" style="font-size:11px"></i>${dLabel}</div>
        ${byDate[d].map(a=>{
          const tag=TMAP[a.tag];
          return `<div class="todo-archive-item">

            <span class="archived-text">${esc(a.text)}</span>
            ${tag?`<span class="todo-tag-badge" style="background:${tag.color}15;color:${tag.color};opacity:.7">${tag.label}</span>`:''}

          </div>`;
        }).join('')}
      </div>`;
    }).join('')}
    <button class="btn-ghost" style="width:100%;justify-content:center;display:flex;margin-top:6px;font-size:11px" onclick="clearTodoArchive()">
      <i class="ti ti-trash" style="font-size:12px;margin-right:4px"></i>清空封存區

function restoreArchivedTodo(id){
  const a = todoArchive.find(x=>x.id===id); if(!a) return;
  if(!todos[a.dateStr]) todos[a.dateStr]=[];
  todos[a.dateStr].push({ id:a.id, text:a.text, done:false, tag:a.tag });
  todoArchive = todoArchive.filter(x=>x.id!==id);
  saveTodos(); saveTodoArchive(); renderTodoPage();
  toast('↩️ 已還原到待辦清單！');

// 自動抓取預覽圖
async function autoFetchThumb(){
  const url = document.getElementById('f-url')?.value.trim();
  if(!url){ alert('請先填入連結'); return; }
  const btn = event.target;
  btn.textContent='抓取中…'; btn.disabled=true;
  let imgUrl = '';
  try{
    // 1. 先試 Microlink（抓 OG image，不是截圖，速度快）
    const res = await fetch(`https://api.microlink.io/?url=${encodeURIComponent(url)}&meta=true`);
    const data = await res.json();
    if(data.status==='success' && data.data?.image?.url){
      imgUrl = data.data.image.url;
    }
  }catch(e){}

  if(!imgUrl){
    // 2. fallback：用 Google favicon 作為縮圖
    try{
      const domain = new URL(url).hostname;
      imgUrl = `https://www.google.com/s2/favicons?domain=${domain}&sz=128`;
    }catch(e){}
  }

  btn.textContent='自動抓取'; btn.disabled=false;

  if(imgUrl){
    const inp = document.getElementById('f-thumb');
    const wp  = document.getElementById('thumb-preview-wrap');
    const ip  = document.getElementById('thumb-preview-img');
    if(inp) inp.value = imgUrl;
    if(wp && ip){ ip.src=imgUrl; wp.style.display=''; }
    toast('✅ 縮圖已抓取！');
  } else {
    toast('⚠ 無法抓取預覽圖，請手動貼圖片網址');
  }
}

    cat:document.getElementById('f-cat').value,
    reviewDays,
    tags:document.getElementById('f-tags').value.split(',').map(t=>t.trim()).filter(Boolean),
    addedAt: prev ? (prev.addedAt||Date.now()) : Date.now(),
    updatedAt: Date.now(),
    clicks: prev ? (prev.clicks||0) : 0,
    date: prev ? (prev.date||`${now.getMonth()+1}/${now.getDate()} 新增`) : `${now.getMonth()+1}/${now.getDate()} 新增`,
    notes: prev ? (prev.notes||'') : '',
    lastOpenedAt: prev ? prev.lastOpenedAt : undefined,
    lastReviewedAt: prev ? prev.lastReviewedAt : undefined
  };
  // SRS 排程：設定不變則延續原有進度，否則依新設定重新排期
  if(prev && prev.reviewDays===reviewDays && prev.nextReview!=null){
    card.srsLevel=prev.srsLevel; card.nextReview=prev.nextReview;
  } else if(reviewDays>0){
    let idx=SRS_INTERVALS.findIndex(d=>d>=reviewDays); if(idx===-1) idx=SRS_INTERVALS.length-1;
    card.srsLevel=idx;
    card.nextReview=card.addedAt+reviewDays*86400000;
  } else {
    card.srsLevel=null; card.nextReview=null;
  }
  if(editId){
    const idx=state.cards.findIndex(c=>c.id===editId);
    if(idx>-1) state.cards[idx]=card; else state.cards.unshift(card);
  } else {
    state.cards.unshift(card);
  }
  save(); render(); closeModal();
  toast(editId?'✅ 已更新！':'✅ 已儲存！');
}

// ══════════════════════════════
//  SRS 複習演算法（類 Anki：四級難度 + 動態難度係數 ease factor）
//  result: 'again'（重來）/ 'hard'（有點難）/ 'good'（還可以）/ 'easy'（很簡單）
// ══════════════════════════════
function applySrs(c, result){
  if(typeof c.srsEase!=='number') c.srsEase = 2.5;      // 難度係數，越高代表這張卡對你來說越簡單
  if(typeof c.srsInterval!=='number') c.srsInterval = 0; // 目前的複習間隔（天）
  if(typeof c.srsReps!=='number') c.srsReps = 0;         // 連續答對次數

  c.srsReviewCount = (c.srsReviewCount||0)+1;

  if(result==='again'){
    c.srsLapses = (c.srsLapses||0)+1;
    c.srsReps = 0;
    c.srsEase = Math.max(1.3, +(c.srsEase - 0.2).toFixed(2));
    c.srsInterval = 1;
  } else if(result==='hard'){
    c.srsEase = Math.max(1.3, +(c.srsEase - 0.15).toFixed(2));
    c.srsInterval = c.srsReps===0 ? 1 : Math.max(1, Math.round(c.srsInterval * 1.2));
    c.srsReps += 1;
  } else if(result==='easy'){
    c.srsEase = Math.min(3.5, +(c.srsEase + 0.15).toFixed(2));
    c.srsInterval = c.srsReps===0 ? 4 : Math.max(1, Math.round(c.srsInterval * c.srsEase * 1.3));
    c.srsReps += 1;
  } else { // good
    if(c.srsReps===0) c.srsInterval = 1;
    else if(c.srsReps===1) c.srsInterval = 6;
    else c.srsInterval = Math.max(1, Math.round(c.srsInterval * c.srsEase));
    c.srsReps += 1;
  }
  c.srsLevel = c.srsReps; // 保留舊欄位相容（僅供顯示排序用途，不再是查表索引）
  c.nextReview = Date.now() + c.srsInterval*86400000;
  c.lastReviewedAt = Date.now();
  logReview(result);
}

const SRS_RESULT_LABEL = {again:'還不熟', hard:'有點難', good:'還可以', easy:'很簡單'};

function markReview(id, result){
  const c=state.cards.find(x=>x.id===id); if(!c) return;
  applySrs(c, result);
  save();
  closeModal();
  toast(`${result==='again'?'📖':'✅'} ${SRS_RESULT_LABEL[result]}！${c.srsInterval} 天後再複習`);
}

  state.cards=state.cards.filter(c=>c.id!==id);
  state.selected.delete(id);
  save(); render(); renderSidebarExtras();
}

function gsHighlight(text, q){
  const safe = esc(text==null?'':String(text));
  if(!q) return safe;
  const escQ = q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  try{ return safe.replace(new RegExp('('+escQ+')','ig'), '<mark>$1</mark>'); }
  catch(e){ return safe; }
}

function globalSearchCollect(q){
  q = q.trim().toLowerCase();
  const groups = {
    study:{label:'學習', icon:'ti-book', color:'var(--purple)', items:[]},
    note:{label:'筆記', icon:'ti-notebook', color:'#7F77DD', items:[]},
    ql:{label:'收藏', icon:'ti-link', color:'#1D9E75', items:[]},
    shopping:{label:'購物', icon:'ti-shopping-cart', color:'#D4537E', items:[]},
    food:{label:'美食', icon:'ti-tools-kitchen-2', color:'#E67E22', items:[]},
    travel:{label:'旅遊', icon:'ti-plane', color:'#378ADD', items:[]},
    finance:{label:'財務', icon:'ti-currency-dollar', color:'var(--gold)', items:[]},
  };
  if(!q) return groups;

  state.cards.forEach(c=>{
    const hay = `${c.title||''} ${c.summary||''} ${c.notes||''} ${(c.tags||[]).join(' ')}`.toLowerCase();
    if(hay.includes(q)) groups.study.items.push({id:c.id, title:c.title||'未命名', sub:c.summary||c.cat||''});
  });
  notes.forEach(n=>{
    const hay = `${n.title||''} ${n.content||''} ${(n.tags||[]).join(' ')}`.toLowerCase();
    if(hay.includes(q)) groups.note.items.push({id:n.id, title:n.title||'未命名筆記', sub:(n.content||'').replace(/<[^>]+>/g,'').slice(0,40)});
  });
  quicklinks.forEach(l=>{
    const hay = `${l.label||''} ${l.url||''}`.toLowerCase();
    if(hay.includes(q)) groups.ql.items.push({id:l.id, title:l.label||l.url||'未命名連結', sub:l.url||''});
  });
  (typeof shoppingItems!=='undefined'?shoppingItems:[]).forEach(it=>{
    const hay = `${it.name||''} ${it.store||''} ${it.brand||''} ${it.category||''} ${(it.tags||[]).join(' ')}`.toLowerCase();
    if(hay.includes(q)) groups.shopping.items.push({id:it.id, title:it.name||'未命名商品', sub:[it.store,it.brand].filter(Boolean).join(' · ')});
  });
  ((lcState.food&&lcState.food.items)||[]).forEach(it=>{
    const hay = `${it.name||''} ${it.location||''} ${it.note||''} ${(it.tags||[]).join(' ')}`.toLowerCase();
    if(hay.includes(q)) groups.food.items.push({id:it.id, title:it.name||'未命名', sub:it.location||''});
  });
  ((lcState.travel&&lcState.travel.items)||[]).forEach(it=>{
    const hay = `${it.name||''} ${it.location||''} ${it.note||''} ${(it.tags||[]).join(' ')}`.toLowerCase();
    if(hay.includes(q)) groups.travel.items.push({id:it.id, title:it.name||'未命名', sub:it.location||''});
  });
  (typeof financeTx!=='undefined'?financeTx:[]).forEach(t=>{
    const hay = `${t.note||''} ${t.category||''} ${(t.tags||[]).join(' ')}`.toLowerCase();
    if(hay.includes(q)) groups.finance.items.push({id:t.id, title:t.note||t.category||'一筆交易', sub:`${t.type==='income'?'收入':'支出'} · $${Number(t.amount||0).toLocaleString('zh-TW')} · ${t.date||''}`});
  });

  return groups;
}

function renderGlobalSearchResults(){
  const q = document.getElementById('gsearch-input').value;
  const box = document.getElementById('gsearch-results');
  if(!q.trim()){
    const recentHTML = gsRecentSearches.length ? `
      <div class="gsearch-recent-wrap">
        <div class="gsearch-recent-head"><span>最近搜尋</span><button class="gsearch-recent-clear" onclick="gsClearRecent()">清除紀錄</button></div>
        <div class="gsearch-recent-chips">${gsRecentSearches.map(r=>`<button class="gsearch-recent-chip" onclick="gsUseRecent('${esc(r).replace(/'/g,"&#39;")}')"><i class="ti ti-history" style="font-size:11px"></i>${esc(r)}</button>`).join('')}</div>
      </div>` : '';
    box.innerHTML = `${recentHTML}<div class="gsearch-hint">輸入關鍵字搜尋所有模組<br>學習・筆記・收藏・購物・美食・旅遊・財務</div>
      <div style="text-align:center;padding-bottom:12px"><button class="backup-btn" style="display:inline-flex" onclick="closeGlobalSearch();openTagHubModal();"><i class="ti ti-tag"></i>瀏覽所有標籤</button></div>`;
    return;
  }
  const groups = globalSearchCollect(q);
  const order = ['study','note','ql','shopping','food','travel','finance'];
  const nonEmptyKeys = order.filter(k=>groups[k].items.length);
  const total = nonEmptyKeys.reduce((s,k)=>s+groups[k].items.length, 0);
  if(total===0){
    box.innerHTML = `<div class="gsearch-empty"><i class="ti ti-search-off" style="font-size:22px;display:block;margin-bottom:8px"></i>找不到符合「${esc(q)}」的內容</div>`;
    return;
  }
  if(!nonEmptyKeys.includes(gsActiveFilter)) gsActiveFilter='all';
  const filterTabsHTML = `<div class="gsearch-filter-tabs">

//  讓使用者可以一鍵看到某個標籤底下所有相關內容
// ══════════════════════════════
function collectAllTags(){
  const map = {};
  function add(tagRaw, type){
    const tag = (tagRaw||'').trim(); if(!tag) return;
    const key = tag.toLowerCase();
    if(!map[key]) map[key] = {display:tag, count:0};
    map[key].count++;
  }
  state.cards.forEach(c=>(c.tags||[]).forEach(t=>add(t,'study')));
  notes.forEach(n=>(n.tags||[]).forEach(t=>add(t,'note')));
  (typeof shoppingItems!=='undefined'?shoppingItems:[]).forEach(it=>(it.tags||[]).forEach(t=>add(t,'shopping')));
  ((lcState.food&&lcState.food.items)||[]).forEach(it=>(it.tags||[]).forEach(t=>add(t,'food')));
  ((lcState.travel&&lcState.travel.items)||[]).forEach(it=>(it.tags||[]).forEach(t=>add(t,'travel')));
  (typeof financeTx!=='undefined'?financeTx:[]).forEach(t=>(t.tags||[]).forEach(tg=>add(tg,'finance')));
  Object.keys(todos).forEach(d=>(todos[d]||[]).forEach(t=>{
    const def = todoTags.find(tt=>tt.key===t.tag);
    if(def) add(def.label,'todo');
  }));
  return map;
}

  document.getElementById('modal-inner').innerHTML = `<div id="tag-hub-body"></div>`;

  renderTagHubModal();
}

// ══════════════════════════════
//  卡片內測驗模式
// ══════════════════════════════
let quiz = {queue:[], idx:0, revealed:false, stats:{good:0, again:0, hard:0, easy:0}, remaining:0};

function startQuiz(list, applyDailyCap){
  if(!list || !list.length){ toast('目前沒有可測驗的內容'); return; }
  let queue = [...list];
  let remaining = 0;
  const cap = appSettings.dailyReviewCap;
  if(applyDailyCap && cap && cap>0 && queue.length>cap){
    remaining = queue.length - cap;
    queue = queue.slice(0, cap);
  }
  quiz = {queue, idx:0, revealed:false, stats:{good:0, again:0, hard:0, easy:0}, remaining};
  document.getElementById('quiz-overlay').style.display='flex';
  if(remaining>0) toast(`今天先複習 ${cap} 張，還有 ${remaining} 張排到之後`);
  renderQuizCard();
}

function renderQuizCard(){
  if(quiz.idx>=quiz.queue.length){ renderQuizDone(); return; }
  const c=quiz.queue[quiz.idx];
  const m=TYPE_META[c.type]||TYPE_META.article;
  const cc=catColor(c.cat);
  document.getElementById('quiz-inner').innerHTML=`
    <div class="quiz-top">
      <span class="quiz-progress">${quiz.idx+1} / ${quiz.queue.length}</span>
      <button class="icon-btn" onclick="closeQuiz()"><i class="ti ti-x" style="font-size:16px"></i></button>
    </div>
    <div class="quiz-card-body">
      <div style="display:flex;gap:5px;flex-wrap:wrap;justify-content:center;margin-bottom:6px">
        <span class="tag" style="background:${cc}20;color:${cc}"><i class="ti ${m.icon}" style="font-size:9px;vertical-align:-1px"></i> ${m.label}</span>
        ${c.cat?`<span class="tag" style="background:${cc}20;color:${cc}">${esc(c.cat)}</span>`:''}
      </div>
      <div class="quiz-question">${esc(c.title)}</div>
      ${!quiz.revealed?`
        <div class="quiz-hint">回想一下這個內容的重點，再翻開答案...</div>
        <button class="btn-primary" style="margin:20px auto 0;display:block;padding:9px 22px" onclick="quizReveal()">顯示答案</button>
      `:`
        <div class="quiz-answer">
          ${c.points&&c.points.length?`<ul class="points-view">${c.points.map(p=>`<li>${esc(p)}</li>`).join('')}</ul>`:''}
          ${c.summary?`<div class="quiz-summary">${esc(c.summary)}</div>`:''}
          ${(!c.points||!c.points.length) && !c.summary?'<div style="color:var(--text3);font-size:12px">（這個內容沒有筆記）</div>':''}
        </div>
        <div class="quiz-actions" style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px">
          <button class="btn-ghost" style="display:flex;flex-direction:column;align-items:center;gap:2px;padding:9px 2px;font-size:11px" onclick="quizAnswer('again')"><i class="ti ti-refresh" style="font-size:15px"></i>還不熟</button>
          <button class="btn-ghost" style="display:flex;flex-direction:column;align-items:center;gap:2px;padding:9px 2px;font-size:11px" onclick="quizAnswer('hard')"><i class="ti ti-trending-down" style="font-size:15px"></i>有點難</button>
          <button class="btn-ghost" style="display:flex;flex-direction:column;align-items:center;gap:2px;padding:9px 2px;font-size:11px" onclick="quizAnswer('good')"><i class="ti ti-check" style="font-size:15px"></i>還可以</button>
          <button class="btn-primary" style="display:flex;flex-direction:column;align-items:center;gap:2px;padding:9px 2px;font-size:11px" onclick="quizAnswer('easy')"><i class="ti ti-bolt" style="font-size:15px"></i>很簡單</button>
        </div>
      `}
    </div>`;
}

function renderQuizDone(){
  const {good, again, hard, easy} = quiz.stats;
  const total = good+again+hard+easy;
  const accuracy = total ? Math.round((total-again)/total*100) : 0;
  document.getElementById('quiz-inner').innerHTML=`
    <div class="quiz-top"><span class="quiz-progress">完成</span>
      <button class="icon-btn" onclick="closeQuiz()"><i class="ti ti-x" style="font-size:16px"></i></button></div>
    <div class="quiz-card-body" style="text-align:center">
      <div style="font-size:38px;margin-bottom:10px">🎉</div>
      <div class="quiz-question" style="margin-bottom:4px">測驗完成！</div>
      <div style="font-size:11px;color:var(--text2);margin-bottom:14px">本次正確率 ${accuracy}%</div>
      <div style="display:flex;justify-content:center;gap:18px;margin-bottom:22px;flex-wrap:wrap">
        <div><div style="font-size:20px;font-weight:600;color:#c00">${again}</div><div style="font-size:11px;color:var(--text2)">還不熟</div></div>
        <div><div style="font-size:20px;font-weight:600;color:#d08a1f">${hard}</div><div style="font-size:11px;color:var(--text2)">有點難</div></div>
        <div><div style="font-size:20px;font-weight:600;color:var(--purple)">${good}</div><div style="font-size:11px;color:var(--text2)">還可以</div></div>
        <div><div style="font-size:20px;font-weight:600;color:#2e9e5b">${easy}</div><div style="font-size:11px;color:var(--text2)">很簡單</div></div>
      </div>
      ${quiz.remaining>0?`<div style="font-size:11px;color:var(--text3);margin-bottom:14px">還有 ${quiz.remaining} 張排到之後再複習</div>`:''}
      <button class="btn-primary" style="padding:9px 24px" onclick="closeQuiz()">完成</button>
    </div>`;
}

function quizReveal(){ quiz.revealed=true; renderQuizCard(); }

function quizAnswer(result){
  const c=quiz.queue[quiz.idx];
  applySrs(c, result);
  quiz.stats[result]++;
  save();
  quiz.idx++; quiz.revealed=false;
  renderQuizCard();
}

function newNote(){

function deleteNote(id){
  if(!confirm('確定刪除這篇筆記？（可到回收桶復原）')) return;
  const n = notes.find(x=>x.id===id);
  if(n) moveToTrash('note', '筆記', '📗', n.title||'(未命名筆記)', n);
  notes=notes.filter(n=>n.id!==id);
  if(activeNoteId===id) activeNoteId=notes[0]?.id||null;
  saveNotes(); renderNotesPage(); renderFixedNav(); renderSidebarExtras();
}

function getActiveNote(){ return notes.find(n=>n.id===activeNoteId)||null; }

function flushNoteContent(){
  const n=getActiveNote(); if(!n) return;
  const titleEl=document.getElementById('note-title-inp');
  const editorEl=document.getElementById('note-editor');
  if(titleEl) n.title=titleEl.value||'未命名筆記';
  if(editorEl) n.content=editorEl.innerHTML;
  n.updatedAt=Date.now();
  noteMaybeSnapshot(n);
  saveNotes();
}
function noteMaybeSnapshot(n){
  if(!n) return;
  n.versions = n.versions || [];
  const last = n.versions[n.versions.length-1];
  const now = Date.now();
  if(!last){
    n.versions.push({ts:now, title:n.title, content:n.content});
    return;
  }
  if(last.title===n.title && last.content===n.content) return; // 內容沒變，不用存
  if(now - last.ts < 60000){
    // 一分鐘內的連續編輯視為同一段編輯過程，更新最後一筆快照而不是無限新增
    last.title = n.title; last.content = n.content; last.ts = now;
  } else {
    n.versions.push({ts:now, title:n.title, content:n.content});
    if(n.versions.length>30) n.versions = n.versions.slice(-30);
  }
}

function selectNote(id){
  flushNoteContent(); activeNoteId=id;
  const n=notes.find(x=>x.id===id);
  if(n){ n.viewedAt=Date.now(); n.clicks=(n.clicks||0)+1; saveNotes(); logActivity(); }
  renderNotesPage();
}

function stripHtml(html){ const d=document.createElement('div');d.innerHTML=html;return d.textContent||''; }
function noteHighlight(text, q){
  const safe = esc(text==null?'':String(text));
  if(!q) return safe;
  const escQ = q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  try{ return safe.replace(new RegExp('('+escQ+')','ig'), '<mark>$1</mark>'); }
  catch(e){ return safe; }
}
function noteSnippet(content, q, len){
  const text = stripHtml(content||'');
  len = len||50;
  if(!q) return text.slice(0,len);
  const idx = text.toLowerCase().indexOf(q.toLowerCase());
  if(idx===-1) return text.slice(0,len);
  const start = Math.max(0, idx-18);
  return (start>0?'…':'') + text.slice(start, start+len);
}
function fmtRelTime(ts){
  if(!ts) return '';
  const diff=Date.now()-ts;
  if(diff<60000) return '剛剛';
  if(diff<3600000) return Math.floor(diff/60000)+'分鐘前';
  if(diff<86400000) return Math.floor(diff/3600000)+'小時前';
  return Math.floor(diff/86400000)+'天前';
}
let _flushTimer=null;
function debounceFlush(){ clearTimeout(_flushTimer); _flushTimer=setTimeout(flushNoteContent,600); }

function renderNotesList(){
  const listEl=document.querySelector('.notes-list'); if(!listEl) return;
  let filtered=notes;
  if(noteSearchQ) filtered=filtered.filter(n=>n.title.toLowerCase().includes(noteSearchQ.toLowerCase())||(n.content||'').toLowerCase().includes(noteSearchQ.toLowerCase()));
  if(noteFilterTag!=='all') filtered=filtered.filter(n=>(n.tags||[]).includes(noteFilterTag));
  listEl.innerHTML=filtered.map(n=>{
    const tagDots=(n.tags||[]).map(tag=>{
      const tdef=noteTagLib.find(x=>x.label===tag);
      return `<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${tdef?tdef.color:'var(--purple)'};margin-right:2px;" title="${esc(tag)}"></span>`;
    }).join('');
    return `<div class="note-list-item${n.id===activeNoteId?' active':''}" onclick="selectNote('${n.id}')">
      <div style="display:flex;align-items:flex-start;gap:4px;">

          <div class="note-list-title">${noteHighlight(n.title||'未命名筆記', noteSearchQ)}</div>
          <div class="note-list-preview">${noteHighlight(noteSnippet(n.content, noteSearchQ, 50)||'（尚無內容）', noteSearchQ)}</div>
          <div class="note-list-meta"><span>${fmtRelTime(n.updatedAt)}</span>${tagDots}</div>
        </div>
        <button class="note-del-btn" onclick="event.stopPropagation();deleteNote('${n.id}')" title="刪除">🗑</button>
      </div>
    </div>`;
  }).join('')||`<div style="font-size:12px;color:var(--text3);padding:16px;text-align:center;">${noteFilterTag!=='all'?'這個標籤下沒有筆記':'還沒有筆記'}</div>`;
}

// ── Editor commands ───────────────────────────────
function execCmd(cmd, val){
  document.getElementById('note-editor')?.focus();
  document.execCommand(cmd, false, val||null);
  updateToolbarState(); debounceFlush();
}
function updateToolbarState(){
  try{
    ['bold','italic','underline','strikeThrough','insertUnorderedList','insertOrderedList'].forEach(cmd=>{
      const map={bold:'tb-bold',italic:'tb-italic',underline:'tb-underline',strikeThrough:'tb-strike',insertUnorderedList:'tb-ul',insertOrderedList:'tb-ol'};
      const el=document.getElementById(map[cmd]); if(el) el.classList.toggle('active',document.queryCommandState(cmd));
    });
  }catch(e){}
}
function insertLink(){
  const url=prompt('輸入連結網址：'); if(!url) return;
  const text=prompt('連結顯示文字：')||url;
  execCmd('insertHTML',`<a href="${esc(url)}" target="_blank">${esc(text)}</a>`);
}
function insertImage(){
  const url=prompt('輸入圖片網址：'); if(!url) return;
  execCmd('insertHTML',`<img src="${esc(url)}" style="max-width:100%;border-radius:8px;margin:6px 0;"/>`);
}
function insertHR(){ execCmd('insertHTML','<hr/>'); }
function insertCode(){
  const sel=window.getSelection();
  const text=sel&&sel.toString()?sel.toString():'';
  execCmd('insertHTML',`<code>${esc(text)||'code'}</code>`);
}
function handleEditorKeydown(e){
  // Tab → indent
  if(e.key==='Tab'){ e.preventDefault(); execCmd('insertHTML','&nbsp;&nbsp;&nbsp;&nbsp;'); }
}

          <input id="custom-tag-inp" class="inp" style="flex:1;font-size:12px;" placeholder="標籤名稱…"/>

function toggleNoteTag(noteId, label, el, color){
  const n=notes.find(x=>x.id===noteId); if(!n) return;
  n.tags=n.tags||[];
  if(n.tags.includes(label)){
    n.tags=n.tags.filter(t=>t!==label);
    el.style.background='#fff'; el.style.color=color; el.innerHTML=esc(label);
  } else {
    n.tags.push(label);
    el.style.background=color+'dd'; el.style.color='#fff'; el.innerHTML='✓ '+esc(label);
  }
  n.updatedAt=Date.now(); saveNotes();
}

function addCustomNoteTag(noteId){
  const inp=document.getElementById('custom-tag-inp');
  const label=(inp?.value||'').trim(); if(!label){inp?.focus();return;}
  const n=notes.find(x=>x.id===noteId); if(!n) return;
  n.tags=n.tags||[];
  if(!n.tags.includes(label)) n.tags.push(label);
  n.updatedAt=Date.now(); saveNotes();
  inp.value='';
  toast('✅ 標籤已新增：'+label);
}
function openNoteTagManager(){

      </div>

        <div style="display:flex;gap:6px;align-items:center;">
          <input id="ntm-new-label" class="inp" style="flex:1;font-size:12px;" placeholder="標籤名稱"/>

          <button class="btn-primary" style="font-size:12px;" onclick="addNoteTagToLib()">新增</button>
        </div>

function addNoteTagToLib(){
  const label=(document.getElementById('ntm-new-label')?.value||'').trim();
  if(!label){document.getElementById('ntm-new-label')?.focus();return;}
  if(noteTagLib.find(t=>t.label===label)){toast('標籤已存在');return;}
  const color=document.getElementById('ntm-new-color')?.value||'#7c3aed';
  noteTagLib.push({id:'ntag_'+uid(),label,color});
  saveNotes();
  openNoteTagManager(); // re-render manager

function deleteNoteTag(tid){
  const t=noteTagLib.find(x=>x.id===tid); if(!t) return;
  noteTagLib=noteTagLib.filter(x=>x.id!==tid);
  // remove from all notes
  notes.forEach(n=>{n.tags=(n.tags||[]).filter(tag=>tag!==t.label);});
  saveNotes();
  openNoteTagManager();
}

function removeNoteTag(id,tag){
  const n=notes.find(x=>x.id===id); if(!n) return;
  n.tags=(n.tags||[]).filter(t=>t!==tag);
  n.updatedAt=Date.now(); saveNotes(); renderNotesPage();
}

// ── Card linking ──────────────────────────────────
function openLinkCardPicker(noteId){
  const n=notes.find(x=>x.id===noteId); if(!n) return;
  const linked=n.linkedCards||[];
  const modalEl=document.getElementById('modal-inner');
  modalEl.innerHTML=`
    <div class="modal-header"><h3>引用書籤到筆記</h3>
      <button class="icon-btn" onclick="closeModal()"><i class="ti ti-x" style="font-size:15px"></i></button></div>
    <div class="modal-body">
      <input class="inp" placeholder="搜尋書籤…" oninput="renderCardPickerList('${noteId}',this.value)" id="card-picker-search"/>
      <div id="card-picker-list" style="margin-top:8px;max-height:320px;overflow-y:auto;"></div>
    </div>
    <div class="modal-footer"><div></div><div class="modal-footer-right">
      <button class="btn-ghost" onclick="closeModal()">完成</button>
    </div></div>`;
  document.getElementById('modal').style.display='flex';
  renderCardPickerList(noteId,'');
}

function renderCardPickerList(noteId, q){
  const n=notes.find(x=>x.id===noteId); if(!n) return;
  const linked=n.linkedCards||[];
  const cards=q ? state.cards.filter(c=>c.title.toLowerCase().includes(q.toLowerCase())) : state.cards;
  const el=document.getElementById('card-picker-list'); if(!el) return;
  el.innerHTML=cards.slice(0,40).map(c=>{
    const m=TYPE_META[c.type]||TYPE_META.article;
    const isLinked=linked.includes(c.id);
    return `<div style="display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:7px;cursor:pointer;${isLinked?'background:var(--purple-light);':''}" onclick="toggleCardLink('${noteId}','${c.id}')">
      <span style="font-size:16px;">${cardEmoji(c)}</span>
      <div style="flex:1;min-width:0;">
        <div style="font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(c.title)}</div>
        <div style="font-size:10px;color:var(--text3);">${m.label}${c.cat?' · '+esc(c.cat):''}</div>
      </div>
      <span style="font-size:14px;">${isLinked?'✅':''}</span>
    </div>`;
  }).join('')||'<div style="font-size:12px;color:var(--text3);padding:12px;">沒有符合的書籤</div>';
}

function toggleCardLink(noteId, cardId){
  const n=notes.find(x=>x.id===noteId); if(!n) return;
  n.linkedCards=n.linkedCards||[];
  if(n.linkedCards.includes(cardId)) n.linkedCards=n.linkedCards.filter(id=>id!==cardId);
  else n.linkedCards.push(cardId);
  n.updatedAt=Date.now(); saveNotes();
  renderCardPickerList(noteId, document.getElementById('card-picker-search')?.value||'');
  // also insert citation block into editor
  if(n.linkedCards.includes(cardId)){
    const c=state.cards.find(x=>x.id===cardId); if(!c) return;
    const m=TYPE_META[c.type]||TYPE_META.article;
    const thumbHtml=c.thumbUrl?`<img src="${esc(c.thumbUrl)}" style="width:36px;height:36px;object-fit:cover;border-radius:6px;" onerror="this.style.display='none'"/>`:cardEmoji(c);
    const html=`<div class="note-card-cite" onclick="if(window.openViewModal)openViewModal('${c.id}')">
      <div class="note-card-cite-thumb">${thumbHtml}</div>
      <div class="note-card-cite-body">
        <div class="note-card-cite-label">📎 引用書籤</div>
        <div class="note-card-cite-title">${esc(c.title)}</div>
        <div class="note-card-cite-url">${esc(c.url||'')}</div>
      </div>
    </div>`;
    const editorEl=document.getElementById('note-editor');
    if(editorEl){ editorEl.focus(); document.execCommand('insertHTML',false,html); debounceFlush(); }
  }
  // re-render meta bar
  const metaLinked=document.querySelector('.note-meta-bar');
  if(metaLinked && n){
    // re-render just the note to refresh meta
    const wrap=document.getElementById('notes-editor-wrap');
    if(wrap){ wrap.innerHTML=noteEditorHTML(n);
      const ed=document.getElementById('note-editor');
      if(ed){ed.addEventListener('input',debounceFlush);ed.addEventListener('keydown',handleEditorKeydown);}
    }
  }
}

function unlinkCard(noteId, cardId){
  const n=notes.find(x=>x.id===noteId); if(!n) return;
  n.linkedCards=(n.linkedCards||[]).filter(id=>id!==cardId);
  n.updatedAt=Date.now(); saveNotes(); renderNotesPage();
}

// ── Export note ───────────────────────────────────
function exportNoteAsHTML(id){
  flushNoteContent();
  const n=notes.find(x=>x.id===id); if(!n) return;
  const html=`<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"/><title>${esc(n.title)}</title>
  <style>body{max-width:720px;margin:40px auto;font-family:sans-serif;font-size:14px;line-height:1.8;color:#1f1e1b}
  h1{font-size:24px}h2{font-size:19px}h3{font-size:16px}
  blockquote{border-left:3px solid #7c3aed;padding:4px 12px;background:#f5f3ff;border-radius:0 6px 6px 0}

  code{background:#f0eeff;color:#7c3aed;border-radius:4px;padding:1px 5px;font-family:monospace}
  pre code{background:transparent;color:inherit}hr{border:none;border-top:2px solid #eee;margin:30px 0}
  img{max-width:100%;border-radius:8px}.meta{font-size:12px;color:#888;margin-bottom:20px}

// ── 版本歷史 ──
function openNoteVersionsModal(id){
  flushNoteContent();
  renderNoteVersionsModalBody(id);
  document.getElementById('modal').style.display='flex';
}
function renderNoteVersionsModalBody(id){
  const n = notes.find(x=>x.id===id); if(!n) return;
  const versions = (n.versions||[]).slice().reverse();
  const rows = versions.length ? versions.map((v,revIdx)=>{
    const idx = (n.versions.length-1)-revIdx;
    const isLatest = revIdx===0;
    return `<div class="fin-tx-card">
      <div class="fin-tx-icon" style="background:var(--purple-light);color:var(--purple)"><i class="ti ti-history"></i></div>
      <div class="fin-tx-main" style="cursor:pointer" onclick="previewNoteVersion('${n.id}',${idx})">
        <div class="fin-tx-title-row"><span class="fin-tx-title">${esc(v.title||'未命名筆記')}</span>${isLatest?'<span style="font-size:10px;color:var(--text3)">（最新）</span>':''}</div>
        <div class="fin-tx-meta"><span>${new Date(v.ts).toLocaleString('zh-TW')}</span><span>${fmtRelTime(v.ts)}</span></div>
      </div>
      <div class="fin-tx-actions" style="opacity:1">
        <button class="icon-btn" title="還原這個版本" onclick="event.stopPropagation();restoreNoteVersion('${n.id}',${idx})"><i class="ti ti-rotate"></i></button>
      </div>
    </div>`;
  }).join('') : `<div class="fin-empty" style="padding:20px 0">目前沒有歷史版本<br><span style="font-size:11px">持續編輯這篇筆記，系統會自動保留快照（約每次編輯間隔 1 分鐘存一次）</span></div>`;
  document.getElementById('modal-inner').innerHTML = `
    <div style="padding:20px 22px">
      <h3 style="font-family:var(--font-display);font-size:16px;margin-bottom:4px">🕐 版本歷史</h3>
      <div style="font-size:11.5px;color:var(--text3);margin-bottom:14px">最多保留 30 筆快照，點一筆可以預覽或還原</div>
      <div id="note-version-list">${rows}</div>
      <button class="backup-btn" style="width:100%;justify-content:center;margin-top:14px" onclick="closeModal()">關閉</button>
    </div>`;
}
function previewNoteVersion(id, idx){
  const n = notes.find(x=>x.id===id); if(!n) return;
  const v = (n.versions||[])[idx]; if(!v) return;
  document.getElementById('modal-inner').innerHTML = `
    <div style="padding:20px 22px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
        <button class="icon-btn" onclick="renderNoteVersionsModalBody('${n.id}')" title="返回"><i class="ti ti-arrow-left"></i></button>
        <h3 style="font-family:var(--font-display);font-size:16px;margin:0">${esc(v.title||'未命名筆記')}</h3>
      </div>
      <div style="font-size:11px;color:var(--text3);margin-bottom:12px">${new Date(v.ts).toLocaleString('zh-TW')}</div>
      <div style="max-height:50vh;overflow-y:auto;border:1px solid var(--border);border-radius:10px;padding:14px;font-size:13px;line-height:1.7">${v.content||'（無內容）'}</div>
      <div style="display:flex;gap:8px;margin-top:14px">
        <button class="btn-primary" style="flex:1;justify-content:center" onclick="restoreNoteVersion('${n.id}',${idx})">還原成這個版本</button>
        <button class="backup-btn" style="flex:1;justify-content:center" onclick="renderNoteVersionsModalBody('${n.id}')">返回列表</button>
      </div>
    </div>`;
}
function restoreNoteVersion(id, idx){
  const n = notes.find(x=>x.id===id); if(!n) return;
  const v = (n.versions||[])[idx]; if(!v) return;
  if(!confirm('確定要還原成這個版本嗎？目前的內容會先被存成一筆新版本，之後仍可以復原回來。')) return;
  n.versions = n.versions || [];
  n.versions.push({ts:Date.now(), title:n.title, content:n.content});
  n.title = v.title; n.content = v.content; n.updatedAt = Date.now();
  if(n.versions.length>30) n.versions = n.versions.slice(-30);
  saveNotes();
  closeModal();
  renderNotesPage();
  toast('✅ 已還原版本');
}

let quicklinks = [];   // [{id, url, label, group}]
let qlGroupDefs = [];  // [{name, color}] — 分組的顏色定義，類似 state.cats
let newQlGroupColor = PALETTE[0];

function loadQuicklinks(){
  try{ quicklinks=JSON.parse(localStorage.getItem('lv_quicklinks')||'[]'); }catch(e){quicklinks=[];}
  // 資料遷移：補上卡片化功能需要的欄位（置頂／收藏／點擊次數／最後使用時間）
  quicklinks.forEach(q=>{
    if(q.pinned===undefined) q.pinned=false;
    if(q.favorite===undefined) q.favorite=false;
    if(q.clicks===undefined) q.clicks=0;
    if(q.lastUsed===undefined) q.lastUsed=0;
  });
  try{
    qlGroupDefs=JSON.parse(localStorage.getItem('lv_quicklink_groups')||'[]');
  }catch(e){ qlGroupDefs=[]; }
  // 自動補上目前連結裡用到、但還沒有顏色定義的分組（含「一般」）
  syncQlGroupDefs();
}
function saveQuicklinks(){ localStorage.setItem('lv_quicklinks', JSON.stringify(quicklinks)); }
function saveQlGroupDefs(){ localStorage.setItem('lv_quicklink_groups', JSON.stringify(qlGroupDefs)); }

function syncQlGroupDefs(){
  // 只補上「實際被連結使用到」的分組，不再強制重新生出空的「一般」分組
  // （避免改名/清空後，下次還原成一個多餘的空「一般」分組）
  const used=[...new Set(quicklinks.map(q=>q.group||'一般'))];
  used.forEach(name=>{
    if(!qlGroupDefs.find(g=>g.name===name)){
      qlGroupDefs.push({name, color: name==='一般' ? '#9aa0a6' : PALETTE[qlGroupDefs.length % PALETTE.length]});
    }
  });
  saveQlGroupDefs();
}

const qlGroupObj = name => qlGroupDefs.find(g=>g.name===(name||'一般')) || {name:name||'一般', color:'#9aa0a6', emoji:''};
const qlGroupColor = name => qlGroupObj(name).color;
const qlGroupEmoji = name => qlGroupObj(name).emoji || '';
// 預設分組「一般」在畫面上顯示成「全部連結」比較好懂；名稱本身仍可透過「編輯分組」改掉
const qlGroupDisplayName = name => (!name || name==='一般') ? '全部連結' : name;
// 產生「分組」下拉選單的 <option> 清單，保證目前值（即使是剛建立的新分組）一定會出現在選項中
function qlGroupSelectOptionsHTML(selected){
  syncQlGroupDefs(); // 確保剛新增的分組已經同步進 qlGroupDefs
  const sel = selected || '一般';
  const names = qlGroupDefs.map(g=>g.name);
  if(!names.includes(sel)) names.unshift(sel);
  return names.map(n=>`<option value="${esc(n)}"${n===sel?' selected':''}>${esc(qlGroupDisplayName(n))}</option>`).join('');
}
let newQlGroupEmoji = '';

  state.view='quicklinks'; state.showDue=false; state.activeCat=null;

function qlDomain(url){
  try{ return new URL(url).hostname; }catch(e){ return ''; }
}

function qlCardHTML(q, extraClass){
  const domain=qlDomain(q.url);
  const hostname=domain.replace(/^www\./,'');
  const faviconSrc=domain?`https://www.google.com/s2/favicons?domain=${domain}&sz=64`:'';

  const title=esc(q.label||hostname||q.url);
  return `

     style="--card-accent:${gcolor}" title="${esc(q.url)}"

    <div class="ql-card-icon skeleton">

    <div class="ql-card-domain">${esc(hostname)}</div>

      <button class="${q.favorite?'on fav':''}" onclick="event.preventDefault();event.stopPropagation();qlToggleFav('${q.id}')" title="${q.favorite?'取消收藏':'收藏'}"><i class="ti ti-star${q.favorite?'-filled':''}"></i></button>

    </div>
  </a>`;

function qlSmartList(){
  const now=Date.now();
  return quicklinks.map(q=>{
    const clicks=q.clicks||0;
    const daysSince=q.lastUsed?(now-q.lastUsed)/86400000:Infinity;
    const recencyScore=daysSince<=7?(7-daysSince):0;
    return {q, score:clicks*2+recencyScore};
  }).filter(x=>x.score>0).sort((a,b)=>b.score-a.score).slice(0,8).map(x=>x.q);
}

function qlRegisterClick(id){
  const q=quicklinks.find(x=>x.id===id); if(!q) return;
  q.clicks=(q.clicks||0)+1; q.lastUsed=Date.now(); logActivity();
  saveQuicklinks();
}
function qlTogglePin(id){
  const q=quicklinks.find(x=>x.id===id); if(!q) return;
  q.pinned=!q.pinned; saveQuicklinks(); renderQuicklinksPage();
  toast(q.pinned?'📌 已置頂':'已取消置頂');
}
function qlToggleFav(id){
  const q=quicklinks.find(x=>x.id===id); if(!q) return;
  q.favorite=!q.favorite; saveQuicklinks(); renderQuicklinksPage();
  toast(q.favorite?'⭐ 已加入收藏':'已取消收藏');
}

function renderQuicklinksPage(){
  const el=document.getElementById('quicklinks-page'); if(!el) return;

  // group by group field (default '一般')
  const groups={};
  quicklinks.forEach(q=>{
    const g=q.group||'一般';
    if(!groups[g]) groups[g]=[];
    groups[g].push(q);
  });
  syncQlGroupDefs();
  // 顯示順序跟著 qlGroupDefs 排（讓拖曳排序生效），其餘照字母排在後面
  // 注意：即使分組裡還沒有連結（例如剛用「新增分組」建立的空分組），也要顯示出來
  const orderedNames=[...qlGroupDefs.map(g=>g.name), ...Object.keys(groups).filter(n=>!qlGroupDefs.find(g=>g.name===n))];
  const groupNames=orderedNames;

  // 收藏列（跨分組）
  const favLinks=quicklinks.filter(q=>q.favorite);
  const favHTML=favLinks.length ? `
    <div class="ql-smart-section">
      <div class="ql-smart-title"><i class="ti ti-star-filled" style="color:#e8a91d"></i>收藏</div>
      <div class="ql-smart-row">${favLinks.map(q=>qlCardHTML(q)).join('')}</div>
    </div>` : '';

  // 智能常用列（依最近 7 天使用頻率與最近使用時間自動排序）

    }).join('');

  // collect existing groups for datalist + 顏色點選

  el.innerHTML=`

        <div class="ql-spotlight-results" id="ql-spotlight-results" style="display:none"></div>

      <div class="ql-add-panel${qlAddPanelCollapsed?' collapsed':''}" id="ql-add-panel">

  if(!qlAddPanelCollapsed){ initNewQlGroupColorPicker(); }

let qlSpotlightResults=[];
let qlSpotlightIdx=-1;
function qlSpotlightFilter(val){
  const q=(val||'').trim().toLowerCase();
  const box=document.getElementById('ql-spotlight-results');
  if(!box) return;
  if(!q){ box.style.display='none'; box.innerHTML=''; qlSpotlightResults=[]; qlSpotlightIdx=-1; return; }
  qlSpotlightResults=quicklinks.filter(l=>{
    const hay=(l.label+' '+qlDomain(l.url)+' '+l.url+' '+(l.group||'')).toLowerCase();
    return hay.includes(q);
  }).slice(0,10);
  qlSpotlightIdx=qlSpotlightResults.length?0:-1;
  renderQlSpotlightResults();
}
function renderQlSpotlightResults(){
  const box=document.getElementById('ql-spotlight-results');
  if(!box) return;
  if(!qlSpotlightResults.length){
    box.style.display='block';
    box.innerHTML=`<div class="ql-spotlight-empty">找不到符合的連結</div>`;
    return;
  }
  box.style.display='block';
  box.innerHTML=qlSpotlightResults.map((q,i)=>{
    const domain=qlDomain(q.url); const hostname=domain.replace(/^www\./,'');
    const favicon=domain?`https://www.google.com/s2/favicons?domain=${domain}&sz=32`:'';
    const gc=qlGroupColor(q.group);
    return `<a class="ql-spotlight-item${i===qlSpotlightIdx?' active':''}" href="${esc(q.url)}" target="_blank" rel="noopener"
      onmousedown="qlRegisterClick('${q.id}')" onmouseenter="qlSpotlightIdx=${i};renderQlSpotlightResults()">
      ${favicon?`<img src="${esc(favicon)}" onerror="this.style.display='none'"/>`:'🔗'}
      <span class="ql-spotlight-item-title">${esc(q.label||hostname||q.url)}</span>
      <span class="ql-spotlight-item-domain">${esc(hostname)}</span>
      <span class="ql-spotlight-item-group" style="background:${gc}">${esc(q.group||'一般')}</span>
    </a>`;
  }).join('');
}
function qlSpotlightKeydown(e){
  if(e.key==='Escape'){ e.target.value=''; qlSpotlightFilter(''); e.target.blur(); return; }
  if(!qlSpotlightResults.length) return;
  if(e.key==='ArrowDown'){ e.preventDefault(); qlSpotlightIdx=(qlSpotlightIdx+1)%qlSpotlightResults.length; renderQlSpotlightResults(); }
  else if(e.key==='ArrowUp'){ e.preventDefault(); qlSpotlightIdx=(qlSpotlightIdx-1+qlSpotlightResults.length)%qlSpotlightResults.length; renderQlSpotlightResults(); }
  else if(e.key==='Enter'){
    e.preventDefault();
    const q=qlSpotlightResults[qlSpotlightIdx];
    if(q){ qlRegisterClick(q.id); window.open(q.url,'_blank','noopener'); }
  }
}
