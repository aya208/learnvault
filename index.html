.ql-add-fields{display:flex;flex-direction:column;gap:8px;}
.ql-input-row{display:flex;gap:8px;}
.ql-input-group{display:flex;align-items:center;gap:8px;background:var(--bg);border:1.5px solid #e2dff5;border-radius:9px;padding:0 12px;transition:border-color .15s,box-shadow .15s;}
.ql-input-group:focus-within{border-color:var(--purple);box-shadow:0 0 0 3px #7c6fef18;}
.ql-inp{flex:1;padding:9px 0;font-size:12px;border:none;outline:none;background:transparent;color:var(--text);font-family:inherit;}
.ql-inp::placeholder{color:#b0aac8;}
.ql-add-footer{display:flex;align-items:center;gap:8px;margin-top:4px;}
.ql-color-emoji-row{flex:1;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.ql-add-submit{display:flex;align-items:center;gap:6px;padding:9px 20px;background:var(--purple);color:#fff;border:none;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;transition:background .15s,transform .1s,box-shadow .15s;}
.ql-add-submit:hover{background:var(--purple-dark);box-shadow:0 3px 12px #7c6fef30;transform:translateY(-1px);}
.ql-add-submit:active{transform:translateY(0);}
.ql-bk-pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--purple);background:var(--bg);border:1.5px solid #c7c1f0;border-radius:7px;padding:5px 10px;cursor:grab;text-decoration:none;white-space:nowrap;flex-shrink:0;transition:background .1s;}
.ql-bk-pill:hover{background:var(--purple-light);}
.ql-proto-warn{background:var(--bg)8e6;border:1px solid #f0d080;border-radius:var(--radius);padding:9px 13px;margin-top:4px;font-size:11px;color:#7a5c00;display:flex;align-items:flex-start;gap:8px;line-height:1.5;}
.ql-proto-warn i{flex-shrink:0;font-size:14px;color:#c49000;margin-top:1px;}


/* ── 偏好設定 ── */
.settings-section{margin-bottom:20px}
.settings-section:last-child{margin-bottom:0}
.settings-section-title{font-size:10.5px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.settings-row{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:11px 0;border-bottom:1px solid var(--border)}
.settings-row:last-child{border-bottom:none}
.settings-row-label{font-size:12.5px;color:var(--text);font-weight:600}
.settings-row-desc{font-size:11px;color:var(--text3);margin-top:2px;line-height:1.4}
.accent-swatch-row{display:flex;gap:7px;flex-shrink:0}
.accent-swatch{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;display:flex;align-items:center;justify-content:center;transition:transform .12s;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.accent-swatch:hover{transform:scale(1.12)}
.accent-swatch.selected{border-color:var(--ink)}
.accent-swatch.selected i{color:#fff;font-size:11px}
.toggle-switch{width:38px;height:22px;border-radius:999px;background:#ddd;position:relative;cursor:pointer;flex-shrink:0;transition:background .15s}
.toggle-switch.on{background:var(--purple)}
.toggle-switch .knob{position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:var(--bg);transition:left .15s;box-shadow:0 1px 3px rgba(0,0,0,.25)}
.toggle-switch.on .knob{left:18px}
.settings-num-input{width:64px;padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:12px;font-family:inherit;text-align:center;flex-shrink:0}
.settings-num-input:focus{outline:none;border-color:var(--purple)}
.settings-danger-btn{padding:7px 13px;border:1px solid #f0a0a0;border-radius:var(--radius);font-size:12px;background:var(--bg)5f5;cursor:pointer;color:#c00;font-family:inherit;font-weight:600;flex-shrink:0}
.settings-danger-btn:hover{background:#ffe0e0}
.fontsize-row{display:flex;gap:4px;border:1px solid var(--border);border-radius:8px;padding:2px;flex-shrink:0}
.fontsize-btn{padding:5px 10px;border:none;border-radius:6px;background:transparent;font-size:11.5px;font-family:inherit;cursor:pointer;color:var(--text2)}
.fontsize-btn:hover{background:var(--bg2)}
.fontsize-btn.active{background:var(--purple);color:#fff;font-weight:600}

/* ══════════════════════════════
   財務收支模組 (Finance)
   ══════════════════════════════ */
.fin-page{max-width:1080px;padding-bottom:40px;}
.fin-topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px;flex-wrap:wrap;}
.fin-viewswitch{display:flex;gap:3px;background:var(--bg2);border:1px solid var(--border);border-radius:11px;padding:3px;}
.fin-view-btn{display:flex;align-items:center;gap:5px;padding:7px 13px;border:none;border-radius:8px;background:transparent;color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .13s,color .13s;}
.fin-view-btn:hover{background:var(--bg);color:var(--text);}
.fin-view-btn.active{background:var(--purple);color:#fff;box-shadow:var(--shadow-sm);}
.fin-quickadd-btn{display:flex;align-items:center;gap:6px;padding:9px 18px;background:linear-gradient(135deg,var(--purple) 0%,#7A70F0 100%);color:#fff;border:none;border-radius:11px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 4px 14px rgba(91,79,224,.32);transition:transform .12s,box-shadow .12s;}
.fin-quickadd-btn:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(91,79,224,.4);}

/* 摘要卡片 */
.fin-summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px;}
.fin-sum-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 17px;cursor:pointer;transition:transform .14s,box-shadow .14s;position:relative;overflow:hidden;}
.fin-sum-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);}
.fin-sum-card-head{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.fin-sum-icon{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.fin-sum-label{font-size:11.5px;color:var(--text2);font-weight:600;}
.fin-sum-amount{font-size:21px;font-weight:800;color:var(--text);letter-spacing:-.01em;margin-bottom:6px;font-family:var(--font-display);}
.fin-sum-foot{display:flex;align-items:center;justify-content:space-between;gap:6px;}
.fin-sum-delta{font-size:11px;font-weight:700;display:flex;align-items:center;gap:2px;}
.fin-sum-delta.up{color:#1D9E75;}
.fin-sum-delta.down{color:#E24B4A;}
.fin-sum-delta.flat{color:var(--text3);}
.fin-sum-spark{flex-shrink:0;}

/* 通用區塊 */
.fin-section{margin-bottom:24px;}
.fin-section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.fin-section-title{font-size:13.5px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:6px;}
.fin-section-link{font-size:11.5px;color:var(--purple);cursor:pointer;font-weight:600;}
.fin-section-link:hover{text-decoration:underline;}

/* 交易卡片 */
.fin-tx-list{display:flex;flex-direction:column;gap:8px;}
.fin-tx-card{display:flex;align-items:center;gap:12px;background:var(--bg);border:1px solid var(--border);border-radius:13px;padding:11px 14px;transition:box-shadow .13s,transform .1s;position:relative;}
.fin-tx-card:hover{box-shadow:var(--shadow-sm);}
.fin-tx-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.fin-tx-main{flex:1;min-width:0;}
.fin-tx-title-row{display:flex;align-items:center;gap:6px;}
.fin-tx-title{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fin-tx-pin{color:var(--gold);font-size:11px;flex-shrink:0;}
.fin-tx-fav{color:#e8a91d;font-size:11px;flex-shrink:0;}
.fin-tx-meta{font-size:11px;color:var(--text3);margin-top:2px;display:flex;gap:6px;align-items:center;}
.fin-tx-cat-chip{padding:1.5px 7px;border-radius:999px;font-size:10px;font-weight:600;}
.fin-tx-amount{font-size:14.5px;font-weight:800;flex-shrink:0;font-family:var(--font-display);}
.fin-tx-amount.income{color:#1D9E75;}
.fin-tx-amount.expense{color:#E24B4A;}
.fin-tx-actions{display:flex;gap:2px;flex-shrink:0;opacity:0;transition:opacity .12s;}
.fin-tx-card:hover .fin-tx-actions{opacity:1;}
.fin-tx-actions .icon-btn{font-size:12px;padding:5px;}
.fin-empty{text-align:center;padding:50px 20px;color:var(--text3);font-size:13px;line-height:1.8;}

/* 分析區 */
.fin-analysis-grid{display:grid;grid-template-columns:1.1fr .9fr;gap:16px;}
.fin-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px;}
.fin-card-title{font-size:12.5px;font-weight:700;color:var(--text2);margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.fin-cat-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:9px;font-size:11.5px;}
.fin-cat-bar-label{width:56px;flex-shrink:0;color:var(--text2);display:flex;align-items:center;gap:4px;}
.fin-cat-bar-track{flex:1;height:8px;background:var(--bg2);border-radius:5px;overflow:hidden;}
.fin-cat-bar-fill{height:100%;border-radius:5px;transition:width .3s;}
.fin-cat-bar-pct{width:60px;text-align:right;flex-shrink:0;color:var(--text3);font-weight:600;}
.fin-insight-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px;}
.fin-insight-chip{background:var(--bg2);border-radius:11px;padding:10px 12px;}
.fin-insight-chip-label{font-size:10.5px;color:var(--text3);margin-bottom:3px;}
.fin-insight-chip-val{font-size:14px;font-weight:800;color:var(--text);}
.fin-trend-chart{display:flex;align-items:flex-end;gap:10px;height:140px;padding-top:10px;}
.fin-trend-col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;gap:3px;}
.fin-trend-bars{display:flex;gap:3px;align-items:flex-end;height:100px;width:100%;justify-content:center;}
.fin-trend-bar{width:11px;border-radius:3px 3px 0 0;min-height:2px;transition:height .3s;}
.fin-trend-month{font-size:10px;color:var(--text3);margin-top:4px;}
.fin-trend-legend{display:flex;gap:14px;font-size:10.5px;color:var(--text2);margin-top:10px;justify-content:center;}
.fin-trend-legend span{display:flex;align-items:center;gap:4px;}
.fin-trend-dot{width:8px;height:8px;border-radius:2px;display:inline-block;}

/* 財務工具區 */
.fin-tools-panel{background:linear-gradient(135deg,#fafbff 0%,#f4f3ff 100%);border:1.5px solid #ddd9f8;border-radius:var(--radius-lg);overflow:hidden;}
body.dark-mode .fin-tools-panel{background:linear-gradient(135deg,var(--bg) 0%,var(--bg2) 100%);border-color:var(--border)}
.fin-tools-header{display:flex;align-items:center;gap:8px;padding:16px 18px;cursor:pointer;user-select:none;}
.fin-tools-header-title{font-size:14px;font-weight:700;color:var(--text);flex:1;}
.fin-tools-header i.chev{transition:transform .18s;color:var(--text2);}
.fin-tools-body{padding:0 18px 18px;}
.fin-tools-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.fin-tool-tab{display:flex;align-items:center;gap:5px;padding:7px 12px;border-radius:9px;background:var(--bg);border:1px solid var(--border);font-size:11.5px;font-weight:600;color:var(--text2);cursor:pointer;font-family:inherit;}
.fin-tool-tab:hover{border-color:var(--purple);}
.fin-tool-tab.active{background:var(--purple);color:#fff;border-color:var(--purple);}
.fin-tool-body{background:var(--bg);border-radius:13px;padding:16px 18px;border:1px solid var(--border);}
.fin-tool-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px;}
.fin-tool-field{flex:1;min-width:140px;}
.fin-tool-field label{display:block;font-size:11px;color:var(--text2);font-weight:600;margin-bottom:4px;}
.fin-tool-result{margin-top:14px;background:var(--bg2);border-radius:11px;padding:14px 16px;display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;}
.fin-tool-result-item{}
.fin-tool-result-label{font-size:10.5px;color:var(--text3);margin-bottom:3px;}
.fin-tool-result-val{font-size:15.5px;font-weight:800;color:var(--purple-dark);font-family:var(--font-display);}
.fin-tool-note{font-size:10.5px;color:var(--text3);margin-top:10px;line-height:1.6;}

/* 儀表板區塊拖曳排序 */
.fin-dash-block{position:relative;}
.fin-dash-block.dragging{opacity:.4;}
.fin-dash-block.drag-over{outline:2px dashed var(--purple);outline-offset:6px;border-radius:16px;}
.fin-dash-grip{position:absolute;top:0;right:0;width:26px;height:26px;display:flex;align-items:center;justify-content:center;color:var(--text3);cursor:grab;background:var(--bg);border:1px solid var(--border);border-radius:8px;opacity:0;transition:opacity .15s,color .15s,border-color .15s;z-index:6;font-size:13px;}
.fin-dash-block:hover .fin-dash-grip{opacity:1;}
.fin-dash-grip:hover{color:var(--purple);border-color:var(--purple);}
.fin-dash-grip:active{cursor:grabbing;}

/* 一般計算機 */
.fin-calc{max-width:280px;margin:0 auto;}
.fin-calc-display{background:var(--ink);color:#fff;border-radius:12px;padding:16px;text-align:right;font-size:26px;font-weight:700;font-family:var(--font-display);margin-bottom:10px;min-height:38px;word-break:break-all;}
.fin-calc-expr{font-size:11px;color:var(--side-text-dim,#9a94ad);min-height:14px;}
.fin-calc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;}
.fin-calc-btn{padding:13px 0;border:none;border-radius:9px;background:var(--bg2);color:var(--text);font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .1s;}
.fin-calc-btn:hover{background:#EAE8F5;}
.fin-calc-btn.op{background:var(--purple-light);color:var(--purple-dark);}
.fin-calc-btn.eq{background:var(--purple);color:#fff;grid-row:span 1;}
.fin-calc-btn.clr{background:#FDECEC;color:#E24B4A;}
.fin-calc-history{margin-top:12px;max-height:90px;overflow-y:auto;font-size:11px;color:var(--text3);}
.fin-calc-history-item{padding:3px 0;border-bottom:1px dashed var(--border);cursor:pointer;}
.fin-calc-history-item:hover{color:var(--purple);}

/* 月曆模式 */
.fin-cal-head{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:14px;}
.fin-cal-head-title{font-size:15px;font-weight:700;font-family:var(--font-display);min-width:110px;text-align:center;}
.fin-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
.fin-cal-dow{text-align:center;font-size:10.5px;color:var(--text3);font-weight:700;padding-bottom:4px;}
.fin-cal-cell{aspect-ratio:1/0.85;border-radius:10px;border:1px solid var(--border);padding:6px 7px;cursor:pointer;background:var(--bg);transition:box-shadow .12s,border-color .12s;display:flex;flex-direction:column;gap:2px;}
.fin-cal-cell:hover{box-shadow:var(--shadow-sm);}
.fin-cal-cell.empty{visibility:hidden;}
.fin-cal-cell.selected{border-color:var(--purple);box-shadow:0 0 0 2px var(--purple-light);}
.fin-cal-cell.today{border-color:var(--gold);}
.fin-cal-daynum{font-size:11px;color:var(--text2);font-weight:600;}
.fin-cal-net{font-size:10.5px;font-weight:700;}
.fin-cal-net.pos{color:#1D9E75;}
.fin-cal-net.neg{color:#E24B4A;}
.fin-cal-daylist{margin-top:16px;}

/* 清單模式 */
.fin-list-filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center;}
.fin-list-filters select,.fin-list-filters input{padding:7px 10px;border:1px solid var(--border);border-radius:9px;font-size:12px;font-family:inherit;background:var(--bg);color:var(--text);}
.fin-list-filters input[type=text]{flex:1;min-width:140px;}

@media (max-width:980px){
  .fin-summary-grid{grid-template-columns:repeat(2,1fr);}
  .fin-analysis-grid{grid-template-columns:1fr;}
}
@media (max-width:640px){
  .fin-summary-grid{grid-template-columns:1fr;}
}

/* ══════════ 購物清單 Shopping Dashboard ══════════ */
.shop-page{max-width:1220px;padding-bottom:40px;}
.shop-header{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px;flex-wrap:wrap;}
.shop-header-title{font-size:16px;font-weight:700;font-family:var(--font-display);color:var(--ink);}

.shop-summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px;}
.shop-sum-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 17px;cursor:pointer;transition:transform .14s,box-shadow .14s;position:relative;overflow:hidden;}
.shop-sum-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);}
.shop-sum-card.active{box-shadow:0 0 0 2px var(--purple);}
.shop-sum-icon{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;margin-bottom:10px;}
.shop-sum-label{font-size:11.5px;color:var(--text2);font-weight:600;margin-bottom:4px;}
.shop-sum-amount{font-size:21px;font-weight:800;color:var(--text);letter-spacing:-.01em;font-family:var(--font-display);}
.shop-sum-foot{font-size:10.5px;color:var(--text3);margin-top:6px;}

.shop-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;align-items:center;}
.shop-tab{display:flex;align-items:center;gap:4px;padding:7px 13px;border-radius:999px;background:var(--bg);border:1px solid var(--border);font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;white-space:nowrap;user-select:none;transition:background .12s,color .12s;}
.shop-tab:hover{border-color:var(--purple);}
.shop-tab.active{background:var(--purple);color:#fff;border-color:var(--purple);}
.shop-tab i.ti-x{font-size:11px;opacity:.55;margin-left:2px;}
.shop-tab i.ti-x:hover{opacity:1;}
.shop-tab-addbtn{width:27px;height:27px;border-radius:50%;border:1.5px dashed var(--text3);background:transparent;color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.shop-tab-addbtn:hover{color:var(--purple);border-color:var(--purple);}

.shop-toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:18px;}
.shop-search-wrap{position:relative;flex:1;min-width:170px;}
.shop-search-wrap input{width:100%;padding:8px 12px 8px 32px;border:1px solid var(--border);border-radius:999px;font-size:12px;font-family:inherit;background:var(--bg2);color:var(--text);}
.shop-search-wrap input:focus{outline:none;border-color:var(--purple);background:var(--bg);}
.shop-search-wrap i{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px;}
.shop-filter-chip{display:flex;align-items:center;gap:5px;padding:7px 12px;border-radius:999px;border:1px solid var(--border);background:var(--bg);font-size:11.5px;font-weight:600;color:var(--text2);cursor:pointer;white-space:nowrap;user-select:none;}
.shop-filter-chip.active{background:var(--purple);border-color:var(--purple);color:#fff;}
.shop-price-range{display:flex;align-items:center;gap:4px;}
.shop-price-range input{width:74px;padding:7px 9px;border:1px solid var(--border);border-radius:9px;font-size:11.5px;font-family:inherit;background:var(--bg);color:var(--text);}
.shop-viewswitch{display:flex;gap:3px;background:var(--bg2);border:1px solid var(--border);border-radius:11px;padding:3px;}
.shop-view-btn{display:flex;align-items:center;gap:5px;padding:7px 11px;border:none;border-radius:8px;background:transparent;color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;}
.shop-view-btn:hover{background:var(--bg);}
.shop-view-btn.active{background:var(--purple);color:#fff;box-shadow:var(--shadow-sm);}

.shop-section{margin-bottom:26px;}
.shop-section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.shop-section-title{font-size:13.5px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:6px;}
.shop-section-link{font-size:11.5px;color:var(--purple);font-weight:600;cursor:pointer;}
.shop-section-link:hover{text-decoration:underline;}

.shop-card-store{font-size:10.5px;color:var(--text3);display:flex;align-items:center;gap:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

.shop-card-price{font-size:15px;font-weight:800;font-family:var(--font-display);color:var(--purple-dark);}

.shop-menu{position:absolute;top:38px;right:8px;background:var(--bg);border:1px solid var(--border);border-radius:11px;box-shadow:var(--shadow-lg);z-index:30;overflow:hidden;min-width:148px;}

.shop-list{display:flex;flex-direction:column;gap:8px;}

.shop-list-thumb{width:40px;height:40px;border-radius:9px;object-fit:cover;background:var(--bg2);flex-shrink:0;}
.shop-list-name{font-size:12.5px;font-weight:600;flex:2;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

@media (max-width:980px){

}
@media (max-width:640px){
  .shop-summary-grid{grid-template-columns:1fr;}
  .shop-kanban{grid-template-columns:1fr;}
  .shop-list-store,.shop-list-cat,.shop-list-date{display:none;}
}

/* ══════════════════════════════════════════════
   美食紀錄 / 旅遊景點（共用 Life-Content 卡片系統，lc- 前綴）
   ══════════════════════════════════════════════ */
.lc-page{max-width:1220px;padding-bottom:40px;}
.lc-header{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px;flex-wrap:wrap;}
.lc-header-title{font-family:var(--font-display);font-size:19px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px;}
.lc-summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px;}
.lc-sum-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 17px;cursor:pointer;transition:transform .14s,box-shadow .14s;position:relative;overflow:hidden;}
.lc-sum-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);}

.lc-sum-amount{font-size:20px;font-weight:800;font-family:var(--font-display);color:var(--text);}
.lc-sum-foot{font-size:10px;color:var(--text3);margin-top:3px;}

.lc-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;align-items:center;}
.lc-tab{display:flex;align-items:center;gap:4px;padding:7px 13px;border-radius:999px;background:var(--bg);border:1px solid var(--border);font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;white-space:nowrap;user-select:none;transition:background .12s,color .12s;}

.lc-tab i.ti-x{margin-left:2px;opacity:.6;}
.lc-tab i.ti-x:hover{opacity:1;}
.lc-tab-addbtn{width:28px;height:28px;border-radius:50%;border:1px dashed var(--border);background:var(--bg);color:var(--text3);display:flex;align-items:center;justify-content:center;cursor:pointer;}

.lc-toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:18px;}
.lc-search-wrap{position:relative;flex:1;min-width:180px;}
.lc-search-wrap i{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px;}
.lc-search-wrap input{width:100%;padding:8px 12px 8px 32px;border-radius:10px;border:1px solid var(--border);font-size:12.5px;font-family:inherit;background:var(--bg);}
.lc-filter-chip{display:flex;align-items:center;gap:5px;padding:7px 12px;border-radius:10px;border:1px solid var(--border);background:var(--bg);font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;}
.lc-filter-chip.active{background:var(--lc-accent,var(--purple));border-color:var(--lc-accent,var(--purple));color:#fff;}
.lc-viewswitch{display:flex;gap:3px;background:var(--bg2);border:1px solid var(--border);border-radius:11px;padding:3px;}
.lc-view-btn{width:30px;height:28px;border:none;background:transparent;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--text3);cursor:pointer;font-size:13px;}
.lc-view-btn.active{background:var(--bg);color:var(--lc-accent,var(--purple));box-shadow:var(--shadow-sm);}

.lc-section{margin-bottom:26px;}
.lc-section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.lc-section-title{font-size:13px;font-weight:700;color:var(--text);}
.lc-section-link{font-size:11px;color:var(--purple);cursor:pointer;font-weight:600;}
.lc-row-scroll{display:flex;gap:14px;overflow-x:auto;padding-bottom:8px;scroll-snap-type:x proximity;}
.lc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(216px,1fr));gap:16px;}

.lc-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;transition:transform .15s,box-shadow .15s;position:relative;display:flex;flex-direction:column;flex-shrink:0;scroll-snap-align:start;}
.lc-row-scroll .lc-card{width:216px;}
.lc-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-md);}
.lc-card-imgwrap{position:relative;width:100%;aspect-ratio:4/3;background:var(--bg2);overflow:hidden;cursor:pointer;}
.lc-card-imgwrap img{width:100%;height:100%;object-fit:cover;}
.lc-card-noimg{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:30px;color:var(--text3);background:linear-gradient(135deg,var(--bg2),#fff);}
.lc-card-badges{position:absolute;top:8px;left:8px;display:flex;flex-direction:column;gap:4px;}
.lc-card-badge{padding:2px 7px;border-radius:999px;font-size:9px;font-weight:700;color:#fff;background:var(--lc-accent,var(--purple));display:flex;align-items:center;gap:3px;box-shadow:var(--shadow-sm);}
.lc-card-top-actions{position:absolute;top:8px;right:8px;display:flex;flex-direction:column;gap:5px;opacity:0;transition:opacity .12s;}
.lc-card:hover .lc-card-top-actions{opacity:1;}
.lc-card-icon-btn{width:25px;height:25px;border-radius:50%;background:rgba(255,255,255,.94);border:none;display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:12px;cursor:pointer;box-shadow:var(--shadow-sm);}
.lc-card-icon-btn:hover{color:var(--lc-accent,var(--purple));}
.lc-card-icon-btn.fav.active{color:#E24B4A;}
.lc-card-icon-btn.pin.active{color:var(--gold);}
.lc-card-body{padding:11px 12px 13px;display:flex;flex-direction:column;gap:4px;flex:1;}
.lc-card-name{font-size:13px;font-weight:700;color:var(--text);line-height:1.35;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;cursor:pointer;}
.lc-card-loc{font-size:10.5px;color:var(--text3);display:flex;align-items:center;gap:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lc-card-meta-row{display:flex;align-items:center;justify-content:space-between;margin-top:4px;gap:6px;flex-wrap:wrap;}
.lc-cat-chip{font-size:10px;font-weight:700;padding:2px 8px;border-radius:999px;}
.lc-card-price{font-size:11px;color:var(--text2);font-weight:600;}
.lc-card-note{font-size:10.5px;color:var(--text2);margin-top:2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.lc-card-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:2px;}
.lc-tag-chip{font-size:9px;color:var(--purple);background:var(--purple-light);padding:1px 6px;border-radius:999px;}
.lc-card-status{font-size:9px;font-weight:700;padding:2px 7px;border-radius:999px;margin-top:4px;display:inline-flex;align-self:flex-start;}
.lc-card-date{font-size:9.5px;color:var(--text3);flex-shrink:0;}

.lc-empty{text-align:center;padding:60px 20px;color:var(--text3);font-size:13px;line-height:1.8;}

.lc-menu{position:absolute;top:38px;right:8px;background:var(--bg);border:1px solid var(--border);border-radius:10px;box-shadow:var(--shadow-lg);padding:5px;z-index:5;display:flex;flex-direction:column;min-width:150px;}
.lc-menu button{display:flex;align-items:center;gap:7px;padding:7px 9px;border:none;background:transparent;border-radius:7px;font-size:12px;color:var(--text2);cursor:pointer;text-align:left;font-family:inherit;}
.lc-menu button:hover{background:var(--bg2);}
.lc-menu button.danger{color:#E24B4A;}

.lc-list{display:flex;flex-direction:column;gap:8px;}
.lc-list-row{display:flex;align-items:center;gap:12px;background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:9px 12px;cursor:pointer;transition:box-shadow .12s;}
.lc-list-row:hover{box-shadow:var(--shadow-sm);}
.lc-list-thumb{width:52px;height:52px;border-radius:10px;object-fit:cover;background:var(--bg2);flex-shrink:0;}
.lc-list-noimg{width:52px;height:52px;border-radius:10px;background:var(--bg2);display:flex;align-items:center;justify-content:center;color:var(--text3);flex-shrink:0;}
.lc-list-main{flex:1;min-width:0;}
.lc-list-name{font-size:12.5px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lc-list-meta{font-size:10.5px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lc-list-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}

.lc-map{display:flex;flex-direction:column;gap:18px;}
.lc-map-group{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px;}
.lc-map-group-head{display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:13px;font-weight:700;color:var(--text);}
.lc-map-group-head i{color:var(--lc-accent,var(--purple));}
.lc-map-pins{display:flex;flex-wrap:wrap;gap:10px;}

.lc-map-pin:hover{transform:translateY(-2px);background:var(--bg);box-shadow:var(--shadow-sm);}
.lc-map-pin img{width:26px;height:26px;border-radius:50%;object-fit:cover;}
.lc-map-pin-noimg{width:26px;height:26px;border-radius:50%;background:var(--lc-accent,var(--purple));color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;}
.lc-map-pin-name{font-size:11.5px;font-weight:600;color:var(--text);}

.lc-modal-imgpreview{width:100%;aspect-ratio:16/9;border-radius:10px;overflow:hidden;margin-bottom:12px;background:var(--bg2);display:flex;align-items:center;justify-content:center;}
.lc-modal-mappreview{width:100%;aspect-ratio:16/9;border-radius:10px;overflow:hidden;background:var(--bg2);border:1px solid var(--border);margin-top:6px;display:flex;align-items:center;justify-content:center;}
.lc-map-embed{width:100%;aspect-ratio:16/9;border-radius:12px;overflow:hidden;margin-bottom:12px;border:1px solid var(--border);background:var(--bg2);}
.lc-modal-imgpreview img{width:100%;height:100%;object-fit:cover;}

@media (max-width:980px){ .lc-summary-grid{grid-template-columns:repeat(2,1fr);} }
@media (max-width:640px){ .lc-summary-grid{grid-template-columns:1fr;} .lc-list-meta{display:none;} }

/* ── 手機版（直式）版面 ── */
.mobile-menu-btn{display:none;background:transparent;border:none;color:var(--text2);font-size:19px;padding:4px 6px;cursor:pointer;border-radius:8px;flex-shrink:0}
.mobile-menu-btn:hover{background:var(--bg2)}
.sidebar-overlay{display:none}
/* 快速切換列：桌機也顯示，貼齊側邊欄右側；手機版會在 media query 裡改成貼齊左邊界 */
.mobile-tabbar{
  display:flex;position:fixed;left:236px;right:0;bottom:0;z-index:400;
  background:var(--bg);border-top:1px solid var(--border);
  box-shadow:0 -4px 16px rgba(23,19,33,.06);
}
.mtab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border:none;background:transparent;color:var(--text3);font-family:inherit;font-size:9.5px;padding:6px 2px 4px;cursor:pointer}
.mtab-btn i{font-size:18px}
.mtab-btn.active{color:var(--purple)}
.content{padding-bottom:56px}
@media (max-width:860px){
  body{height:100dvh}
  #app{height:100dvh}
  .mobile-menu-btn{display:flex;align-items:center;justify-content:center}
  .sidebar{
    position:fixed;top:0;left:0;bottom:0;z-index:600;
    transform:translateX(-100%);transition:transform .22s ease;
    box-shadow:12px 0 32px rgba(0,0,0,.28);
  }
  .sidebar.mobile-open{transform:translateX(0)}
  .sidebar-overlay{
    display:none;position:fixed;inset:0;background:rgba(15,12,25,.45);z-index:550;
  }
  .sidebar-overlay.show{display:block}
  .main{width:100%;min-width:0}
  .topbar{padding:12px 14px;flex-wrap:wrap}
  .search-input{width:120px}
  .search-input:focus{width:150px}
  .content{padding-bottom:calc(56px + env(safe-area-inset-bottom,0px) + 24px)}
  #home-page,#stats-page,#todo-page,#notes-page,#quicklinks-page,#finance-page,#shopping-page,#food-page,#travel-page,#entertainment-page{padding-bottom:24px}
  .mobile-tabbar{
    left:0;
    padding-bottom:env(safe-area-inset-bottom,0px);
  }
}

.ent-cat-name{font-size:14.5px;font-weight:700;color:var(--text);flex:1;min-width:0;padding:4px 7px;border-radius:6px;transition:background .1s;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ent-cat-name:hover{background:var(--bg2);}
.ent-cat-name-inp{font-size:14.5px;font-weight:700;padding:4px 7px;border:1px solid var(--purple);border-radius:6px;background:var(--bg);color:var(--text);font-family:inherit;width:170px;}
.ent-cat-desc{font-size:11px;color:var(--text3);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ent-cat-count{font-size:11px;color:var(--text3);margin-right:2px;flex-shrink:0;background:var(--bg2);padding:2px 9px;border-radius:999px;}
.ent-cat-actions{display:flex;gap:3px;opacity:0;transition:opacity .12s;flex-shrink:0;}
.ent-cat-row:hover .ent-cat-actions{opacity:1;}
.ent-cat-actions i{width:27px;height:27px;display:flex;align-items:center;justify-content:center;border-radius:7px;color:var(--text3);cursor:pointer;font-size:13px;transition:background .1s,color .1s;}
.ent-cat-actions i:hover{background:var(--bg2);color:var(--text);}
.ent-cat-actions i.ent-danger:hover{background:#FDECEC;color:#E24B4A;}
.ent-empty{text-align:center;padding:60px 20px;color:var(--text3);font-size:13px;line-height:1.8;}
.ent-empty .ti{font-size:30px;display:block;margin-bottom:8px;color:var(--text3);}

.ent-item-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.ent-item-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;}
.ent-item-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;cursor:pointer;transition:box-shadow .14s,transform .14s;position:relative;display:flex;flex-direction:column;}
.ent-item-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);}
.ent-item-cover{width:100%;aspect-ratio:3/4;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:32px;color:var(--text3);overflow:hidden;}
.ent-item-cover img{width:100%;height:100%;object-fit:cover;}
.ent-item-body{padding:9px 11px 11px;display:flex;flex-direction:column;gap:5px;flex:1;}
.ent-item-title{font-size:12.5px;font-weight:700;color:var(--text);line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:2.6em;}
.ent-item-status{align-self:flex-start;font-size:10px;font-weight:700;padding:2px 9px;border-radius:999px;}
.ent-item-rating{font-size:11px;color:var(--gold);letter-spacing:1px;}
.ent-item-progress{font-size:10.5px;color:var(--text3);}
.ent-item-actions{position:absolute;top:7px;right:7px;display:flex;gap:4px;opacity:0;transition:opacity .12s;}
.ent-item-card:hover .ent-item-actions{opacity:1;}
.ent-item-actions i{width:23px;height:23px;background:rgba(23,19,33,.55);color:#fff;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11.5px;cursor:pointer;}
.ent-item-actions i:hover{background:rgba(23,19,33,.8);}
.ent-item-favorite{position:absolute;top:7px;left:7px;color:#fff;font-size:14px;text-shadow:0 1px 3px rgba(0,0,0,.5);}

.ent-status-editor-row{display:flex;gap:6px;align-items:center;margin-bottom:6px;}
.ent-status-editor-row input{flex:1;}
.ent-status-editor-row i{cursor:pointer;color:var(--text3);width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:6px;flex-shrink:0;}
.ent-status-editor-row i:hover{background:#FDECEC;color:#E24B4A;}
.ent-add-status-btn{font-size:11.5px;color:var(--purple);cursor:pointer;display:inline-flex;align-items:center;gap:4px;margin-top:2px;}
.ent-add-status-btn:hover{text-decoration:underline;}
.ent-rating-picker{display:flex;gap:5px;font-size:21px;cursor:pointer;}
.ent-rating-picker i{color:var(--border);}
.ent-rating-picker i.filled{color:var(--gold);}
@media (max-width:640px){
  .ent-item-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));}
}
</style>
</head>
<body>
<div id="app">
  <!-- 手機版遮罩，點擊可收起側邊欄 -->
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeMobileSidebar()"></div>
  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-logo"><span class="logo-badge"><i class="ti ti-brain"></i></span><span class="logo-text"><span id="logo-title-text" ondblclick="startLogoTitleEdit()" title="雙擊修改名稱" style="cursor:pointer">Danny's</span><small id="logo-subtitle-text" ondblclick="startLogoSubtitleEdit()" title="雙擊修改副標題" style="cursor:pointer">資料庫 · ARCHIVE</small></span></div>
    <div id="nav-fixed-list" style="padding-bottom:8px;margin-bottom:8px;border-bottom:1px dashed var(--side-border)"></div>
    <div class="sidebar-scroll-mid" id="sidebar-scroll-mid">
      <div class="sec-label cat-sec-label" style="margin-top:10px;cursor:pointer" onclick="toggleCatListCollapsed()" title="點擊收合／展開">
        <span>書籤分類</span>
        <i class="ti ti-chevron-down cat-sec-toggle-icon" id="cat-sec-toggle-icon"></i>
      </div>
      <div id="cat-list-wrap">
        <div id="cat-list" style="min-height:20px"></div>
      </div>
      <div class="add-cat-area">
        <div class="add-cat-row">
          <input class="add-cat-input" id="new-cat-input" placeholder="新分類名稱..." maxlength="12" onfocus="toggleAddCatExtra(true)"/>
          <button class="add-cat-btn" onclick="addCat()">+</button>
        </div>
        <div class="add-cat-toggle" id="add-cat-toggle" onclick="toggleAddCatExtra()">
          <i class="ti ti-chevron-down" id="add-cat-toggle-icon"></i><span>顏色 / Emoji</span>
        </div>
        <div class="add-cat-extra" id="add-cat-extra" style="display:none">
          <div class="emoji-picker-row" id="new-cat-emojis"></div>
          <div class="color-picker-row" id="new-cat-colors"></div>
        </div>
      </div>
      <div id="sidebar-extras"></div>
    </div>
    <div style="margin-top:auto">
      <div class="settings-area">
        <button class="backup-btn" onclick="openSettingsModal()"><i class="ti ti-settings" style="font-size:13px"></i>偏好設定</button>
      </div>
      <div class="progress-box">
        <div class="progress-label"><span>已學習</span><span id="prog-text">0 / 0</span></div>
        <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
      </div>
      <div class="backup-area">
        <button class="backup-btn" onclick="exportData()"><i class="ti ti-download" style="font-size:13px"></i>匯出備份</button>
        <label class="backup-btn imp" style="justify-content:center;cursor:pointer">
          <i class="ti ti-upload" style="font-size:13px"></i>匯入備份
          <input type="file" accept=".json" onchange="importData(event)" style="display:none"/>
        </label>
      </div>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <button class="mobile-menu-btn" onclick="toggleMobileSidebar()" title="選單"><i class="ti ti-menu-2"></i></button>
      <span class="topbar-title" id="page-title">全部內容</span>
      <button class="btn-ghost" id="gsearch-btn" onclick="openGlobalSearch()" title="全站搜尋 (Ctrl/Cmd+K)" style="display:inline-flex;align-items:center;gap:6px;flex-shrink:0"><i class="ti ti-search" style="font-size:13px"></i>全站搜尋</button>
      <div class="search-wrap" id="search-wrap">
        <i class="ti ti-search search-icon"></i>
        <input class="search-input" id="search-input" placeholder="搜尋..." oninput="renderGrid()"/>
      </div>
      <select class="sort-select" id="sort-select" onchange="renderGrid()">
        <option value="newest">最新新增</option>
        <option value="oldest">最舊優先</option>
        <option value="due">快到複習期</option>
        <option value="alpha">標題 A-Z</option>
      </select>
      <div class="view-toggle-wrap" id="view-toggle-wrap" style="display:flex;gap:2px">
        <button class="icon-btn" id="btn-view-grid" onclick="setCardView('grid')" title="卡片模式"><i class="ti ti-layout-grid"></i></button>
        <button class="icon-btn" id="btn-view-list" onclick="setCardView('list')" title="列表模式"><i class="ti ti-list"></i></button>
      </div>
      <button class="btn-ghost" id="select-mode-btn" onclick="toggleSelectMode()" title="批次選取"><i class="ti ti-checkbox" style="font-size:13px"></i></button>
      <button class="btn-ghost" id="quiz-btn" onclick="startQuiz(getVisibleList())" title="測驗目前列表"><i class="ti ti-cards" style="font-size:13px"></i></button>
      <div class="add-menu-wrap" id="add-menu-wrap" style="position:relative">
        <button class="btn-primary" onclick="toggleAddMenu(event)"><i class="ti ti-plus" style="font-size:13px"></i>新增內容<i class="ti ti-chevron-down" style="font-size:10px;margin-left:1px"></i></button>
        <div class="add-menu" id="add-menu" style="display:none">
          <div class="add-menu-item" onclick="quickAddLearning()"><i class="ti ti-bookmark"></i>書籤</div>
          <div class="add-menu-item" onclick="quickAddTodo()"><i class="ti ti-calendar-event"></i>待辦事項</div>
          <div class="add-menu-item" onclick="quickAddNote()"><i class="ti ti-notebook"></i>筆記</div>
          <div class="add-menu-item" onclick="quickAddQuicklink()"><i class="ti ti-link"></i>連結</div>
          <div class="add-menu-item" onclick="quickAddFinance()"><i class="ti ti-currency-dollar"></i>收支</div>
          <div class="add-menu-item" onclick="quickAddShopping()"><i class="ti ti-shopping-cart"></i>購物清單</div>
          <div class="add-menu-item" onclick="quickAddFood()"><i class="ti ti-tools-kitchen-2"></i>美食</div>
          <div class="add-menu-item" onclick="quickAddTravel()"><i class="ti ti-map-pin"></i>旅遊</div>
          <div class="add-menu-item" onclick="quickAddEntertainment()"><i class="ti ti-device-gamepad-2"></i>娛樂</div>
        </div>
      </div>
    </div>
    <div class="content">
      <!-- 書籤分類 Tab 列 -->
      <div class="bm-tabs-wrap" id="bm-tabs-wrap" style="display:none">
        <div class="bm-tabs" id="bm-tabs"></div>
      </div>
      <!-- 書籤資訊列 -->
      <div class="bm-infobar" id="bm-infobar" style="display:none">
        <div class="bm-stats" id="bm-stats"></div>
        <div class="bm-controls">
          <div class="bm-search-wrap">
            <i class="ti ti-search" style="position:absolute;left:10px;color:var(--text3);font-size:13px;pointer-events:none"></i>
            <input class="bm-search-input" id="bm-search-input" placeholder="搜尋書籤..." oninput="renderGrid()"/>
          </div>
          <select class="bm-sort-select" id="bm-sort-select" onchange="renderGrid()">
            <option value="newest">最新新增</option>
            <option value="alpha">標題 A-Z</option>
            <option value="recent">最近瀏覽</option>
          </select>
          <select class="bm-sort-select" id="bm-time-filter" onchange="renderGrid()" title="依新增時間篩選">
            <option value="all">全部時間</option>
            <option value="today">今日新增</option>
            <option value="week">本週新增</option>
            <option value="lastweek">上週新增</option>
            <option value="earlier">更早新增</option>
          </select>
          <div class="bm-mainview-switch" id="bm-mainview-switch">
            <button class="bm-mainview-btn" data-mode="masonry" onclick="setMainViewMode('masonry')" title="卡片牆（依時間分類）"><i class="ti ti-layout-grid"></i></button>
            <button class="bm-mainview-btn" data-mode="row" onclick="setMainViewMode('row')" title="分組橫向列"><i class="ti ti-layout-distribute-horizontal"></i></button>
            <button class="bm-mainview-btn" data-mode="list" onclick="setMainViewMode('list')" title="清單模式"><i class="ti ti-list"></i></button>
          </div>
          <button class="bm-ctrl-btn" id="bm-star-btn" title="僅顯示收藏" onclick="toggleBmStarFilter()"><i class="ti ti-star"></i></button>
          <button class="bm-ctrl-btn" id="bm-batch-btn" title="批次管理" onclick="toggleSelectMode()"><i class="ti ti-checkbox"></i></button>
        </div>
      </div>
      <div class="proto-warn" id="proto-warn" style="display:none">
        <i class="ti ti-alert-triangle"></i>
        <span>目前以本機檔案（file://）開啟此頁面，瀏覽器會基於安全限制擋掉書籤小工具跳轉，導致「存到Danny's資料庫」按鈕沒反應。請把這個 HTML 檔案放到網路空間（例如 GitHub Pages、Netlify，或公司的內部網頁伺服器）再用該網址重新拖曳書籤即可正常運作。</span>
      </div>
      <div class="bookmarklet-tip" id="bk-tip">
        <i class="ti ti-bookmark"></i>

        <button class="tip-close" onclick="dismissBkTip()">×</button>

      <div class="review-strip" id="review-strip" style="display:none">

        <span class="review-link" onclick="filterDue()">查看列表</span>

      </div>
      <div id="home-page" style="display:none"></div>
      <div class="grid" id="card-grid"></div>
      <div id="stats-page" style="display:none"></div>
      <div id="todo-page" style="display:none"></div>
      <div id="notes-page" style="display:none"></div>
      <div id="quicklinks-page" style="display:none"></div>
      <div id="finance-page" style="display:none"></div>
      <div id="shopping-page" style="display:none"></div>
      <div id="food-page" style="display:none"></div>
      <div id="travel-page" style="display:none"></div>
      <div id="entertainment-page" style="display:none"></div>
      <div id="trash-page" style="display:none"></div>
      <div id="favorites-page" style="display:none"></div>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════
//  手機版側邊欄（抽屜）
// ══════════════════════════════
function toggleMobileSidebar(){
  const sb = document.getElementById('sidebar');
  if(sb && sb.classList.contains('mobile-open')) closeMobileSidebar();
  else openMobileSidebar();
}
function openMobileSidebar(){
  document.getElementById('sidebar')?.classList.add('mobile-open');
  document.getElementById('sidebar-overlay')?.classList.add('show');
}
function closeMobileSidebar(){
  document.getElementById('sidebar')?.classList.remove('mobile-open');
  document.getElementById('sidebar-overlay')?.classList.remove('show');
}
window.addEventListener('resize', ()=>{ if(window.innerWidth>860) closeMobileSidebar(); });

function updateMobileTabbar(){
  const activeKey = state.view==='grid' ? 'all' : state.view; // home/todo/notes/quicklinks/stats/grid
  document.querySelectorAll('.mtab-btn').forEach(btn=>{
    btn.classList.toggle('active', btn.dataset.key===activeKey);
  });
}

function loadSettings(){
  try{ const s=localStorage.getItem('lv_settings'); if(s) appSettings={...appSettings, ...JSON.parse(s)}; }catch(e){}
}
function saveSettings(){ localStorage.setItem('lv_settings', JSON.stringify(appSettings)); }

function applySettings(){
  const p = ACCENT_PRESETS[appSettings.accent] || ACCENT_PRESETS.purple;
  const root = document.documentElement.style;
  root.setProperty('--purple', p.purple);
  root.setProperty('--purple-dark', p.dark);
  root.setProperty('--purple-light', p.light);
  const appEl = document.body;
  if(appEl) appEl.style.zoom = (parseInt(appSettings.fontScale||100)/100);
  if(appEl) appEl.classList.toggle('dark-mode', appSettings.appTheme==='dark');
  if(appSettings.sidebarTheme==='light'){
    root.setProperty('--side-bg-1', '#FFFFFF');
    root.setProperty('--side-bg-2', '#FAF9FE');
    root.setProperty('--side-text', '#5C5670');
    root.setProperty('--side-text-dim', '#A39FB5');
    root.setProperty('--side-ink', '#1A1626');
    root.setProperty('--side-active-bg', p.light);
    root.setProperty('--side-hover-bg', '#F7F6FB');
    root.setProperty('--side-border', '#E7E4F0');
    root.setProperty('--side-input-bg', '#F7F6FB');
    root.setProperty('--side-input-bg-focus', '#FFFFFF');
  } else {
    root.setProperty('--side-bg-1', '#1C1730');
    root.setProperty('--side-bg-2', '#241D3D');
    root.setProperty('--side-text', '#C9C4DC');
    root.setProperty('--side-text-dim', '#7A7393');
    root.setProperty('--side-ink', '#FFFFFF');
    root.setProperty('--side-active-bg', 'rgba(255,255,255,.09)');
    root.setProperty('--side-hover-bg', 'rgba(255,255,255,.05)');
    root.setProperty('--side-border', 'rgba(255,255,255,.08)');
    root.setProperty('--side-input-bg', 'rgba(255,255,255,.06)');
    root.setProperty('--side-input-bg-focus', 'rgba(255,255,255,.1)');
  }
}

function getDueTodoItems(){
  const todayStr = fmtDate(new Date());
  const items = [];
  Object.keys(todos).filter(d=>d<=todayStr).forEach(d=>{
    (todos[d]||[]).filter(t=>!t.done).forEach(t=>items.push({...t, dateStr:d}));
  });
  return items;
}
function checkTodoNotifications(force){
  if(!appSettings.todoNotify) return;
  const due = getDueTodoItems();
  if(!due.length) return;
  const todayStr = fmtDate(new Date());
  const lastDate = localStorage.getItem('lv_todo_notify_date');
  const lastCount = parseInt(localStorage.getItem('lv_todo_notify_count')||'0', 10);
  if(!force && lastDate===todayStr && lastCount>=due.length) return;
  localStorage.setItem('lv_todo_notify_date', todayStr);
  localStorage.setItem('lv_todo_notify_count', String(due.length));
  const overdue = due.filter(t=>t.dateStr<todayStr).length;
  const todayCount = due.length - overdue;
  let msg;
  if(overdue>0 && todayCount>0) msg = `📌 你有 ${todayCount} 項待辦今天到期，另有 ${overdue} 項已逾期`;
  else if(overdue>0) msg = `⏰ 你有 ${overdue} 項待辦已逾期`;
  else msg = `📌 你有 ${todayCount} 項待辦今天到期`;
  if('Notification' in window && Notification.permission==='granted'){
    try{
      const n = new Notification('待辦事項提醒', {body:msg, tag:'todo-due'});
      n.onclick = ()=>{ window.focus(); navClick('todo'); n.close(); };
    }catch(e){ toast(msg); }
  } else {
    toast(msg);
  }
}

  return daysSince(c.addedAt) >= (c.reviewDays||7);
};

function reviewLabel(c){

    const days=Math.ceil((c.nextReview-Date.now())/86400000);
    return days>0 ? `${days}天後複習` : '待複習';
  }
  if(c.reviewDays===0) return '不提醒';
  const left=c.reviewDays-daysSince(c.addedAt);
  return left>0 ? `${left}天後複習` : '待複習';
}

function timeUntilDue(c){
  if(c.nextReview!=null) return c.nextReview-Date.now();
  if(c.reviewDays===0) return Infinity;
  return (c.reviewDays-daysSince(c.addedAt))*86400000;
}

function importData(e) {
  const file = e.target.files[0]; if(!file) return;
  const r = new FileReader();
  r.onload = evt => {
    try {
      const d = JSON.parse(evt.target.result);
      if(d && d.__app==='danny-database' && d.data && typeof d.data==='object'){
        const keys = Object.keys(d.data);
        if(!confirm(`偵測到完整備份檔（共 ${keys.length} 項資料，匯出於 ${d.exportedAt? new Date(d.exportedAt).toLocaleString() : '未知時間'}）。\n匯入將覆蓋目前瀏覽器內「所有」資料，且無法復原，確定要繼續嗎？`)) return;
        for(let i=localStorage.length-1;i>=0;i--){
          const k = localStorage.key(i);
          if(isAppStorageKey(k)) localStorage.removeItem(k);
        }
        keys.forEach(k=>localStorage.setItem(k, d.data[k]));
        localStorage.setItem('lv_last_backup_at', String(Date.now()));
        toast('✅ 匯入成功，正在重新載入頁面…');
        setTimeout(()=>location.reload(), 800);
      } else if(d && d.cards){
        if(!confirm(`這是舊版備份格式，只包含書籤資料（${d.cards.length} 筆），不含待辦／筆記／財務等其他模組。確定要匯入嗎？`)) return;
        state.cards = d.cards||[];
        state.cats = (d.cats||[]).map(c => typeof c==='string'?{name:c,color:PALETTE[0]}:c);
        save(); render(); toast(`✅ 已匯入 ${state.cards.length} 筆書籤！`);
      } else {
        throw new Error('bad format');
      }
    } catch(err) { alert('檔案格式錯誤，無法匯入'); }
  };
  r.readAsText(file); e.target.value='';
}

// ══════════════════════════════
//  自動備份（File System Access API）
//  選一個本機資料夾後，定期自動寫入完整備份檔，
//  即使清除瀏覽器資料或換裝置，也能從資料夾裡的檔案救回來。
// ══════════════════════════════
let autoBackupDirHandle = null;
const AUTO_BACKUP_KEEP = 20;             // 資料夾內最多保留幾份自動備份（超過會刪最舊的）
const AUTO_BACKUP_INTERVAL = 24*3600000; // 最多每 24 小時自動備份一次

function fsAccessSupported(){ return typeof window.showDirectoryPicker === 'function'; }

function idbOpenBackupDB(){
  return new Promise((resolve,reject)=>{
    const req = indexedDB.open('danny_db_backup', 1);
    req.onupgradeneeded = ()=>{ req.result.createObjectStore('handles'); };
    req.onsuccess = ()=>resolve(req.result);
    req.onerror = ()=>reject(req.error);
  });
}
async function idbSetHandle(key, handle){
  const db = await idbOpenBackupDB();
  return new Promise((resolve,reject)=>{
    const tx = db.transaction('handles','readwrite');
    tx.objectStore('handles').put(handle, key);
    tx.oncomplete = ()=>resolve();
    tx.onerror = ()=>reject(tx.error);
  });
}
async function idbGetHandle(key){
  const db = await idbOpenBackupDB();
  return new Promise((resolve,reject)=>{
    const tx = db.transaction('handles','readonly');
    const req = tx.objectStore('handles').get(key);
    req.onsuccess = ()=>resolve(req.result||null);
    req.onerror = ()=>reject(req.error);
  });
}
async function idbDelHandle(key){
  const db = await idbOpenBackupDB();
  return new Promise((resolve,reject)=>{
    const tx = db.transaction('handles','readwrite');
    tx.objectStore('handles').delete(key);
    tx.oncomplete = ()=>resolve();
    tx.onerror = ()=>reject(tx.error);
  });
}

function buildBackupPayload(){
  const data = {};
  for(let i=0;i<localStorage.length;i++){
    const k = localStorage.key(i);
    if(isAppStorageKey(k)) data[k] = localStorage.getItem(k);
  }
  return { __app:'danny-database', __version:2, exportedAt:new Date().toISOString(), data };
}

// 頁面載入時嘗試恢復先前設定的資料夾，並視情況自動備份一次
async function initAutoBackupSystem(){
  if(!fsAccessSupported()) return;
  if(localStorage.getItem('lv_auto_backup_enabled')!=='1') return;
  try{
    const handle = await idbGetHandle('autoBackupDir');
    if(handle){
      autoBackupDirHandle = handle;
      const perm = await handle.queryPermission({mode:'readwrite'});
      if(perm==='granted') await maybeRunAutoBackup();
    }
  }catch(e){ /* 資料夾可能已被移除或改名，安靜略過即可，使用者仍有手動匯出可用 */ }
}

async function maybeRunAutoBackup(){
  if(!autoBackupDirHandle) return;
  const last = parseInt(localStorage.getItem('lv_last_autobackup_at')||'0',10);
  if(Date.now()-last < AUTO_BACKUP_INTERVAL) return;
  await runAutoBackupNow();
}

async function runAutoBackupNow(){
  if(!autoBackupDirHandle) return false;
  try{
    let perm = await autoBackupDirHandle.queryPermission({mode:'readwrite'});
    if(perm!=='granted'){
      perm = await autoBackupDirHandle.requestPermission({mode:'readwrite'}); // 需要使用者手勢（例如按下「立即備份」）
    }
    if(perm!=='granted') return false;
    const payload = buildBackupPayload();
    const stamp = new Date().toISOString().replace(/[:.]/g,'-');
    const filename = `danny-auto-backup-${stamp}.json`;
    const fh = await autoBackupDirHandle.getFileHandle(filename, {create:true});
    const w = await fh.createWritable();
    await w.write(JSON.stringify(payload,null,2));
    await w.close();
    localStorage.setItem('lv_last_autobackup_at', String(Date.now()));
    localStorage.setItem('lv_last_backup_at', String(Date.now()));
    await rotateAutoBackups();
    hideBackupReminder();
    renderSettingsBackupRow();
    return true;
  }catch(e){
    console.warn('自動備份失敗', e);
    return false;
  }
}

async function rotateAutoBackups(){
  if(!autoBackupDirHandle || !autoBackupDirHandle.entries) return;
  try{
    const names = [];
    for await (const [name, entry] of autoBackupDirHandle.entries()){
      if(entry.kind==='file' && /^danny-auto-backup-.*\.json$/.test(name)) names.push(name);
    }
    names.sort(); // 檔名含 ISO 時間戳，字串排序即為時間順序
    const toDelete = names.slice(0, Math.max(0, names.length - AUTO_BACKUP_KEEP));
    for(const name of toDelete){
      try{ await autoBackupDirHandle.removeEntry(name); }catch(e){}
    }
  }catch(e){ /* 部分瀏覽器版本可能不支援列舉資料夾，安靜略過即可 */ }
}

async function chooseAutoBackupFolder(){
  if(!fsAccessSupported()){
    alert('這個瀏覽器不支援本機資料夾自動備份（建議改用電腦版 Chrome 或 Edge）。你仍然可以用「立即匯出」手動備份。');
    return;
  }
  try{
    const handle = await window.showDirectoryPicker({ id:'danny-auto-backup', mode:'readwrite' });
    const perm = await handle.requestPermission({mode:'readwrite'});
    if(perm!=='granted'){ toast('未取得資料夾寫入權限'); return; }
    await idbSetHandle('autoBackupDir', handle);
    autoBackupDirHandle = handle;
    localStorage.setItem('lv_auto_backup_enabled','1');
    const ok = await runAutoBackupNow();
    renderSettingsBackupRow();
    toast(ok ? '✅ 已設定自動備份資料夾，並完成第一次備份' : '已設定資料夾，但備份失敗，請稍後再試一次');
  }catch(e){
    if(e && e.name!=='AbortError') alert('選擇資料夾失敗：'+e.message);
  }
}

  if(!confirm('確定要關閉本機資料夾自動備份嗎？（先前已寫入的備份檔案不會被刪除）')) return;
  localStorage.removeItem('lv_auto_backup_enabled');
  try{ await idbDelHandle('autoBackupDir'); }catch(e){}
  autoBackupDirHandle = null;
  renderSettingsBackupRow();
  toast('已關閉自動備份');
}

function renderSettingsBackupRow(){
  const el = document.getElementById('settings-autobackup-row');
  if(!el) return;
  if(!fsAccessSupported()){
    el.innerHTML = `
      <div><div class="settings-row-label">本機資料夾自動備份</div>
      <div class="settings-row-desc">此瀏覽器不支援自動備份到本機資料夾（建議改用電腦版 Chrome / Edge），請持續使用上方的手動匯出。</div></div>`;
    return;
  }
  const enabled = localStorage.getItem('lv_auto_backup_enabled')==='1' && autoBackupDirHandle;

function setupBookmarklet() {
  const base = location.href.replace(/[?#].*/,'');
  const code = `javascript:(function(){var u=encodeURIComponent(location.href),t=encodeURIComponent(document.title);var f=document.querySelector('meta[property="og:title"]');if(f)t=encodeURIComponent(f.content);var target='${base}'+'?bk_url='+u+'&bk_title='+t;var w=window.open(target,'_blank','width=460,height=580');if(!w){location.href=target;}})();`;
  document.getElementById('bk-btn').href = code;

  // file:// 協定下，瀏覽器會擋掉跨頁面的書籤小工具，提早提醒使用者
  const warn = document.getElementById('proto-warn');
  if(warn) warn.style.display = (location.protocol==='file:') ? 'flex' : 'none';
}

// 共用 emoji 選擇器：分類頁籤 + 可捲動格狀選單 + 自由輸入框
// quickRowId：選擇器容器 id（內含頁籤列 + emoji 格子）
// inputId：文字輸入框 id（顯示/編輯目前選的 emoji，可為 null）
// 目前選的分類頁籤存在 window['_ep_'+quickRowId] 上，避免多個 picker 互相干擾
function renderEmojiPicker(quickRowId, inputId, currentEmoji, onPick){
  const row = document.getElementById(quickRowId);
  if(!row) return;
  const stateKey = '_ep_'+quickRowId;
  if(!window[stateKey]) window[stateKey] = 'quick';
  const activeCat = window[stateKey];

  const tabs = [{name:'quick', icon:'⭐', label:'常用'}, ...EMOJI_CATEGORIES.map(c=>({name:c.name, icon:c.icon, label:c.name}))];

  const tabsHTML = tabs.map(t=>`
    <button type="button" class="emoji-tab${activeCat===t.name?' active':''}" title="${esc(t.label)}"
      onclick="event.preventDefault();window['${stateKey}']='${t.name}';renderEmojiPicker('${quickRowId}','${inputId||''}','${currentEmoji||''}', ${onPick.toString().replace(/"/g,'&quot;')})">${t.icon}</button>
  `).join('');

  const list = activeCat==='quick' ? EMOJI_QUICK : (EMOJI_CATEGORIES.find(c=>c.name===activeCat)||{list:[]}).list;

  const gridHTML = list.map(e =>
    `<span class="emoji-swatch${e===currentEmoji?' selected':''}" onclick="(${onPick.toString()})('${e}')">${e}</span>`
  ).join('') + `<span class="emoji-swatch emoji-clear${!currentEmoji?' selected':''}" title="不使用 emoji" onclick="(${onPick.toString()})('')"><i class="ti ti-ban" style="font-size:12px"></i></span>`;

  row.innerHTML = `
    <div class="emoji-tabs">${tabsHTML}</div>
    <div class="emoji-grid">${gridHTML}</div>
  `;

  const inp = document.getElementById(inputId);
  if(inp) inp.value = currentEmoji || '';
}

  return '晚安';

function homeStatGridHTML(){
  const now = Date.now();
  const todayStr0 = fmtDate(new Date());
  const thisMonthKey = todayStr0.slice(0,7);

  // 1) 學習（書籤）— 全部筆數 + 本週新增
  const studyTotal = state.cards.length;
  const studyWeek = state.cards.filter(c=>c.addedAt && (now-c.addedAt) < 7*86400000).length;

  // 2) 筆記 — 全部篇數 + 本月新增
  const noteTotal = notes.length;
  const noteMonth = notes.filter(n=>n.createdAt && fmtDate(new Date(n.createdAt)).slice(0,7)===thisMonthKey).length;

  // 3) 收藏（常用連結）— 全部個數 + 未分類
  const qlTotal = quicklinks.length;
  const qlUnsorted = quicklinks.filter(q=>!q.group || q.group==='一般').length;

  // 4) 美食 — 全部家數 + 想吃
  const foodItems = (lcState.food && lcState.food.items) || [];
  const foodTotal = foodItems.length;
  const foodWant = foodItems.filter(it=>it.status==='want').length;

  // 5) 旅遊 — 全部趟數 + 規劃中
  const travelItems = (lcState.travel && lcState.travel.items) || [];
  const travelTotal = travelItems.length;
  const travelPlanning = travelItems.filter(it=>it.status==='planning').length;

  // 6) 財務 — 本月結餘
  const finSum = (typeof finSummaryOf==='function') ? finSummaryOf(thisMonthKey) : {balance:0};
  const finBalance = finSum.balance||0;

  // 7) 購物清單 — 全部件數 + 待購買
  const shopList = (typeof shoppingItems!=='undefined') ? shoppingItems : [];
  const shopTotal = shopList.length;
  const shopPending = shopList.filter(i=>i.status!=='purchased').length;

  const cards = [
    {key:'bk', color:'var(--purple)', icon:'ti-book', label:getHomeModuleTitle('bk'), value:studyTotal, unit:'篇',
      delta: studyWeek>0 ? `本週 +${studyWeek}` : '本週無新增', deltaCls: studyWeek>0?'up':'', onclick:"navClick('all')"},
    {key:'note', color:'#7F77DD', icon:'ti-notebook', label:getHomeModuleTitle('note'), value:noteTotal, unit:'篇',
      delta: noteMonth>0 ? `本月 +${noteMonth}` : '本月無新增', deltaCls: noteMonth>0?'up':'', onclick:"selectNotes()"},
    {key:'ql', color:'#1D9E75', icon:'ti-link', label:getHomeModuleTitle('ql'), value:qlTotal, unit:'個',
      delta: qlUnsorted>0 ? `${qlUnsorted} 個未分類` : '已全部分類', deltaCls:'', onclick:"selectQuicklinks()"},
    {key:'shopping', color:'#D4537E', icon:'ti-shopping-cart', label:getHomeModuleTitle('shopping'), value:shopTotal, unit:'件',
      delta: shopPending>0 ? `${shopPending} 件待購買` : '已全部購買', deltaCls:'', onclick:"navClick('shopping')"},
    {key:'food', color:'#E67E22', icon:'ti-tools-kitchen-2', label:getHomeModuleTitle('food'), value:foodTotal, unit:'家',
      delta: foodWant>0 ? `${foodWant} 個想吃` : '沒有想吃清單', deltaCls:'', onclick:"navClick('food')"},
    {key:'travel', color:'#378ADD', icon:'ti-plane', label:getHomeModuleTitle('travel'), value:travelTotal, unit:'趟',
      delta: travelPlanning>0 ? `${travelPlanning} 個規劃中` : '沒有規劃中行程', deltaCls:'', onclick:"navClick('travel')"},
    {key:'finance', color:'var(--gold)', icon:'ti-currency-dollar', label:getHomeModuleTitle('finance'), value:fmtMoney(finBalance,true), unit:'', isText:true,
      delta:'本月結餘', deltaCls: finBalance>=0?'up':'down', onclick:"selectFinance()"},
  ];

  return `<div class="home-stat-grid">${cards.map(c=>`
    <div class="home-stat-card" onclick="${c.onclick}">
      <div class="home-stat-icon"><i class="ti ${c.icon}"></i></div>
      <div class="home-stat-body">
        <div class="home-stat-label">${esc(c.label)}</div>
        <div class="home-stat-value">${c.isText?esc(String(c.value)):esc(String(c.value))+`<span class="unit">${esc(c.unit)}</span>`}</div>
        <div class="home-stat-delta${c.deltaCls?' '+c.deltaCls:''}">${esc(c.delta)}</div>
      </div>
      <i class="ti ti-chevron-right home-stat-arrow"></i>
    </div>`).join('')}
  </div>`;
}

  const bkHTML = recentCards.length ? `<div class="home-bk-row">${recentCards.map(c=>{
    const cc = catColor(c.cat);
    return `<div class="home-bk-card" onclick="selectHomeCard('${c.id}')" title="${esc(c.title)}">
      <span class="home-bk-emoji">${cardEmoji(c)}</span>

  // 最新筆記（最多 5 筆）
  const recentNotes = [...notes].sort((a,b)=>b.updatedAt-a.updatedAt).slice(0,5);
  const noteHTML = recentNotes.length ? `<div class="home-note-row">${recentNotes.map(n=>`

    </div>`).join('')}</div>` : `<div class="home-empty-mini">還沒有筆記，整理書籤的心得從這裡開始！</div>`;

  // 常用連結（最多 8 筆）
  const recentQl = quicklinks.slice(0,8);
  const qlHTML = recentQl.length ? `<div class="home-ql-row">${recentQl.map(q=>{
    const domain = qlDomain(q.url);
    const faviconSrc = domain ? `https://www.google.com/s2/favicons?domain=${domain}&sz=64` : '';
    return `<a class="home-ql-card" href="${esc(q.url)}" target="_blank" rel="noopener" title="${esc(q.url)}">
      ${faviconSrc?`<img src="${esc(faviconSrc)}" onerror="this.outerHTML='<span style=\\'font-size:18px;\\'>🔗</span>'" />`:`<span style="font-size:18px;">🔗</span>`}
      <span class="home-ql-card-label">${esc(q.label||domain||q.url)}</span>
    </a>`;
  }).join('')}</div>` : `<div class="home-empty-mini">還沒有常用連結，到「常用連結」頁面新增吧！</div>`;

  // 待購買商品（最多 6 筆）
  const pendingShop = (typeof shoppingItems!=='undefined' ? shoppingItems : [])
    .filter(i=>i.status!=='purchased')
    .sort((a,b)=>(b.addedAt||0)-(a.addedAt||0))
    .slice(0,6);
  const shopHTML = pendingShop.length ? `<div class="home-bk-row">${pendingShop.map(it=>{
    return `<div class="home-bk-card" onclick="openShoppingEditModal('${it.id}')" title="${esc(it.name||'')}">
      <span class="home-bk-emoji">🛒</span>
      <span class="home-bk-title">${esc(it.name||'未命名商品')}</span>
      ${it.price?`<span class="home-todo-date" style="flex-shrink:0">$${Number(it.price).toLocaleString('zh-TW')}</span>`:''}
    </div>`;
  }).join('')}</div>` : `<div class="home-empty-mini">目前沒有待購買商品，逛街愉快！</div>`;

  // 美食：想吃清單（最多 6 筆）
  const foodItemsAll = (lcState.food && lcState.food.items) || [];

    </div>`).join('')}</div>` : `<div class="home-empty-mini">還沒有想吃清單，到「美食」頁面新增吧！</div>`;

  const recentTravel = [...travelItemsAll].filter(it=>it.status==='planning'||it.status==='want')
    .sort((a,b)=>(b.addedAt||0)-(a.addedAt||0)).slice(0,6);
  const travelBlockHTML = recentTravel.length ? `<div class="home-bk-row">${recentTravel.map(it=>{

  // 財務：本月收支摘要
  const finThisMonthKey = fmtDate(new Date()).slice(0,7);
  const finSumHome = (typeof finSummaryOf==='function') ? finSummaryOf(finThisMonthKey) : {income:0,expense:0,balance:0};
  const finBlockHTML = `<div style="display:flex;flex-direction:column;gap:7px">
    <div style="display:flex;justify-content:space-between;align-items:center;font-size:12px">
      <span style="color:var(--text2)">本月收入</span><b style="color:#1D9E75;font-family:var(--font-display)">${fmtMoney(finSumHome.income)}</b>

    <div style="display:flex;justify-content:space-between;align-items:center;font-size:12px">

  const nowTs = Date.now();
  const dueCards = state.cards.filter(c=>c.nextReview && c.nextReview<=nowTs)
    .sort((a,b)=>a.nextReview-b.nextReview).slice(0,6);
  const todayStr2 = fmtDate(new Date());
  const dueTodos = Object.keys(todos).filter(d=>d<=todayStr2).sort()
    .flatMap(d=>(todos[d]||[]).filter(t=>!t.done).map(t=>({...t, dateStr:d})))
    .slice(0,8);

  const todoRows = dueTodos.map(t=>{
    const overdue = t.dateStr<todayStr2;
    const tagDef = (todoTags.find(x=>x.key===t.tag))||{color:'#9aa0a6'};
    return {
      type:'todo', id:t.id, dateStr:t.dateStr, color:tagDef.color, title: esc(t.text||'待辦事項'),

    <div class="home-reminder-subhead"><i class="ti ti-bell"></i><span>複習與購物提醒</span>${otherRows.length?`<span class="home-reminder-subcount">${otherRows.length}</span>`:''}</div>
    ${rowsToHTML(otherRows, '目前沒有需要處理的提醒，太棒了！')}

  // ── 最近活動 Timeline：跨模組彙整 ──
  const timelineItems = (typeof activityAllItems==='function' ? activityAllItems() : [])
    .filter(x=>x.updatedAt>0)
    .sort((a,b)=>b.updatedAt-a.updatedAt).slice(0,8);
  const timelineHTML = timelineItems.length ? timelineItems.map(it=>`
    <div class="home-activity-row" onclick="sidebarActivityOpen('${it.type}','${it.id}')" title="${esc(it.title)}">
      <span class="home-activity-icon">${it.icon}</span>
      <span class="home-activity-text">${esc(it.title)}</span>
      <span class="home-activity-time">${relTime(it.updatedAt)}</span>
    </div>`).join('') : `<div class="home-empty-mini">還沒有任何活動紀錄</div>`;

  // ── 待辦事項已併入「提醒中心」，不再單獨產生區塊 ──

  const blockDefs = {
    overview: {colorClass:'home-block-overview', accent:'var(--purple)', icon:'ti-layout-dashboard', title:'總覽', moreClick:"", body:homeStatGridHTML()},
    reminder: {colorClass:'home-block-reminder', accent:'#E64545', icon:'ti-bell', title:'提醒與待辦', count:reminderRows.length, countUnit:'項待處理', moreClick:"selectTodo()", body:reminderHTML},
    timeline: {colorClass:'home-block-timeline', accent:'#8B5CF6', icon:'ti-history', title:'最近活動', count:timelineItems.length, countUnit:'筆', moreClick:"", body:timelineHTML},
    bk:   {colorClass:'home-block-bk',   accent:'#378ADD', icon:'ti-bookmark',       title:getHomeModuleTitle('bk'), count:state.cards.length, countUnit:'筆', moreClick:"navClick('all')", body:bkHTML},
    note: {colorClass:'home-block-note', accent:'#7F77DD', icon:'ti-notebook',       title:getHomeModuleTitle('note'), count:notes.length, countUnit:'篇', moreClick:"selectNotes()", body:noteHTML},
    ql:   {colorClass:'home-block-ql',   accent:'#1D9E75', icon:'ti-link',           title:getHomeModuleTitle('ql'), count:quicklinks.length, countUnit:'個', moreClick:"selectQuicklinks()", body:qlHTML},
    shopping: {colorClass:'home-block-shop', accent:'#D4537E', icon:'ti-shopping-cart', title:getHomeModuleTitle('shopping'), count:(typeof shoppingItems!=='undefined'?shoppingItems:[]).length, countUnit:'件', moreClick:"navClick('shopping')", body:shopHTML},
    food: {colorClass:'home-block-food', accent:'#E67E22', icon:'ti-tools-kitchen-2', title:getHomeModuleTitle('food'), count:foodItemsAll.length, countUnit:'家', moreClick:"navClick('food')", body:foodBlockHTML},
    travel: {colorClass:'home-block-travel', accent:'#378ADD', icon:'ti-plane', title:getHomeModuleTitle('travel'), count:travelItemsAll.length, countUnit:'趟', moreClick:"navClick('travel')", body:travelBlockHTML},
    finance: {colorClass:'home-block-finance', accent:'#C9A24B', icon:'ti-currency-dollar', title:getHomeModuleTitle('finance'), count:financeTx.length, countUnit:'筆', moreClick:"selectFinance()", body:finBlockHTML},
  };

  const visibleBlocks = homeBlocksConfig.filter(b=>b.visible && blockDefs[b.key]);
  const hiddenBlocks = homeBlocksConfig.filter(b=>!b.visible && blockDefs[b.key]);

  const PRIORITY_KEYS = ['overview','reminder','timeline'];
  const priorityBlocks = visibleBlocks.filter(b=>PRIORITY_KEYS.includes(b.key));
  const moduleBlocks = visibleBlocks.filter(b=>!PRIORITY_KEYS.includes(b.key));

  const renderBlockCard = (b)=>{
    const d = blockDefs[b.key];
    const collapsed = !!homeBlockCollapsed[b.key];
    const hasCount = d.count !== undefined;
    return `<div class="home-block ${d.colorClass}${collapsed?' is-collapsed':''}" data-key="${b.key}" style="--block-accent:${d.accent}"
        ondragover="homeBlockDragOver(event)" ondragleave="homeBlockDragLeave(event)" ondrop="homeBlockDrop(event,'${b.key}')">
      <div class="home-block-head">
        <i class="ti ti-grip-vertical home-block-grip" draggable="true" ondragstart="homeBlockDragStart(event,'${b.key}')" ondragend="homeBlockDragEnd(event)" title="拖曳排序"></i>
        <span class="home-block-icon"><i class="ti ${d.icon}"></i></span>
        ${RENAMABLE_HOME_BLOCK_KEYS.includes(b.key) ? `
        <h3 id="home-block-title-${b.key}" ondblclick="event.stopPropagation();startHomeBlockRename('${b.key}')" title="雙擊改名">${esc(d.title)}</h3>
        <i class="ti ti-pencil home-block-title-edit" onclick="event.stopPropagation();startHomeBlockRename('${b.key}')" title="編輯名稱（同步更新總覽）"></i>` : `
        <h3>${esc(d.title)}</h3>`}
        ${hasCount ? `<div class="home-block-count-wrap" style="--acc:${d.accent}${d.moreClick?'':';cursor:default'}" ${d.moreClick?`onclick="${d.moreClick}" title="查看全部"`:''}>
          <span class="home-block-count">${d.count}</span>
          <span class="home-block-count-label">${d.countUnit}${d.moreClick?' →':''}</span>
        </div>` : ''}
        <button class="home-block-collapse" onclick="toggleHomeBlockCollapsed('${b.key}')" title="${collapsed?'展開':'收合'}"><i class="ti ${collapsed?'ti-chevron-down':'ti-chevron-up'}"></i></button>
        <button class="home-block-hide" onclick="toggleHomeBlockVisible('${b.key}')" title="隱藏這個區塊"><i class="ti ti-eye-off"></i></button>
      </div>
      ${collapsed ? '' : d.body}
    </div>`;
  };

  const priorityHTML = priorityBlocks.map(renderBlockCard).join('');
  const blocksHTML = moduleBlocks.map(renderBlockCard).join('');

  const hiddenChipsHTML = hiddenBlocks.length ? `<div class="home-hidden-row">
    <span class="home-hidden-label">已隱藏：</span>
    ${hiddenBlocks.map(b=>`<button class="home-hidden-chip" onclick="toggleHomeBlockVisible('${b.key}')"><i class="ti ti-eye"></i>${blockDefs[b.key].title}</button>`).join('')}
  </div>` : '';

  const layoutClass = homeLayoutMode==='list' ? 'home-blocks-list' : (homeLayoutMode==='row' ? 'home-blocks-row' : 'home-blocks-grid');

  el.innerHTML = `
    <div class="home-page">
      <div>
        <div class="home-greeting" id="home-greeting-display" onclick="editHomeGreeting()" title="點擊編輯">
          <span>${esc(homeGreetingText())}</span><i class="ti ti-pencil home-sub-edit-icon"></i>
        </div>
        <div class="home-greeting-sub" id="home-sub-display" onclick="editHomeSubtitle()" title="點擊編輯">
          <span>${esc(homeSubtitle)}</span><i class="ti ti-pencil home-sub-edit-icon"></i>
        </div>
      </div>

      ${priorityBlocks.length ? `<div class="home-priority-grid" id="home-priority-wrap">${priorityHTML}</div>` : ''}

      <div class="home-modgrid-section">
        <div class="home-modgrid-header">
          <span class="home-section-label">模組總覽</span>
          <div class="home-toolbar">
            <div class="bm-mainview-switch">
              <button class="bm-mainview-btn${homeLayoutMode==='grid'?' active':''}" onclick="setHomeLayoutMode('grid')" title="2x2 大格"><i class="ti ti-layout-grid"></i></button>
              <button class="bm-mainview-btn${homeLayoutMode==='list'?' active':''}" onclick="setHomeLayoutMode('list')" title="直向清單"><i class="ti ti-list"></i></button>
              <button class="bm-mainview-btn${homeLayoutMode==='row'?' active':''}" onclick="setHomeLayoutMode('row')" title="橫向卡片流"><i class="ti ti-layout-distribute-horizontal"></i></button>
            </div>
          </div>
        </div>

// ── 模組名稱：總覽與下方模組卡片共用同一份名稱，改一處即同步 ──
const HOME_MODULE_TITLE_DEFAULTS = {bk:'學習', note:'筆記', ql:'收藏', shopping:'購物', food:'美食', travel:'旅遊', finance:'財務'};
const RENAMABLE_HOME_BLOCK_KEYS = Object.keys(HOME_MODULE_TITLE_DEFAULTS);
let homeModuleTitles = loadHomeModuleTitles();
function loadHomeModuleTitles(){
  try{
    const saved = JSON.parse(localStorage.getItem('lv_home_module_titles'));
    if(saved && typeof saved==='object') return {...HOME_MODULE_TITLE_DEFAULTS, ...saved};
  }catch(e){}
  return {...HOME_MODULE_TITLE_DEFAULTS};
}
function saveHomeModuleTitles(){ localStorage.setItem('lv_home_module_titles', JSON.stringify(homeModuleTitles)); }
function getHomeModuleTitle(key){ return (homeModuleTitles && homeModuleTitles[key]) || HOME_MODULE_TITLE_DEFAULTS[key] || key; }
function startHomeBlockRename(key){
  const h3 = document.getElementById('home-block-title-'+key); if(!h3) return;
  const cur = getHomeModuleTitle(key);
  const inp = document.createElement('input');
  inp.className = 'home-block-title-inp';
  inp.value = cur;
  inp.maxLength = 8;
  inp.onclick = e=>e.stopPropagation();
  inp.ondblclick = e=>e.stopPropagation();
  let committed = false;
  const commit = ()=>{
    if(committed) return; committed = true;
    const val = inp.value.trim();
    if(val) homeModuleTitles[key] = val;
    saveHomeModuleTitles();
    renderHomePage();
  };
  inp.onblur = commit;
  inp.onkeydown = e=>{
    e.stopPropagation();
    if(e.key==='Enter') inp.blur();
    if(e.key==='Escape'){ committed = true; renderHomePage(); }
  };
  h3.replaceWith(inp); inp.focus(); inp.select();
}

const DEFAULT_HOME_BLOCKS = ['overview','reminder','timeline','bk','note','ql','shopping','food','travel','finance'];
const DEFAULT_HOME_BLOCKS_HIDDEN = []; // 預設全部顯示；「提醒與待辦」已整合複習卡片＋今日/逾期待辦＋購物提醒
let homeLayoutMode = localStorage.getItem('lv_home_layout_mode') || 'grid';
let homeBlocksConfig = loadHomeBlocksConfig();
let homeBlockCollapsed = loadHomeBlockCollapsed();

function loadHomeBlockCollapsed(){
  try{ return JSON.parse(localStorage.getItem('lv_home_block_collapsed'))||{}; }catch(e){ return {}; }
}
function saveHomeBlockCollapsed(){ localStorage.setItem('lv_home_block_collapsed', JSON.stringify(homeBlockCollapsed)); }
function toggleHomeBlockCollapsed(key){ homeBlockCollapsed[key]=!homeBlockCollapsed[key]; saveHomeBlockCollapsed(); renderHomePage(); }

function loadHomeBlocksConfig(){
  try{
    const saved = JSON.parse(localStorage.getItem('lv_home_blocks_config'));
    if(Array.isArray(saved) && saved.length){
      const keys = saved.map(b=>b.key);
      DEFAULT_HOME_BLOCKS.forEach(k=>{ if(!keys.includes(k)) saved.push({key:k, visible:!DEFAULT_HOME_BLOCKS_HIDDEN.includes(k)}); });
      return saved;
    }
  }catch(e){}
  return DEFAULT_HOME_BLOCKS.map(k=>({key:k, visible:!DEFAULT_HOME_BLOCKS_HIDDEN.includes(k)}));
}
function saveHomeBlocksConfig(){ localStorage.setItem('lv_home_blocks_config', JSON.stringify(homeBlocksConfig)); }

function setHomeLayoutMode(m){
  homeLayoutMode = m;
  localStorage.setItem('lv_home_layout_mode', m);
  renderHomePage();
}
function toggleHomeBlockVisible(key){
  const b = homeBlocksConfig.find(x=>x.key===key);
  if(b) b.visible = !b.visible;
  saveHomeBlocksConfig();
  renderHomePage();
}

let _homeDragKey=null;
function homeBlockDragStart(e, key){
  _homeDragKey = key;
  e.dataTransfer.effectAllowed = 'move';
  e.stopPropagation();
  const blockEl = e.currentTarget.closest('.home-block');
  if(blockEl) blockEl.classList.add('dragging');
}
function homeBlockDragOver(e){ e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
function homeBlockDragLeave(e){ e.currentTarget.classList.remove('drag-over'); }
function homeBlockDrop(e, targetKey){
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if(!_homeDragKey || _homeDragKey===targetKey){ _homeDragKey = null; return; }
  const visibleKeys = homeBlocksConfig.filter(b=>b.visible).map(b=>b.key);
  const fromIdx = visibleKeys.indexOf(_homeDragKey);
  const toIdx = visibleKeys.indexOf(targetKey);
  if(fromIdx===-1 || toIdx===-1){ _homeDragKey = null; return; }
  const item = visibleKeys.splice(fromIdx,1)[0];
  visibleKeys.splice(toIdx,0,item);
  const hidden = homeBlocksConfig.filter(b=>!b.visible);
  homeBlocksConfig = visibleKeys.map(k=>({key:k, visible:true})).concat(hidden);
  _homeDragKey = null;
  saveHomeBlocksConfig();
  renderHomePage();
}
function homeBlockDragEnd(e){
  document.querySelectorAll('.home-block').forEach(el=>el.classList.remove('dragging','drag-over'));
  _homeDragKey = null;
}

function toggleHomeTodo(id, dateStr){
  const list=todos[dateStr]||[];
  const t=list.find(x=>x.id===id);
  if(t){ t.done=!t.done; saveTodos(); renderHomePage(); renderFixedNav(); }
}

function selectHomeNote(id){ activeNoteId=id; selectNotes(); }

function toggleStatsTopbarControls(isStats){

}

let catListCollapsed = localStorage.getItem('lv_catlist_collapsed')==='1';
function toggleCatListCollapsed(){
  catListCollapsed = !catListCollapsed;
  localStorage.setItem('lv_catlist_collapsed', catListCollapsed?'1':'0');

function getSortedFiltered(list) {
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  if(q) list = list.filter(c =>

    (c.summary||'').toLowerCase().includes(q) ||
    (c.tags||[]).some(t=>t.toLowerCase().includes(q)) ||
    (c.cat||'').toLowerCase().includes(q) ||
    (c.points||[]).some(p=>p.toLowerCase().includes(q))
  );
  const sort = document.getElementById('sort-select').value;
  if(sort==='newest') list.sort((a,b)=>b.addedAt-a.addedAt);
  else if(sort==='oldest') list.sort((a,b)=>a.addedAt-b.addedAt);
  else if(sort==='due') list.sort((a,b)=>timeUntilDue(a)-timeUntilDue(b));
  else if(sort==='alpha') list.sort((a,b)=>a.title.localeCompare(b.title,'zh-TW'));
  return list;
}
